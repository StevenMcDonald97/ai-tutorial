<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Player</title>
<style>


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f5f2;
  --surface:#ffffff;
  --border:#e8e4de;
  --text:#1a1917;
  --text-secondary:#6b6760;
  --accent:#2d5a3d;
  --accent-light:#eaf2ec;
  --accent-muted:#4a7c5f;
  --warn:#8b3a2a;
  --warn-light:#fdf0ee;
  --gold:#c9973a;
  --gold-light:#fdf6e8;
  --blue:#2563eb;
  --blue-light:#eff6ff;
  --violet:#6d28d9;
  --violet-light:#f5f3ff;
  --radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400;line-height:1.25}

/* ── Layout ── */
#app{display:flex;min-height:100vh}

/* ── Sidebar ── */
#sidebar{
  width:290px;min-width:290px;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
#sidebar-header{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
#sidebar-header .course-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
#sidebar-header h2{font-size:17px;color:var(--text);line-height:1.3}
#progress-bar-wrap{margin-top:12px;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
#progress-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;width:0%}
#progress-label{margin-top:5px;font-size:11px;color:var(--text-secondary)}

/* Competency badges in sidebar */
#competency-sidebar{padding:12px 16px;border-bottom:1px solid var(--border)}
#competency-sidebar .comp-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px}
.comp-badge{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.comp-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.comp-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
.comp-pct{font-size:11px;color:var(--text-secondary);width:28px;text-align:right}

/* Section nav */
.section-nav-item{border-bottom:1px solid var(--border)}
.section-nav-header{
  padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;color:var(--text-secondary);user-select:none;transition:background .15s;
}
.section-nav-header:hover{background:var(--bg)}
.section-nav-header.active{color:var(--text)}
.section-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .2s}
.section-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.section-check.active{border-color:var(--accent)}
.section-nav-arrow{font-size:10px;transition:transform .2s;margin-left:auto}
.section-nav-item.open .section-nav-arrow{transform:rotate(90deg)}
.section-nav-experiences{display:none}
.section-nav-item.open .section-nav-experiences{display:block}

.exp-nav-item{
  padding:7px 18px 7px 44px;cursor:pointer;font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;transition:background .15s,color .15s;
}
.exp-nav-item:hover{background:var(--bg);color:var(--text)}
.exp-nav-item.active{color:var(--accent);font-weight:600}
.exp-nav-item.done .exp-dot{background:var(--accent-muted)}
.exp-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s}
.exp-nav-item.active .exp-dot{background:var(--accent)}

.assess-nav-item{
  padding:7px 18px 7px 44px;cursor:pointer;font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;transition:background .15s;
}
.assess-nav-item:hover{background:var(--bg)}
.assess-nav-item.active{color:var(--gold);font-weight:600}
.assess-nav-item .exp-dot{background:rgba(201,151,58,.4)}
.assess-nav-item.active .exp-dot{background:var(--gold)}

/* ── Main ── */
#main{flex:1;max-width:780px;margin:0 auto;padding:44px 36px}

/* ── Screens ── */
.screen{display:none;animation:fadeIn .22s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── Shared components ── */
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.tag-green{background:var(--accent-light);color:var(--accent)}
.tag-gray{background:var(--border);color:var(--text-secondary)}
.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-gold{background:var(--gold-light);color:var(--gold)}
.tag-violet{background:var(--violet-light);color:var(--violet)}

.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:99px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-muted)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-ghost{background:none;color:var(--accent);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;padding:4px 0;text-decoration:underline;text-underline-offset:3px}

.nav-buttons{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:22px;border-top:1px solid var(--border)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}

/* ── Intro screen ── */
.course-hero{
  background:linear-gradient(135deg,var(--accent-light),var(--border));
  border-radius:var(--radius);height:180px;margin-bottom:28px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.course-hero img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius)}
.course-hero .hero-icon{font-size:52px}

.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.meta-cell{padding:14px 16px;background:var(--surface);border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-cell strong{display:block;font-size:15px;font-weight:600;color:var(--text)}
.meta-cell span{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}

.lm-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.lm-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);border-radius:99px;
  padding:5px 12px;font-size:12px;color:var(--text-secondary);
}
.lm-pill.on{background:var(--accent-light);border-color:#b8d9c2;color:var(--accent);font-weight:600}
.lm-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.outcomes-list{list-style:none;margin:10px 0 22px}
.outcomes-list li{padding:7px 0 7px 22px;position:relative;font-size:14px;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.outcomes-list li::before{content:'✓';position:absolute;left:0;color:var(--accent);font-weight:700}

/* ── Motivation hooks ── */
.hook-box{
  border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:12px;font-size:14px;
}
.hook-stakes{background:var(--warn-light);border-left:3px solid var(--warn);color:var(--warn)}
.hook-gap{background:var(--gold-light);border-left:3px solid var(--gold);color:#7a5a1a}
.hook-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* ── Section intro ── */
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.objectives-list{list-style:none;margin:10px 0 22px}
.objectives-list li{padding:8px 12px 8px 34px;position:relative;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.objectives-list li::before{content:'→';position:absolute;left:12px;color:var(--accent)}

/* ── Experience screen ── */
.exp-header{margin-bottom:24px}
.exp-header h2{font-size:26px;margin:8px 0 8px}
.exp-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.exp-meta-item{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px}

.cognitive-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}

/* Content blocks */
.content-block-text{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:18px}
.content-block-image{margin-bottom:18px}
.content-block-image img{width:100%;border-radius:var(--radius);border:1px solid var(--border)}
.content-block-image .img-caption{font-size:12px;color:var(--text-secondary);text-align:center;margin-top:6px}

/* Worked example */
.worked-example{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px}
.we-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-muted);margin-bottom:8px}
.we-problem{font-size:14px;font-weight:600;margin-bottom:10px}
.we-steps{list-style:none;counter-reset:we}
.we-steps li{counter-increment:we;padding:6px 0 6px 28px;position:relative;font-size:13.5px;color:var(--text-secondary)}
.we-steps li::before{content:counter(we);position:absolute;left:0;width:20px;height:20px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;top:6px}
.we-conclusion{margin-top:10px;font-size:13px;color:var(--accent);font-style:italic}

/* ── Interactions ── */
.interaction-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.interaction-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.int-prediction .interaction-label{color:var(--blue)}
.int-reflection .interaction-label{color:var(--violet)}
.int-compare .interaction-label{color:var(--gold)}
.int-retrieval .interaction-label{color:var(--accent)}
.int-transfer .interaction-label{color:var(--warn)}

.interaction-prompt{font-size:15px;font-weight:500;margin-bottom:16px;line-height:1.5}

/* Short answer input */
.sa-textarea{
  width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
  resize:vertical;min-height:90px;transition:border .15s;background:var(--surface);
}
.sa-textarea:focus{outline:none;border-color:var(--accent)}
.sa-textarea:disabled{opacity:.7;background:var(--bg)}

/* Confidence slider */
.confidence-block{
  background:var(--gold-light);border:1px solid #e8d5a8;border-radius:8px;
  padding:12px 16px;margin-top:12px;
}
.confidence-label{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:8px}
.confidence-row{display:flex;align-items:center;gap:12px}
.confidence-slider{flex:1;accent-color:var(--gold);cursor:pointer}
.confidence-value{font-size:13px;font-weight:700;color:var(--gold);min-width:20px;text-align:center}
.confidence-anchors{display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-top:4px}

/* Compare responses */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.compare-card{border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.5}
.compare-expert{background:var(--accent-light);border:1px solid #b8d9c2}
.compare-expert .compare-card-label{color:var(--accent);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-strong{background:var(--blue-light);border:1px solid #bfdbfe}
.compare-strong .compare-card-label{color:var(--blue);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-weak{background:var(--warn-light);border:1px solid #f5c3b8}
.compare-weak .compare-card-label{color:var(--warn);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-reasoning{margin-top:8px}
.compare-reasoning li{font-size:12px;color:var(--text-secondary);margin-left:14px;margin-bottom:2px}
.compare-diagnosis{margin-top:6px;font-size:12px;color:var(--warn)}

/* Reflection shown post-feedback */
.reflection-gate{font-size:12px;color:var(--text-secondary);font-style:italic;margin-bottom:10px}

/* Transfer exercise */
.transfer-scenario{background:var(--gold-light);border:1px solid #e8d5a8;border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:14px}
.transfer-scenario-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.transfer-criteria{list-style:none;margin-top:10px}
.transfer-criteria li{font-size:13px;color:var(--text-secondary);padding:4px 0 4px 18px;position:relative}
.transfer-criteria li::before{content:'◇';position:absolute;left:0;color:var(--accent);font-size:11px}

/* Retrieval prompt */
.retrieval-prompt-box{background:var(--accent-light);border:1px solid #b8d9c2;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.retrieval-prompt-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.retrieval-difficulty{display:inline-flex;gap:2px;margin-left:8px}
.retrieval-difficulty span{width:8px;height:8px;border-radius:2px;background:var(--border)}
.retrieval-difficulty span.filled{background:var(--accent)}

/* Submit + feedback */
.submit-row{margin-top:14px;display:flex;gap:10px;align-items:center}
.feedback-revealed{display:none;margin-top:16px;padding:14px 16px;border-radius:8px;font-size:13.5px;line-height:1.6}
.feedback-revealed.show{display:block}
.feedback-correct{background:var(--accent-light);border:1px solid #b8d9c2;color:var(--accent)}
.feedback-neutral{background:var(--blue-light);border:1px solid #bfdbfe;color:var(--blue)}
.feedback-revealed strong{display:block;margin-bottom:4px;font-weight:700}

/* ── Assessment ── */
.assess-intro{margin-bottom:28px}
.assess-rubric{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-top:12px}
.rubric-row{display:flex;gap:10px;margin-bottom:6px;font-size:13px}
.rubric-row:last-child{margin-bottom:0}
.rubric-level{font-weight:700;min-width:72px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.rubric-excellent .rubric-level{color:var(--accent)}
.rubric-adequate .rubric-level{color:var(--gold)}
.rubric-weak .rubric-level{color:var(--warn)}
.rubric-desc{color:var(--text-secondary)}

/* ── Experience summary ── */
.exp-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
.exp-summary-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px}
.mastery-meter{background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.mastery-fill{height:100%;border-radius:99px;transition:width .6s ease}
.mastery-fill.novice{background:#d1d5db}
.mastery-fill.developing{background:var(--gold)}
.mastery-fill.proficient{background:var(--blue)}
.mastery-fill.mastered{background:var(--accent)}

/* ── Glossary drawer ── */
#glossary-btn{
  position:fixed;bottom:22px;right:22px;
  background:var(--accent);color:#fff;border:none;border-radius:99px;
  padding:9px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;box-shadow:0 4px 16px rgba(45,90,61,.3);z-index:100;
  display:flex;align-items:center;gap:5px;
}
#glossary-drawer{
  position:fixed;bottom:0;right:0;width:320px;max-height:50vh;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.1);z-index:200;display:none;flex-direction:column;
}
#glossary-drawer.open{display:flex}
#glossary-drawer-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#glossary-drawer-header h4{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary)}
#glossary-close{background:none;border:none;cursor:pointer;font-size:17px;color:var(--text-secondary)}
#glossary-body{overflow-y:auto;padding:8px 0}
.glossary-term{padding:9px 16px;border-bottom:1px solid var(--border)}
.glossary-term dt{font-size:13px;font-weight:600;color:var(--accent)}
.glossary-term dd{font-size:13px;color:var(--text-secondary);margin-top:2px}

/* ── Complete screen ── */
#screen-complete{text-align:center;padding:60px 20px}
.complete-badge{width:76px;height:76px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 24px}

/* Scrollbar */
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

@media(max-width:680px){#sidebar{display:none}#main{padding:24px 18px}}
</style>
</head>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <div class="course-label">Course</div>
      <h2 id="sidebar-title"></h2>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      <div id="progress-label"></div>
    </div>
    <div id="competency-sidebar">
      <div class="comp-label">Competency Progress</div>
      <div id="competency-bars"></div>
    </div>
    <div id="sidebar-nav"></div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div id="screen-intro"    class="screen active"></div>
    <div id="screen-section"  class="screen"></div>
    <div id="screen-exp"      class="screen"></div>
    <div id="screen-assess"   class="screen"></div>
    <div id="screen-complete" class="screen">
      <div class="complete-badge">🎓</div>
      <h1 style="font-size:38px;margin-bottom:12px">Course Complete!</h1>
      <p style="color:var(--text-secondary);font-size:16px;max-width:460px;margin:0 auto 30px">
        You've worked through every section, experience, and assessment. Well done.
      </p>
      <button class="btn btn-primary" onclick="goScreen('intro')">Back to Start</button>
    </div>
  </main>
</div>

<button id="glossary-btn" onclick="toggleGlossary()">📖 Glossary</button>
<div id="glossary-drawer">
  <div id="glossary-drawer-header">
    <h4>Glossary</h4>
    <button id="glossary-close" onclick="toggleGlossary()">✕</button>
  </div>
  <div id="glossary-body"></div>
</div>

              "blockId": "tsconfig-text-01",
              "type": "text",
              "content": "The tsconfig.json is the architectural foundation of your TypeScript project. Getting it right from the start prevents entire categories of bugs and ensures your build pipeline stays fast as the codebase grows. For a SaaS frontend, you typically need at least two configs: one for source compilation and one for tooling (Jest, Storybook, etc.).\n\nStart with a base config that encodes your strictness policy, then extend it per environment. The strict flag is non-negotiable in production codebases — it turns on seven safety checks at once. Of these, strictNullChecks has the highest ROI: it forces you to acknowledge that any value might be undefined, eliminating entire classes of runtime errors.\n\ntarget and lib must be chosen together. If you target ES2020 but forget to add ES2020 to lib, you lose the type definitions for Promise.allSettled and similar APIs. For most modern SaaS apps, target ES2020 with lib: [\"ES2020\", \"DOM\", \"DOM.Iterable\"] is a safe baseline.\n\nmoduleResolution: 'bundler' is the correct choice for Vite or webpack projects. It respects the exports field in package.json, which many modern packages use to provide separate CJS and ESM entry points. The older 'node' strategy will silently resolve to the wrong entry point for these packages.\n\nPath aliases clean up import chains. Without aliases, deeply nested components end up with imports like ../../../utils/formatDate. With baseUrl and paths configured, this becomes @utils/formatDate, which is refactoring-safe and readable.\n\nFor larger teams, project references let you express explicit dependencies between packages inside a monorepo. TypeScript will only rebuild packages whose inputs have changed, dramatically speeding up incremental builds.\n\nWorked Example — Problem: A new SaaS frontend project using Vite and React needs a tsconfig that enforces strict typing, supports absolute imports from src/, and works correctly with the build pipeline.\n\nStep 1 — Create the base tsconfig.json:\n{\n  \"compilerOptions\": {\n    \"target\": \"ES2020\",\n    \"lib\": [\"ES2020\", \"DOM\", \"DOM.Iterable\"],\n    \"module\": \"ESNext\",\n    \"moduleResolution\": \"bundler\",\n    \"jsx\": \"react-jsx\",\n    \"strict\": true,\n    \"noUncheckedIndexedAccess\": true,\n    \"noImplicitOverride\": true,\n    \"exactOptionalPropertyTypes\": true,\n    \"baseUrl\": \".\",\n    \"paths\": {\n      \"@components/*\": [\"src/components/*\"],\n      \"@utils/*\": [\"src/utils/*\"],\n      \"@hooks/*\": [\"src/hooks/*\"],\n      \"@types/*\": [\"src/types/*\"]\n    },\n    \"isolatedModules\": true,\n    \"esModuleInterop\": true,\n    \"forceConsistentCasingInFileNames\": true,\n    \"skipLibCheck\": true,\n    \"outDir\": \"dist\",\n    \"declaration\": true,\n    \"declarationMap\": true,\n    \"sourceMap\": true\n  },\n  \"include\": [\"src\"]\n}\n\nStep 2 — Add noUncheckedIndexedAccess: true. This flag makes array[0] return T | undefined instead of T, which is accurate — arrays can be empty. This is not included in strict but is highly recommended.\n\nStep 3 — Create tsconfig.node.json for Vite config files:\n{\n  \"extends\": \"./tsconfig.json\",\n  \"compilerOptions\": {\n    \"module\": \"CommonJS\",\n    \"moduleResolution\": \"node\"\n  },\n  \"include\": [\"vite.config.ts\"]\n}\n\nStep 4 — Reference both in tsconfig.json using references if needed, or just use the include field to separate concerns.\n\nConclusion: This configuration gives you maximum type safety (strict + noUncheckedIndexedAccess + exactOptionalPropertyTypes), clean imports via path aliases, and compatibility with Vite's esbuild-based transpilation via isolatedModules."

              "blockId": "eslint-text-01",
              "type": "text",
              "content": "ESLint with typescript-eslint is how you enforce the rules that TypeScript's type system cannot express alone. TypeScript tells you that a variable is of type Promise<void> — ESLint's no-floating-promises rule tells you that you forgot to await it. These are complementary layers of safety.\n\nThe most powerful typescript-eslint rules require type information, meaning ESLint must invoke the TypeScript compiler during linting. This is slower but catches real bugs: no-floating-promises, await-thenable, no-misused-promises, no-unsafe-assignment, require-await. The performance cost is manageable when you separate type-aware rules into a dedicated step that runs in CI but not necessarily on every save.\n\nA shared ESLint config package is essential for teams with multiple packages. Instead of duplicating .eslintrc configs, you publish an internal package like @acme/eslint-config and extend it everywhere. This means a single PR updates linting rules across the whole organization.\n\nWorked Example — Problem: A SaaS team has five frontend packages with diverging linting rules. Some allow explicit any, some do not. Runtime bugs from unhandled promises have appeared in production.\n\nStep 1 — Create packages/eslint-config/index.js:\nmodule.exports = {\n  parser: '@typescript-eslint/parser',\n  parserOptions: {\n    ecmaVersion: 2020,\n    sourceType: 'module',\n    project: true\n  },\n  plugins: ['@typescript-eslint'],\n  extends: [\n    'eslint:recommended',\n    'plugin:@typescript-eslint/recommended',\n    'plugin:@typescript-eslint/recommended-requiring-type-checking'\n  ],\n  rules: {\n    '@typescript-eslint/no-explicit-any': 'error',\n    '@typescript-eslint/no-floating-promises': 'error',\n    '@typescript-eslint/consistent-type-imports': ['error', { prefer: 'type-imports' }],\n    '@typescript-eslint/no-unnecessary-condition': 'error',\n    '@typescript-eslint/strict-boolean-expressions': 'error'\n  }\n};\n\nStep 2 — In each package's eslint.config.js, extend the shared config:\nimport config from '@acme/eslint-config';\nexport default [...config, { files: ['**/*.tsx'] }];\n\nStep 3 — Add lint:types script to package.json that runs eslint with only type-aware rules. Run this in CI, not in watch mode.\n\nStep 4 — Add a pre-commit hook using lint-staged that runs only syntax-level (non-type-aware) rules on changed files for fast feedback.\n\nConclusion: Centralizing ESLint config eliminates drift between packages, and separating type-aware rules from syntax rules keeps developer feedback loops fast while still catching async bugs in CI."
            }

          "contentBlocks": [

              "blockId": "decl-text-01",
              "type": "text",
              "content": "Not every library ships TypeScript types, and even those that do sometimes have gaps. Declaration files let you describe the shape of JavaScript code to the TypeScript compiler without rewriting the code itself. Writing them well is a core skill for any professional TypeScript developer.\n\nThere are three scenarios where you write .d.ts files: typing an untyped third-party library, augmenting an existing library's types, and declaring global variables injected by your build tool or runtime.\n\nFor an untyped library, you can create src/types/some-library.d.ts and use declare module 'some-library' to describe its exports. The file should match the actual API — a minimal, accurate description is better than a complete but wrong one.\n\nModule augmentation is more surgical. If a library like Express doesn't include your custom property on the Request object, you can add it without touching the library's own types by reopening the module declaration.\n\nGlobal augmentation is needed when your build tool injects variables like __APP_VERSION__ or import.meta.env. These must be declared as globals or as properties on the appropriate interface.\n\nWorked Example — Problem: The team uses a legacy analytics library, legacy-analytics, that has no @types package. The library exports a function track(event: string, props: object): void and an object Analytics with a userId property. TypeScript reports errors on every usage.\n\nStep 1 — Create src/types/legacy-analytics.d.ts:\ndeclare module 'legacy-analytics' {\n  interface TrackProperties {\n    [key: string]: string | number | boolean;\n  }\n  export function track(event: string, properties?: TrackProperties): void;\n  export const Analytics: {\n    userId: string | null;\n    initialize(apiKey: string): void;\n    reset(): void;\n  };\n}\n\nStep 2 — Ensure tsconfig includes the types directory. Set include to [\"src\"] which recursively includes src/types.\n\nStep 3 — Augment Express Request to add the authenticated user. Create src/types/express.d.ts:\nimport type { User } from '../models/User';\ndeclare module 'express-serve-static-core' {\n  interface Request {\n    currentUser?: User;\n  }\n}\nNote the import at the top — this is required to make the file a module, enabling augmentation rather than replacement.\n\nStep 4 — Declare Vite's injected env variables in src/vite-env.d.ts:\n/// <reference types=\"vite/client\" />\ninterface ImportMetaEnv {\n  readonly VITE_API_URL: string;\n  readonly VITE_STRIPE_KEY: string;\n}\n\nConclusion: Declaration files let you bring untyped code into the type-safe world without waiting for upstream maintainers. The key discipline is keeping them accurate — a lying type is worse than no type."
            }

          "contentBlocks": [

              "blockId": "cond-map-text-01",
              "type": "text",
              "content": "Conditional and mapped types are the metaprogramming layer of TypeScript's type system. They let you express relationships between types programmatically, which is essential for building reusable type utilities across a frontend codebase.\n\nConditional types follow the pattern: T extends U ? TrueType : FalseType. When T is a union, this distributes: (A | B) extends U becomes (A extends U ? X : Y) | (B extends U ? X : Y). This distribution is powerful but can be surprising — wrapping the type in a tuple [T] extends [U] disables it when you need non-distributed behavior.\n\nThe infer keyword lets you capture a piece of a type during pattern matching. Built-in utility types like ReturnType<T> and Parameters<T> are implemented using infer. Understanding infer lets you write your own versions for more specific needs.\n\nMapped types transform all properties of an existing type. TypeScript's built-in Partial<T>, Required<T>, Readonly<T>, and Pick<T, K> are all implemented as mapped types. Writing your own mapped types is how you derive API response types from domain model types, or create form state types from data model types.\n\nWorked Example — Problem: A SaaS app has a large ApiResponse<T> type where every field is nullable because the API can return null for any missing field. The team needs a utility type DeepNonNullable<T> that recursively removes null and undefined from all properties, to use after runtime null checks have validated the data.\n\nStep 1 — Write DeepNonNullable:\ntype DeepNonNullable<T> = T extends null | undefined\n  ? never\n  : T extends object\n  ? { [K in keyof T]-?: DeepNonNullable<T[K]> }\n  : T;\n\nStep 2 — Verify it works:\ntype ApiUser = {\n  id: string | null;\n  profile: {\n    name: string | null;\n    avatarUrl: string | null | undefined;\n  } | null;\n};\ntype User = DeepNonNullable<ApiUser>;\n// Result: { id: string; profile: { name: string; avatarUrl: string; } }\n\nStep 3 — Write a companion type guard that narrows to the cleaned type:\nfunction isLoaded<T>(value: T): value is DeepNonNullable<T> {\n  if (value === null || value === undefined) return false;\n  if (typeof value === 'object') {\n    return Object.values(value as object).every(isLoaded);\n  }\n  return true;\n}\n\nStep 4 — Write a mapped type that renames all keys to snake_case equivalents using template literals, for API serialization:\ntype ToSnakeCase<S extends string> =\n  S extends `${infer Head}${infer Tail}`\n    ? Head extends Uppercase<Head>\n      ? `_${Lowercase<Head>}${ToSnakeCase<Tail>}`\n      : `${Head}${ToSnakeCase<Tail>}`\n    : S;\ntype SnakeCaseKeys<T> = { [K in keyof T as ToSnakeCase<K & string>]: T[K] };\n\nConclusion: Conditional and mapped types let you derive new types from existing ones programmatically, eliminating the need to maintain parallel type definitions. This is critical for keeping API types, form types, and domain model types in sync."

              "blockId": "tlt-text-01",
              "type": "text",
              "content": "Template literal types bring the expressive power of JavaScript template strings to the type level. They are most valuable for building precise string-based APIs: event systems, route definitions, CSS utility types, and i18n key lookup.\n\nThe most immediately useful application is typed event names. Instead of accepting any string as an event name, you can define a type that only accepts valid combinations. Similarly, API route types can be constructed from path parameter templates, making route functions that are both type-safe and self-documenting.\n\nTemplate literals distribute over unions automatically. type EventName = `on${Capitalize<'click' | 'focus' | 'blur'>}` produces 'onClick' | 'onFocus' | 'onBlur'. This is much less error-prone than maintaining the union manually.\n\nCombined with infer, template literal types can parse structured strings. This is useful for extracting parameters from route patterns or extracting the HTTP method from a method-prefixed key.\n\nWorked Example — Problem: A SaaS frontend has a pub/sub event bus where events are named with a domain:action convention (e.g., 'user:created', 'subscription:upgraded'). Currently, event names are plain strings, leading to typos and undocumented events. The team wants a type-safe event bus.\n\nStep 1 — Define the event registry:\ntype EventMap = {\n  'user:created': { userId: string; email: string };\n  'user:deleted': { userId: string };\n  'subscription:upgraded': { planId: string; previousPlanId: string };\n  'subscription:cancelled': { reason: string };\n  'feature:toggled': { featureKey: string; enabled: boolean };\n};\n\nStep 2 — Create type-safe emit and on functions:\ntype EventName = keyof EventMap;\nclass EventBus {\n  on<K extends EventName>(event: K, handler: (payload: EventMap[K]) => void): () => void { ... }\n  emit<K extends EventName>(event: K, payload: EventMap[K]): void { ... }\n}\n\nStep 3 — Extract domain prefixes:\ntype ExtractDomain<T extends string> = T extends `${infer Domain}:${string}` ? Domain : never;\ntype EventDomain = ExtractDomain<EventName>; // 'user' | 'subscription' | 'feature'\n\nStep 4 — Filter events by domain:\ntype DomainEvents<D extends EventDomain> = {\n  [K in EventName]: K extends `${D}:${string}` ? K : never;\n}[EventName];\ntype UserEvents = DomainEvents<'user'>; // 'user:created' | 'user:deleted'\n\nConclusion: Template literal types transform string-based APIs from stringly-typed to structurally typed, catching entire classes of bugs at compile time with zero runtime overhead."
            }

          "contentBlocks": [
            {
              "blockId": "generics-text-01",
              "type": "text",
              "content": "Generics are the mechanism for writing code that is both reusable and type-safe. Understanding variance — how types relate when they are used as function parameters versus return types — is what separates developers who use generics correctly from those who add type assertions to make the compiler happy.\n\nConstraints (T extends SomeType) serve two purposes: they allow the body of a generic function to access properties of SomeType on the parameter, and they restrict callers to passing compatible types. A common mistake is over-constraining with a specific concrete type when a structural constraint would be more reusable.\n\nVariance determines when one type is substitutable for another. Output positions (return types) are covariant — you can use a more specific type. Input positions (parameter types) are contravariant — you need a more general type. TypeScript's function types follow these rules, and violating them leads to unsound code. The strictFunctionTypes flag enforces method parameter contravariance.\n\nHigher-order generic functions — functions that take generic functions as parameters — require careful typing to avoid losing type information. The standard technique is using a generic callback parameter with its own type parameter.\n\nWorked Example — Problem: A data fetching layer needs a generic repository factory. Given any API endpoint function, it should return a repository object with typed data, loading state, and error state. The type information from the endpoint function should flow through to the repository's data type.\n\nStep 1 — Define the generic repository type:\ninterface Repository<T> {\n  data: T | null;\n  isLoading: boolean;\n  error: Error | null;\n  refresh: () => Promise<void>;\n}\n\nStep 2 — Write the factory:\nfunction createRepository<T>(fetcher: () => Promise<T>): Repository<T> { ... }\n\nStep 3 — TypeScript infers T from the fetcher's return type:\nconst userRepo = createRepository(() => fetchUser('123'));\n// userRepo.data is User | null — inferred, no annotation needed\n\nStep 4 — Add transform overload:\nfunction createRepository<T, U = T>(\n  fetcher: () => Promise<T>,\n  transform?: (raw: T) => U\n): Repository<U>;\n\nConclusion: Generic constraints and inference let you write genuinely reusable code — the same repository factory works for any API endpoint, and TypeScript carries the type information through every transformation without manual annotation."
            }

          "contentBlocks": [
            {
              "blockId": "du-text-01",
              "type": "text",
              "content": "Discriminated unions are the most expressive tool for modeling domain state in TypeScript. They force you to think about all valid states upfront and make invalid states unrepresentable, which is a significant shift from stringly-typed or boolean-flag-heavy state.\n\nThe classic example is async state: data is either loading, loaded, or errored. Modeling this as { isLoading: boolean; data?: T; error?: Error } allows impossible combinations (isLoading: true and data: {...} simultaneously). A discriminated union eliminates that:\ntype AsyncState<T> =\n  | { status: 'idle' }\n  | { status: 'loading' }\n  | { status: 'success'; data: T }\n  | { status: 'error'; error: Error };\n\nTypeScript narrows the type inside each branch of a switch or if/else statement based on the discriminant field. Within the status === 'success' branch, TypeScript knows data exists and is of type T.\n\nExhaustiveness checking with never ensures that when a new member is added to the union, every switch statement that handles it fails to compile until a new case is added.\n\nThe Result pattern brings typed error handling to functions that can fail. Instead of throw/catch, a function returns Result<T, E> where T is the success type and E is the error type.\n\nWorked Example — Problem: A payment processing flow has three possible outcomes: success, a user-correctable error, and a non-recoverable error. The current code throws exceptions, making the error paths invisible in function signatures.\n\nStep 1 — Define Result type and helpers:\ntype Success<T> = { ok: true; value: T };\ntype Failure<E> = { ok: false; error: E };\ntype Result<T, E = Error> = Success<T> | Failure<E>;\nfunction ok<T>(value: T): Success<T> { return { ok: true, value }; }\nfunction fail<E>(error: E): Failure<E> { return { ok: false, error }; }\n\nStep 2 — Define payment error union:\ntype PaymentError =\n  | { kind: 'card_declined'; message: string; retryable: true }\n  | { kind: 'invalid_cvv'; message: string; retryable: true }\n  | { kind: 'service_unavailable'; message: string; retryable: false };\n\nStep 3 — Write payment function with Result return type:\nasync function processPayment(amount: number, cardToken: string): Promise<Result<{ transactionId: string }, PaymentError>> { ... }\n\nStep 4 — Handle exhaustively in UI:\nswitch (result.error.kind) {\n  case 'card_declined':\n  case 'invalid_cvv':\n    showRetryableError(result.error.message); break;\n  case 'service_unavailable':\n    showFatalError(result.error.message); break;\n  default:\n    const _exhaustive: never = result.error;\n    throw new Error('Unhandled payment error');\n}\n\nConclusion: Discriminated unions combined with exhaustiveness checking make it impossible to silently ignore new error cases. The compiler becomes a collaborator that enforces correctness across every call site."
            }

              "content": "React component types are the most common TypeScript surface area in a SaaS frontend. Getting them right means component consumers have accurate autocomplete, required props are enforced, and impossible prop combinations are rejected at compile time.\n\nThe React.FC type adds an implicit children prop and is generally considered a footgun. The community has largely moved to typing components as plain functions with explicit prop interfaces. This is clearer and does not hide the children prop.\n\nRef forwarding is used when a parent component needs to imperatively interact with a child component's DOM node or exposed API. The typing requires two type parameters: the type of the ref handle, and the props of the component. useImperativeHandle further refines this by letting you expose only specific methods.\n\nEvent handling is a common source of type errors. The key insight is that React.ChangeEvent<T>, React.MouseEvent<T>, etc. all take the element type as a generic parameter. Being specific (HTMLInputElement vs HTMLElement) gives you access to the correct properties like value, checked, and files.\n\nDiscriminated union props are the TypeScript-native solution to the 'this prop is only valid when that prop is set' problem. They are more maintainable than runtime PropTypes checks.\n\nWorked Example — Problem: A reusable Button component needs to support two modes: a standard button (with an onClick handler) and a link button (with an href). These modes are mutually exclusive.\n\nStep 1 — Define discriminated union props:\ntype ButtonBaseProps = {\n  label: string;\n  variant?: 'primary' | 'secondary' | 'ghost';\n  size?: 'sm' | 'md' | 'lg';\n  disabled?: boolean;\n  loading?: boolean;\n};\ntype ButtonActionProps = ButtonBaseProps & { as?: 'button'; onClick: (event: React.MouseEvent<HTMLButtonElement>) => void; href?: never; };\ntype ButtonLinkProps = ButtonBaseProps & { as: 'a'; href: string; onClick?: never; };\ntype ButtonProps = ButtonActionProps | ButtonLinkProps;\n\nStep 2 — Implement with forwardRef:\nconst Button = React.forwardRef<HTMLButtonElement | HTMLAnchorElement, ButtonProps>(\n  ({ label, variant = 'primary', size = 'md', loading, ...props }, ref) => {\n    if (props.as === 'a') {\n      return <a ref={ref as React.Ref<HTMLAnchorElement>} href={props.href} className={...}>{label}</a>;\n    }\n    return <button ref={ref as React.Ref<HTMLButtonElement>} onClick={props.onClick} disabled={props.disabled || loading}>{label}</button>;\n  }\n);\n\nStep 3 — Verify exclusive props at compile time:\n// TypeScript error: onClick conflicts with 'never' on ButtonLinkProps\n<Button as=\"a\" href=\"/home\" onClick={() => {}} label=\"Home\" />\n\nConclusion: Discriminated union props make API contracts explicit in the type system rather than documentation, and forwardRef with explicit generic parameters ensures parent components can interact with the DOM correctly."
            }

              "blockId": "generic-components-text-01",
              "type": "text",
              "content": "Generic components are the building blocks of type-safe, reusable UI libraries. A generic List component that works with any data type, a generic Select that narrows option values, and a generic DataTable that columns are typed to the data shape — these patterns eliminate entire categories of prop mismatch bugs.\n\nThe challenge with generic arrow components in .tsx files is that the generic angle bracket conflicts with JSX syntax. The solution is adding a trailing comma after the type parameter: <T,>. Alternatively, use function declarations, which do not have this ambiguity.\n\nPolymorphic components — components that render as different HTML elements based on an as prop — require more sophisticated typing. The props of the component should change based on the as value. ComponentPropsWithoutRef<C> makes this precise.\n\nRender props and children-as-function patterns allow a parent component to share computed state with its children without prop drilling. The type of the function is defined in the parent's props interface.\n\nWorked Example — Problem: A data-heavy SaaS dashboard needs a reusable DataTable component. The column definitions should be typed to the specific row type — you should not be able to define a column that accesses a field that does not exist on the row type.\n\nStep 1 — Define generic column and table types:\ninterface Column<T> {\n  key: keyof T;\n  header: string;\n  render?: (value: T[keyof T], row: T) => React.ReactNode;\n  sortable?: boolean;\n}\ninterface DataTableProps<T extends Record<string, unknown>> {\n  data: T[];\n  columns: Column<T>[];\n  keyExtractor: (row: T) => string;\n  onRowClick?: (row: T) => void;\n  emptyState?: React.ReactNode;\n}\n\nStep 2 — Implement as a function declaration to avoid JSX generic ambiguity:\nfunction DataTable<T extends Record<string, unknown>>({\n  data, columns, keyExtractor, onRowClick, emptyState\n}: DataTableProps<T>) { ... }\n\nStep 3 — TypeScript catches invalid column keys:\n<DataTable<Subscription>\n  columns={[\n    { key: 'plan', header: 'Plan' },\n    { key: 'nonExistent', header: 'Bad' } // compile error\n  ]}\n  keyExtractor={(row) => row.id}\n/>\n\nConclusion: Generic components propagate type information from data to rendering logic, turning runtime data shape mismatches into compile-time errors."

          "contentBlocks": [

              "blockId": "typed-hooks-text-01",
              "type": "text",
              "content": "Custom hooks are the primary mechanism for encapsulating stateful logic in React. Typing them well means that consumers get accurate types without having to look at implementation details.\n\nThe most common mistake when typing custom hooks is adding an explicit return type annotation on a tuple return. If you return [state, setState] with an explicit annotation, callers who destructure get (State | Dispatch<...>)[] — a union array — instead of the correct tuple. The fix is as const on the returned tuple.\n\nuseReducer is the natural pair for discriminated union action types. Each action in the union represents a state transition, and the reducer becomes a type-safe state machine. The exhaustiveness pattern applies directly here.\n\nContext is famously awkward to type because createContext requires an initial value, but the real value is only available inside the provider. The correct pattern is createContext<T | undefined>(undefined) paired with a consuming hook that throws a meaningful error when used outside the provider.\n\nWorked Example — Problem: A SaaS app has a multi-step onboarding flow. The flow state needs to be shared across several components and the state transitions must be type-safe.\n\nStep 1 — Define state machine:\ntype OnboardingStep =\n  | { step: 'welcome' }\n  | { step: 'profile'; inviteCode?: string }\n  | { step: 'billing'; profileData: { name: string; email: string } }\n  | { step: 'complete'; subscriptionId: string };\ntype OnboardingAction =\n  | { type: 'START_PROFILE'; inviteCode?: string }\n  | { type: 'COMPLETE_PROFILE'; name: string; email: string }\n  | { type: 'COMPLETE_BILLING'; subscriptionId: string }\n  | { type: 'RESET' };\n\nStep 2 — Write the reducer with exhaustiveness:\nfunction onboardingReducer(state: OnboardingStep, action: OnboardingAction): OnboardingStep {\n  switch (action.type) {\n    case 'START_PROFILE': return { step: 'profile', inviteCode: action.inviteCode };\n    case 'COMPLETE_PROFILE': return { step: 'billing', profileData: { name: action.name, email: action.email } };\n    case 'COMPLETE_BILLING': return { step: 'complete', subscriptionId: action.subscriptionId };\n    case 'RESET': return { step: 'welcome' };\n    default: const _: never = action; return state;\n  }\n}\n\nStep 3 — Create context with safe consumer hook:\nconst OnboardingContext = React.createContext<{ state: OnboardingStep; dispatch: React.Dispatch<OnboardingAction> } | undefined>(undefined);\nexport function useOnboarding() {\n  const context = React.useContext(OnboardingContext);\n  if (!context) throw new Error('useOnboarding must be used within OnboardingProvider');\n  return context;\n}\n\nStep 4 — Provider:\nexport function OnboardingProvider({ children }: { children: React.ReactNode }) {\n  const [state, dispatch] = React.useReducer(onboardingReducer, { step: 'welcome' });\n  return <OnboardingContext.Provider value={{ state, dispatch }}>{children}</OnboardingContext.Provider>;\n}\n\nConclusion: Typing context with an undefined guard and useReducer with discriminated union actions creates a type-safe state machine that makes invalid transitions compile errors."

          "contentBlocks": [
            {
              "blockId": "api-types-text-01",
              "type": "text",
              "content": "API response types are the most dangerous trust boundary in a frontend codebase. The shape of data coming from an API is not controlled by TypeScript — it is controlled by a server, a third party, or a separate team. Casting the response to a TypeScript type with 'as' gives you false safety: the type says one thing, the runtime data might be something completely different.\n\nThe solution is schema validation at the data boundary. Zod is the most widely adopted library for this because it generates TypeScript types from its schemas, eliminating the need to maintain parallel schema and type definitions. One Zod schema definition gives you both the TypeScript type and the runtime validator.\n\nFor teams with an existing OpenAPI specification, openapi-typescript can generate types directly from the spec. The generated types are path-keyed, letting you look up the request and response types for any endpoint by its path string.\n\nWorked Example — Problem: A SaaS frontend has been using 'as unknown as User' after every fetch call. A production bug occurred when the API added a required field the frontend was not sending.\n\nStep 1 — Define Zod schemas:\nimport { z } from 'zod';\nconst RoleSchema = z.enum(['admin', 'member', 'viewer']);\nconst UserSchema = z.object({\n  id: z.string().uuid(),\n  email: z.string().email(),\n  name: z.string().min(1),\n  role: RoleSchema,\n  createdAt: z.string().datetime(),\n  features: z.record(z.boolean()).optional()\n});\nexport type User = z.infer<typeof UserSchema>;\nexport type Role = z.infer<typeof RoleSchema>;\n\nStep 2 — Build a typed fetch wrapper:\nasync function fetchValidated<T>(\n  schema: z.ZodSchema<T>,\n  url: string,\n  options?: RequestInit\n): Promise<Result<T, Error>> {\n  try {\n    const response = await fetch(url, options);\n    if (!response.ok) return fail(new Error(`HTTP ${response.status}`));\n    const json: unknown = await response.json();\n    const result = schema.safeParse(json);\n    if (!result.success) {\n      const message = result.error.errors.map(e => `${e.path.join('.')}: ${e.message}`).join(', ');\n      return fail(new Error(`Invalid API response: ${message}`));\n    }\n    return ok(result.data);\n  } catch (e) {\n    return fail(e instanceof Error ? e : new Error(String(e)));\n  }\n}\n\nStep 3 — Use in data layer:\nexport async function getUsers(page: number): Promise<Result<UserList, Error>> {\n  return fetchValidated(UserListSchema, `/api/users?page=${page}`);\n}\n\nConclusion: Zod schemas at the API boundary turn runtime data validation into a type-level contract. Schema parse failures surface meaningful error messages rather than silent undefined access deep in the component tree."

          "contentBlocks": [

              "blockId": "state-mgmt-text-01",
              "type": "text",
              "content": "State management libraries require deliberate typing to provide accurate autocompletion and prevent state shape mismatches across the application. Both Redux Toolkit and Zustand have first-class TypeScript support, but both require specific patterns to realize the full benefit.\n\nFor Redux Toolkit, the key insight is to derive your types from the store itself rather than annotating them manually. RootState = ReturnType<typeof store.getState> and AppDispatch = typeof store.dispatch are the two essential derived types. If you write these manually, they silently drift from the actual store shape as slices are added.\n\ncreateAsyncThunk is the RTK way to handle side effects. Its three generic type parameters — return type, argument type, and ThunkApiConfig — fully type the async operation. The ThunkApiConfig lets you type rejectValue, enabling typed error handling in extraReducers.\n\nZustand is simpler and lower ceremony than Redux for smaller state needs. Its create<T>() generic ensures the store object matches the defined interface. The immer middleware allows direct mutations that are safe behind the scenes.\n\nWorked Example — Problem: A SaaS app needs a subscription management store with async fetching, typed state transitions, and typed hooks for components.\n\nStep 1 — Define state:\ninterface SubscriptionState {\n  current: Subscription | null;\n  status: 'idle' | 'loading' | 'succeeded' | 'failed';\n  error: string | null;\n}\n\nStep 2 — Write typed thunk:\nexport const fetchSubscription = createAsyncThunk<\n  Subscription,\n  string,\n  { rejectValue: string }\n>('subscription/fetch', async (userId, { rejectWithValue }) => {\n  const result = await getSubscriptionApi(userId);\n  if (!result.ok) return rejectWithValue(result.error.message);\n  return result.value;\n});\n\nStep 3 — Slice with builder pattern:\nbuilder\n  .addCase(fetchSubscription.fulfilled, (state, action) => {\n    state.current = action.payload; // action.payload: Subscription\n  })\n  .addCase(fetchSubscription.rejected, (state, action) => {\n    state.error = action.payload ?? 'Unknown error'; // action.payload: string | undefined\n  });\n\nStep 4 — Derived types and typed hooks:\nexport type RootState = ReturnType<typeof store.getState>;\nexport type AppDispatch = typeof store.dispatch;\nexport const useAppSelector: TypedUseSelectorHook<RootState> = useSelector;\n\nConclusion: Deriving RootState and AppDispatch from the store rather than writing them manually ensures types stay accurate as the store evolves, and typed hooks carry that precision to every component."
            }

          "contentBlocks": [
            {
              "blockId": "rq-text-01",
              "type": "text",
              "content": "TanStack Query (React Query) is the de facto data fetching and caching library for React SaaS applications. Its TypeScript support is excellent but requires specific patterns to fully benefit from, particularly around query keys and the relationship between raw API data and transformed component data.\n\nQuery keys are the identity of cached data. Typing them as const tuples rather than plain arrays makes TypeScript aware of their exact shape, which enables type-safe key-based operations. A query key factory pattern centralizes all key definitions in one place, making cache invalidation explicit and auditable.\n\nCombining Zod validation with useQuery closes the type safety loop from API to component. The queryFn validates the response with Zod, and the TData type parameter reflects the validated (not raw) type.\n\nTanStack Query v5's queryOptions() helper lets you define complete query configurations outside of components, making them composable, testable, and reusable.\n\nWorked Example — Problem: A SaaS billing page's cache invalidation after a plan change requires a full page reload because query keys are inconsistently typed.\n\nStep 1 — Define typed query key factory:\nconst subscriptionKeys = {\n  all: ['subscriptions'] as const,\n  byUser: (userId: string) => [...subscriptionKeys.all, 'byUser', userId] as const,\n  byId: (id: string) => [...subscriptionKeys.all, 'byId', id] as const,\n};\n\nStep 2 — Create query options factory:\nimport { queryOptions } from '@tanstack/react-query';\nconst subscriptionQueryOptions = (userId: string) =>\n  queryOptions({\n    queryKey: subscriptionKeys.byUser(userId),\n    queryFn: async () => {\n      const result = await fetchValidated(SubscriptionSchema, `/api/subscriptions?userId=${userId}`);\n      if (!result.ok) throw result.error;\n      return result.value;\n    },\n    staleTime: 5 * 60 * 1000\n  });\n\nStep 3 — Use in components:\nconst { data: subscription } = useQuery(subscriptionQueryOptions(userId));\n// subscription is Subscription | undefined — inferred from Zod schema\n\nStep 4 — Typed mutation with optimistic update:\nconst updatePlan = useMutation<Subscription, Error, { planId: string }, { previousSubscription: Subscription | undefined }>({\n  mutationFn: ({ planId }) => updateSubscriptionApi(userId, planId),\n  onMutate: async ({ planId }) => {\n    await queryClient.cancelQueries({ queryKey: subscriptionKeys.byUser(userId) });\n    const previousSubscription = queryClient.getQueryData<Subscription>(subscriptionKeys.byUser(userId));\n    queryClient.setQueryData(subscriptionKeys.byUser(userId), old => old ? { ...old, planId } : old);\n    return { previousSubscription };\n  },\n  onError: (_err, _vars, context) => {\n    queryClient.setQueryData(subscriptionKeys.byUser(userId), context?.previousSubscription);\n  },\n  onSettled: () => queryClient.invalidateQueries({ queryKey: subscriptionKeys.byUser(userId) })\n});\n\nConclusion: Typed query key factories combined with Zod-validated queryFns and the queryOptions helper create a data layer where the type flows from API schema through cache to component, and cache invalidation is precise and refactoring-safe."

              "blockId": "branded-text-01",
              "type": "text",
              "content": "TypeScript's structural type system is one of its greatest strengths — you do not need to annotate every interface with implements declarations. But structural typing has a blind spot: two types that represent different concepts but have the same structure are mutually assignable. UserId and OrganizationId are both strings. Passing an OrganizationId where a UserId is expected is a runtime bug that TypeScript's structural system cannot catch.\n\nBranded types solve this by attaching a phantom type property to the base type. The brand is never present at runtime — it is erased by TypeScript before compilation. But in the type system, UserId and OrganizationId are now distinct.\n\nThe brand's value guarantee comes from its constructor. The constructor validates the input before applying the brand, so any value of type UserId is guaranteed to have passed the constructor's validation. The brand is not just a label, it is evidence.\n\nFor financial and scientific SaaS applications, branded numeric types prevent unit errors. Adding USD and EUR amounts, or multiplying meters by seconds, become compile errors instead of runtime bugs.\n\nWorked Example — Problem: A SaaS platform has UserId, OrganizationId, TeamId, and ProjectId — all plain strings. A TeamId has been passed to a function expecting a ProjectId, causing data corruption.\n\nStep 1 — Define brand infrastructure:\ndeclare const __brand: unique symbol;\ntype Brand<T, TBrand extends string> = T & { readonly [__brand]: TBrand };\n\nStep 2 — Create specific ID types:\ntype UserId = Brand<string, 'UserId'>;\ntype OrganizationId = Brand<string, 'OrganizationId'>;\ntype TeamId = Brand<string, 'TeamId'>;\ntype ProjectId = Brand<string, 'ProjectId'>;\n\nStep 3 — Constructor functions with UUID validation:\nconst UUID_REGEX = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;\nfunction makeUserId(value: string): UserId {\n  if (!UUID_REGEX.test(value)) throw new Error(`Invalid UserId: ${value}`);\n  return value as UserId;\n}\n\nStep 4 — Enforce in function signatures:\nfunction getProjectMembers(projectId: ProjectId, orgId: OrganizationId): Promise<UserId[]> { ... }\n// compile error:\ngetProjectMembers(teamId, orgId); // TeamId is not assignable to ProjectId\n\nStep 5 — Integrate with Zod:\nconst UserIdSchema = z.string().uuid().transform(val => val as UserId);\n\nConclusion: Branded types add semantic safety on top of TypeScript's structural system, catching ID mixups and unit errors that structural typing cannot prevent, with zero runtime overhead."

          "contentBlocks": [
            {
              "blockId": "module-text-01",
              "type": "text",
              "content": "Module boundaries are the architectural layer that keeps large codebases maintainable. In a SaaS frontend with dozens of features, the decisions made about which modules can import from which others determine whether the codebase remains comprehensible as it grows.\n\nBarrel files are a common pattern that developers reach for to clean up import paths. The tradeoff is significant: a barrel file at features/auth/index.ts forces TypeScript to load and type-check every file exported from that barrel whenever any component imports anything from auth. In a large codebase, this visibly slows down the TypeScript language server. The recommendation for large projects is to use direct imports to the specific file, not barrel imports.\n\nCircular dependencies are a silent runtime hazard. TypeScript does not error on circular imports, but JavaScript module initialization order means that at runtime, a circularly imported value may be undefined when first accessed. The symptoms are subtle and intermittent. Static analysis with eslint-plugin-import no-cycle is the reliable prevention mechanism.\n\nimport type is an optimization that tells the build tool that an import is only needed for type checking and should be removed from the output entirely.\n\nWorked Example — Problem: A growing codebase shows intermittent undefined errors. Investigation reveals circular imports between auth, user, and permissions modules, and the auth barrel file is loaded by nearly every component.\n\nStep 1 — Map the circular chain:\nauth/index.ts → user/index.ts → permissions/index.ts → auth/index.ts\n\nStep 2 — Break the cycle by extracting shared types:\nCreate shared/types/auth.types.ts, user.types.ts, permissions.types.ts with only interfaces. None import from runtime modules.\n\nStep 3 — Convert cross-module imports to import type:\nimport type { AuthContext } from '@shared/types/auth.types'; // not from @auth/index\n\nStep 4 — Replace barrel imports with direct imports:\nimport { useAuth } from '@auth/hooks/useAuth'; // not from '@auth'\n\nStep 5 — Add no-cycle to CI:\n\"import/no-cycle\": [\"error\", { maxDepth: 3 }]\n\nConclusion: Disciplined module boundaries — no barrel files for large features, no circular runtime imports, and consistent import type usage — keep TypeScript fast and prevent an entire class of runtime initialization bugs."
            }

          "contentBlocks": [

              "blockId": "forms-text-01",
              "type": "text",
              "content": "Forms are one of the most complex UI patterns in SaaS applications. React Hook Form combined with Zod provides the best TypeScript experience: the schema is the single source of truth for both runtime validation rules and compile-time field types.\n\nThe zodResolver adapter connects Zod schema validation to React Hook Form's internal validation mechanism. When you use useForm<SchemaType>({ resolver: zodResolver(schema) }), TypeScript infers the complete form field structure from the schema. register('email') is valid; register('eamil') is a compile error.\n\nBuilding typed form field components is the key to scaling form development. A FormField component that accepts a name prop typed as FieldPath<T> gives consumers autocomplete on valid field names and type-safe access to field values.\n\nWorked Example — Problem: A SaaS onboarding form collects organization details including name, billing address (nested), and team member emails (array). Multiple developers build different parts of the form without compile-time guarantees that field names match the API payload.\n\nStep 1 — Define Zod schema:\nconst OnboardingFormSchema = z.object({\n  organizationName: z.string().min(2, 'Organization name must be at least 2 characters'),\n  billingAddress: z.object({\n    street: z.string().min(1),\n    city: z.string().min(1),\n    country: z.string().length(2, 'Use ISO country code')\n  }),\n  teamEmails: z.array(z.string().email()).min(1, 'Add at least one team member')\n});\ntype OnboardingFormData = z.infer<typeof OnboardingFormSchema>;\n\nStep 2 — Initialize form:\nconst { register, handleSubmit, control, formState: { errors } } = useForm<OnboardingFormData>({\n  resolver: zodResolver(OnboardingFormSchema),\n  defaultValues: { teamEmails: [''] }\n});\n\nStep 3 — Typed registration:\n<input {...register('billingAddress.city')} />\n// register('billingAddress.citY') is a TypeScript error\n\nStep 4 — Typed array field:\nconst { fields, append, remove } = useFieldArray({ control, name: 'teamEmails' });\n\nStep 5 — Submit with inferred type:\nconst onSubmit = (data: OnboardingFormData) => createOrganization(data);\n\nConclusion: Zod + React Hook Form creates a form layer where the same schema drives runtime validation and compile-time type safety, making field name typos and shape mismatches compile errors."

              "content": "Every growing TypeScript codebase accumulates patterns. Pagination wrappers, API envelope types, permission-gated types, nullable transformations — these appear again and again. Without a shared utility type library, developers copy-paste type definitions or, worse, use any at the point where the right type is hard to express.\n\nA project-specific utility type library is different from a general-purpose one like ts-toolbelt or type-fest. It is tailored to your domain. It contains types that reflect how your API works, how your permissions system is structured, and how your data flows.\n\nTesting utility types is an often-overlooked practice. The tsd and expect-type libraries let you write assertions that a derived type equals the expected type.\n\nWorked Example — Problem: A SaaS platform has inconsistent handling of paginated API responses and repeated inline permission checks.\n\nStep 1 — Paginated response type:\ntype PaginatedResponse<T> = {\n  items: T[];\n  pagination: {\n    total: number;\n    page: number;\n    pageSize: number;\n    hasNextPage: boolean;\n    hasPreviousPage: boolean;\n  };\n};\ntype MappedPaginatedResponse<T, U> = Omit<PaginatedResponse<T>, 'items'> & { items: U[] };\n\nStep 2 — Permission-gated feature flags:\ntype FeatureFlags = {\n  'billing.upgrade': boolean;\n  'team.invite': boolean;\n  'analytics.export': boolean;\n  'admin.settings': boolean;\n};\ntype FeatureKey = keyof FeatureFlags;\n\nStep 3 — DeepPartial for draft states:\ntype DeepPartial<T> = T extends object ? { [P in keyof T]?: DeepPartial<T[P]> } : T;\n\nStep 4 — Type-level tests:\nimport { expectType } from 'tsd';\ntype TestPaginated = PaginatedResponse<string>;\nexpectType<string[]>({} as TestPaginated['items']);\nexpectType<number>({} as TestPaginated['pagination']['total']);\n\nConclusion: A curated utility type library reduces duplication, documents architectural patterns, and makes the type system a productivity multiplier rather than an obstacle for the team."

              "blockId": "testing-text-01",
              "type": "text",
              "content": "Testing TypeScript code requires both runtime correctness tests (the usual kind) and type-level tests (assertions that your types behave as intended). Most teams do the former well and neglect the latter, but as your utility type library grows, type-level tests become essential for preventing regressions.\n\nVitest is the natural choice for Vite-based projects because it reuses the vite.config.ts and tsconfig.json, eliminating the parallel configuration that jest+ts-jest requires. It also natively supports ESM.\n\nTyped mocks are a persistent pain point. jest.fn() returns jest.Mock with poor type inference by default. The correct pattern is to create a typed mock factory that uses the original function's type to produce a correctly-typed mock.\n\nWorked Example — Problem: The subscription service has a fetchSubscription function used in a custom hook useBillingStatus. Tests are mocking fetchSubscription with 'as any', hiding type errors when the real function's return type changes.\n\nStep 1 — Configure Vitest:\nimport { defineConfig } from 'vitest/config';\nexport default defineConfig({\n  test: { environment: 'jsdom', globals: true, setupFiles: ['./src/test/setup.ts'] }\n});\n\nStep 2 — Typed mock factory:\nfunction createTypedMock<T extends (...args: any[]) => any>(\n  implementation?: T\n): jest.MockedFunction<T> {\n  return vi.fn(implementation) as jest.MockedFunction<T>;\n}\n\nStep 3 — Use typed mock:\nconst mockFetchSubscription = subscriptionApi.fetchSubscription as ReturnType<\n  typeof createTypedMock<typeof subscriptionApi.fetchSubscription>\n>;\nmockFetchSubscription.mockResolvedValueOnce(ok(mockSubscription));\n\nStep 4 — Type-level test:\nimport { expectType } from 'vitest-expect-type';\ntest('makeUserId returns UserId brand', () => {\n  const id = makeUserId('00000000-0000-4000-a000-000000000001');\n  expectType<UserId>(id);\n});\n\nConclusion: Typed mocks that mirror the real function's signature make tests resilient to API changes, and type-level tests protect utility types from silent regressions."

              "blockId": "monorepo-text-01",
              "type": "text",
              "content": "Monorepos with multiple packages require TypeScript project references to avoid rebuilding every package from source on every type check. Project references are TypeScript's built-in solution: a downstream package uses the pre-built declaration files from upstream packages, dramatically speeding up type checking.\n\nThe configuration triangle is: composite: true in the upstream package's tsconfig, references in the downstream package's tsconfig pointing to the upstream, and declaration: true plus declarationMap: true so the .d.ts files are generated and navigable.\n\nThe package.json exports field controls how different environments resolve types. A package might have a browser build and a server build with different types.\n\nCommon pitfalls: not running tsc -b before running type checks in CI causes stale declaration files. Version drift between two packages that depend on the same library at different versions can cause type incompatibilities.\n\nWorked Example — Problem: A SaaS monorepo with three packages takes 4 minutes for type checking in CI because TypeScript re-type-checks all packages from source on every run.\n\nStep 1 — Add composite: true to upstream packages:\n{\n  \"compilerOptions\": {\n    \"composite\": true,\n    \"declaration\": true,\n    \"declarationMap\": true,\n    \"outDir\": \"dist\"\n  }\n}\n\nStep 2 — Reference upstream from downstream:\n{\n  \"references\": [\n    { \"path\": \"../packages/ui\" },\n    { \"path\": \"../packages/api-client\" }\n  ]\n}\n\nStep 3 — Package exports:\n{\n  \"exports\": {\n    \".\": {\n      \"import\": \"./dist/index.js\",\n      \"require\": \"./dist/index.cjs\",\n      \"types\": \"./dist/index.d.ts\"\n    }\n  }\n}\n\nStep 4 — CI build order:\n\"build:types\": \"tsc -b packages/ui packages/api-client\",\n\"typecheck\": \"tsc -b\"\n// Type check time drops from 4 minutes to 45 seconds\n\nConclusion: Project references with composite builds turn TypeScript's incremental compilation into a monorepo-aware system where only changed packages are re-type-checked, making CI fast enough to run on every commit."

              "blockId": "migration-text-01",
              "type": "text",
              "content": "Migrating a production JavaScript codebase to TypeScript is a multi-month effort for any significant SaaS application. The key insight is that migration does not need to be a big-bang rewrite. TypeScript is designed to interoperate with JavaScript, and the strictness settings can be dialed up gradually.\n\nThe migration phases are: first, rename files to .ts and .tsx and enable allowJs to allow JS imports. Use noImplicitAny: false to defer annotating every implicit any. Fix the type errors that surface at this permissive level — these are often genuine bugs. Second, enable strict mode for newly written and fully migrated files using per-directory tsconfig settings. Third, tighten the remaining escape hatches: disabling noImplicitAny globally, removing any assertions, and enabling additional strict flags like exactOptionalPropertyTypes.\n\nPrioritizing the migration is as important as the technical approach. Shared utility functions and the API client layer should be migrated first because their types propagate outward to all their consumers.\n\nts-migrate (from Airbnb) and ts-morph can automate the initial mass insertion of : any annotations, which is the mechanical part. The intellectual work is then replacing any with accurate types.\n\nWorked Example — Problem: A 50,000-line JavaScript SaaS codebase needs to be migrated to TypeScript without stopping feature development.\n\nStep 1 — Enable allowJs with lenient settings:\n{\n  \"compilerOptions\": {\n    \"allowJs\": true,\n    \"checkJs\": false,\n    \"strict\": false,\n    \"noImplicitAny\": false,\n    \"skipLibCheck\": true\n  }\n}\n\nStep 2 — Use ts-migrate to rename and annotate:\nnpx ts-migrate rename src/\nnpx ts-migrate migrate src/ --plugin jsdoc-comments\n\nStep 3 — Migrate shared utilities first:\n// Before: function formatCurrency(amount, currency) { ... }\n// After: function formatCurrency(amount: number, currency: CurrencyCode): string { ... }\n\nStep 4 — Per-module strict overrides:\nCreate src/utils/tsconfig.json extending root with strict: true. TypeScript picks up the most local tsconfig.\n\nStep 5 — Track progress:\n\"migration:status\": \"echo 'JS files:' && find src -name '*.js' | wc -l && echo 'any annotations:' && grep -r ': any' src --include='*.ts' | wc -l\"\n\nConclusion: Incremental migration using allowJs, prioritizing shared utilities first, and applying strict mode per module as migration completes lets a team improve TypeScript coverage continuously without blocking product development."
