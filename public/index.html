<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Engine — Catalog</title>
<style>
  :root{
    --paper:#f4f1ea;--surface:#fbf9f4;--ink:#23211c;--ink-soft:#5f5a4f;
    --ink-faint:#928c7d;--line:#ddd6c7;--accent:#7a2e1d;--radius:8px;
    --serif:'Fraunces',Georgia,serif;--sans:'Spline Sans',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans),sans-serif;background:var(--paper);color:var(--ink);
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:64px 32px 96px}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent);margin-bottom:10px}
  h1{font-family:var(--serif),serif;font-weight:500;font-size:38px;line-height:1.1;
    letter-spacing:-.01em;margin-bottom:8px}
  .lede{color:var(--ink-soft);font-size:17px;margin-bottom:36px}
  .search{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:var(--radius);
    font-size:15px;font-family:inherit;background:var(--surface);margin-bottom:28px}
  .grid{display:grid;gap:16px}
  .course{display:block;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;
    transition:transform .15s,box-shadow .15s,border-color .15s}
  .course:hover{transform:translateY(-2px);border-color:var(--accent);
    box-shadow:0 14px 40px -22px rgba(47,40,28,.45)}
  .course h2{font-family:var(--serif),serif;font-weight:500;font-size:21px;margin-bottom:6px}
  .course p{color:var(--ink-soft);font-size:15px;margin-bottom:14px}
  .meta{display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:600;letter-spacing:.04em;padding:3px 10px;border-radius:99px;
    background:#ece7dc;color:var(--ink-soft);text-transform:capitalize}
  .empty,.err{color:var(--ink-faint);font-size:15px;padding:40px 0}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Course Engine</div>
    <h1>Course catalog</h1>
    <p class="lede">Choose a course to begin. Your progress is saved on this device.</p>
    <input class="search" id="search" type="text" placeholder="Search courses…" oninput="filter(this.value)">
    <div class="grid" id="grid"><div class="empty">Loading…</div></div>
  </div>
<script>
  let ALL = [];
  function fmt(s){ return (s||'').charAt(0).toUpperCase() + (s||'').slice(1); }
  function card(c){
    const meta = [];
    if(c.durationLabel) meta.push(`<span class="tag">${c.durationLabel}</span>`);
    if(c.difficulty)    meta.push(`<span class="tag">${fmt(c.difficulty)}</span>`);
    return `<a class="course" href="/${encodeURIComponent(c.slug)}">
      <h2>${esc(c.title)}</h2>
      <p>${esc(c.description||'')}</p>
      <div class="meta">${meta.join('')}</div>
    </a>`;
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, m => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function render(list){
    const g = document.getElementById('grid');
    g.innerHTML = list.length ? list.map(card).join('')
      : '<div class="empty">No courses match your search.</div>';
  }
  function filter(q){
    q = q.trim().toLowerCase();
    render(!q ? ALL : ALL.filter(c =>
      (c.title+' '+(c.description||'')+' '+(c.difficulty||'')).toLowerCase().includes(q)));
  }
  fetch('./manifest.json')
    .then(r => r.json())
    .then(list => { ALL = list; render(ALL); })
    .catch(() => { document.getElementById('grid').innerHTML =
      '<div class="err">Could not load the catalog. Please try again.</div>'; });
</script>
</body>
</html>
