<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Not found — Course Engine</title>
<style>
  :root{--paper:#f4f1ea;--ink:#23211c;--ink-soft:#5f5a4f;--accent:#7a2e1d;
    --serif:'Fraunces',Georgia,serif;--sans:'Spline Sans',-apple-system,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans),sans-serif;background:var(--paper);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:32px;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent);margin-bottom:12px}
  h1{font-family:var(--serif),serif;font-weight:500;font-size:44px;margin-bottom:10px;
    letter-spacing:-.01em}
  p{color:var(--ink-soft);font-size:17px;margin-bottom:28px}
  a{display:inline-block;text-decoration:none;color:#fff;background:var(--accent);
    padding:11px 22px;border-radius:8px;font-weight:600;font-size:14px}
</style>
</head>
<body>
  <div>
    <div class="eyebrow">404</div>
    <h1>Course not found</h1>
    <p>We couldn’t find a course at that address.</p>
    <a href="/">← Browse the catalog</a>
  </div>
</body>
</html>
