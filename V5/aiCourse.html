<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f4f1ea;
  --paper-deep:#ece7dc;
  --surface:#fbf9f4;
  --surface-raised:#ffffff;
  --ink:#23211c;
  --ink-soft:#5f5a4f;
  --ink-faint:#928c7d;
  --line:#ddd6c7;
  --line-soft:#e8e2d5;
  --accent:#7a2e1d;          /* oxblood */
  --accent-deep:#5e2114;
  --accent-wash:#f3e4df;
  --accent-line:#e3c4ba;
  --moss:#4a5d3a;
  --moss-wash:#e8ecdf;
  --gold:#9a6a18;
  --gold-wash:#f6ecd6;
  --indigo:#33457a;
  --indigo-wash:#e3e7f2;
  --plum:#5a3566;
  --plum-wash:#efe6f2;
  --rust:#9c4a26;
  --rust-wash:#f6e6dc;
  --good:#3f6d4e;
  --good-wash:#e6efe7;
  --warn:#9c3527;
  --warn-wash:#f7e4e0;
  --radius:4px;
  --radius-lg:8px;
  --shadow-sm:0 1px 2px rgba(47,40,28,.06);
  --shadow:0 6px 28px -12px rgba(47,40,28,.28);
  --shadow-lg:0 20px 60px -24px rgba(47,40,28,.4);
  --serif:'Fraunces',Georgia,serif;
  --read:'Newsreader',Georgia,serif;
  --sans:'Spline Sans',-apple-system,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --sidebar-w:312px;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  min-height:100vh;font-size:15px;line-height:1.6;
  background-image:
    radial-gradient(circle at 12% 8%, rgba(122,46,29,.04), transparent 38%),
    radial-gradient(circle at 88% 92%, rgba(74,93,58,.045), transparent 42%);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--serif);font-weight:500;line-height:1.12;letter-spacing:-.01em}
::selection{background:var(--accent-wash);color:var(--accent-deep)}

/* ─── Layout ─────────────────────────────────────────── */
#app{display:flex;min-height:100vh}

/* ─── Sidebar ────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--surface),var(--paper));
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;
}
#sidebar-header{padding:26px 24px 18px;border-bottom:1px solid var(--line)}
.brand-mark{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.brand-seal{
  width:30px;height:30px;border:1.5px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--accent);
  font-family:var(--serif);font-size:15px;font-style:italic;flex-shrink:0;
}
.brand-name{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--ink-soft);letter-spacing:.02em}
#sidebar-header .course-eyebrow{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
#sidebar-header h2{font-size:19px;color:var(--ink);line-height:1.22}
#progress-meta{margin-top:16px}
#progress-bar-wrap{background:var(--line);border-radius:99px;height:5px;overflow:hidden}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--rust));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1);width:0}
#progress-label{margin-top:7px;font-size:11px;color:var(--ink-faint);letter-spacing:.02em}

/* Competency rail */
#competency-rail{padding:18px 24px;border-bottom:1px solid var(--line)}
.rail-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.rail-label .ghost-btn{font-family:var(--sans);font-size:10px;letter-spacing:.08em;color:var(--accent);background:none;border:none;cursor:pointer;text-transform:uppercase}
.comp-badge{margin-bottom:13px}
.comp-badge:last-child{margin-bottom:0}
.comp-badge-top{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.comp-badge-title{font-size:12px;font-weight:500;color:var(--ink);flex:1;line-height:1.3}
.comp-badge-level{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:99px;white-space:nowrap}
.lvl-novice{background:var(--line);color:var(--ink-soft)}
.lvl-developing{background:var(--gold-wash);color:var(--gold)}
.lvl-proficient{background:var(--indigo-wash);color:var(--indigo)}
.lvl-mastered{background:var(--good-wash);color:var(--good)}
.comp-bar-wrap{background:var(--line);border-radius:99px;height:4px;overflow:hidden}
.comp-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* Section nav */
#sidebar-nav{padding:8px 0 24px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:16px 24px 8px}
.section-nav-item{}
.section-nav-header{
  padding:10px 24px;cursor:pointer;display:flex;align-items:center;gap:11px;
  font-size:13.5px;font-weight:500;color:var(--ink-soft);user-select:none;
  transition:background .15s,color .15s;position:relative;
}
.section-nav-header:hover{background:var(--paper-deep);color:var(--ink)}
.section-nav-header.active{color:var(--ink)}
.section-nav-header.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.section-check{
  width:19px;height:19px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:10px;transition:all .25s;color:transparent;
}
.section-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.section-check.active{border-color:var(--accent)}
.section-nav-title{flex:1;line-height:1.3}
.section-nav-arrow{font-size:9px;transition:transform .25s;color:var(--ink-faint)}
.section-nav-item.open .section-nav-arrow{transform:rotate(90deg)}
.section-nav-children{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-nav-item.open .section-nav-children{max-height:900px}

.sub-nav-item{
  padding:7px 24px 7px 56px;cursor:pointer;font-size:12px;color:var(--ink-faint);
  display:flex;align-items:center;gap:9px;transition:background .15s,color .15s;
}
.sub-nav-item:hover{background:var(--paper-deep);color:var(--ink)}
.sub-nav-item.active{color:var(--accent);font-weight:600}
.sub-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:all .2s}
.sub-nav-item.done .sub-dot{background:var(--moss)}
.sub-nav-item.active .sub-dot{background:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
.sub-nav-item.assess .sub-dot{border-radius:1px;background:var(--gold)}
.sub-nav-label{flex:1;line-height:1.3}
.sub-kind{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}

/* ─── Main ───────────────────────────────────────────── */
#main-wrap{flex:1;min-width:0;position:relative}
#topbar{
  position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);
  background:rgba(244,241,234,.82);border-bottom:1px solid var(--line);
  display:none;align-items:center;gap:12px;padding:12px 18px;
}
#menu-toggle{background:none;border:1px solid var(--line);border-radius:var(--radius);padding:7px 10px;cursor:pointer;color:var(--ink);font-size:15px;line-height:1}
#topbar .tb-title{font-family:var(--serif);font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main{max-width:760px;margin:0 auto;padding:54px 40px 96px}

/* ─── Screens ────────────────────────────────────────── */
.screen{display:none}
.screen.active{display:block;animation:rise .4s cubic-bezier(.22,1,.36,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.stagger>*{opacity:0;animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.20s}
.stagger>*:nth-child(5){animation-delay:.26s}
.stagger>*:nth-child(6){animation-delay:.32s}
.stagger>*:nth-child(n+7){animation-delay:.38s}

/* ─── Shared components ──────────────────────────────── */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.eyebrow .rule{height:1px;flex:1;background:var(--accent-line);max-width:60px}
.lede{font-family:var(--read);font-size:18px;line-height:1.6;color:var(--ink-soft);margin-bottom:8px}

.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--sans)}
.tag .tdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.tag-accent{background:var(--accent-wash);color:var(--accent)}
.tag-moss{background:var(--moss-wash);color:var(--moss)}
.tag-gold{background:var(--gold-wash);color:var(--gold)}
.tag-indigo{background:var(--indigo-wash);color:var(--indigo)}
.tag-plum{background:var(--plum-wash);color:var(--plum)}
.tag-rust{background:var(--rust-wash);color:var(--rust)}
.tag-line{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:99px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;border:1px solid transparent;transition:all .2s;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--accent-deep);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-primary:active{transform:none}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--surface-raised);color:var(--ink);border-color:var(--line)}
.btn-secondary:hover{background:var(--paper-deep);border-color:var(--ink-faint)}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-ghost{background:none;color:var(--accent);font-weight:600;font-family:var(--sans);cursor:pointer;border:none;padding:5px 0;font-size:13px;border-bottom:1px solid var(--accent-line)}
.btn-ghost:hover{border-color:var(--accent)}

.nav-buttons{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:44px;padding-top:26px;border-top:1px solid var(--line)}

.card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;box-shadow:var(--shadow-sm);margin-bottom:18px}

/* ─── Intro / cover ──────────────────────────────────── */
.cover{
  position:relative;border:1px solid var(--line);border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:34px;background:var(--surface-raised);box-shadow:var(--shadow);
}
.cover-art{
  height:184px;position:relative;overflow:hidden;
  background:
    repeating-linear-gradient(135deg,transparent,transparent 13px,rgba(122,46,29,.05) 13px,rgba(122,46,29,.05) 14px),
    linear-gradient(120deg,var(--accent-wash),var(--gold-wash) 55%,var(--moss-wash));
}
.cover-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-art .seal{
  position:absolute;right:22px;top:22px;width:62px;height:62px;border-radius:50%;
  border:1.5px solid var(--accent);color:var(--accent);background:rgba(251,249,244,.7);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  font-style:italic;font-size:13px;backdrop-filter:blur(3px);text-align:center;line-height:1.1;
}
.cover-body{padding:28px 30px 30px}
.cover-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.cover-body h1{font-size:38px;line-height:1.05;margin-bottom:14px;letter-spacing:-.02em}
.cover-desc{font-family:var(--read);font-size:18px;line-height:1.55;color:var(--ink-soft)}

.meta-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:30px;background:var(--surface-raised)}
.meta-cell{padding:16px 18px;border-right:1px solid var(--line-soft)}
.meta-cell:last-child{border-right:none}
.meta-cell .mc-val{font-family:var(--serif);font-size:21px;font-weight:500;color:var(--ink);line-height:1}
.meta-cell .mc-key{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}

.section-head{margin-bottom:24px}
.section-head h2{font-size:23px;margin-bottom:6px}

.lm-grid{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 6px}
.lm-pill{
  display:inline-flex;align-items:center;gap:6px;background:var(--surface-raised);
  border:1px solid var(--line);border-radius:99px;padding:6px 13px;font-size:12px;color:var(--ink-faint);
}
.lm-pill.on{background:var(--moss-wash);border-color:#c4d0b3;color:var(--moss);font-weight:500}
.lm-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.lm-pill.on .dot{opacity:1}

.list-clean{list-style:none}
.outcomes-list li{padding:10px 0 10px 28px;position:relative;font-family:var(--read);font-size:16px;color:var(--ink-soft);border-bottom:1px solid var(--line-soft)}
.outcomes-list li:last-child{border-bottom:none}
.outcomes-list li::before{content:'';position:absolute;left:2px;top:17px;width:9px;height:9px;border:1.5px solid var(--accent);border-radius:50%}

.prereq-list li{padding:8px 0 8px 26px;position:relative;font-size:14px;color:var(--ink-soft)}
.prereq-list li::before{content:'§';position:absolute;left:4px;color:var(--ink-faint);font-family:var(--serif)}

/* ─── Prior knowledge check ──────────────────────────── */
.pkc-banner{
  background:linear-gradient(120deg,var(--indigo-wash),var(--surface-raised));
  border:1px solid #c9d2e8;border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:26px;
  display:flex;gap:14px;align-items:flex-start;
}
.pkc-banner .pkc-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.pkc-banner h3{font-size:16px;margin-bottom:4px;color:var(--indigo)}
.pkc-banner p{font-size:13.5px;color:var(--ink-soft)}
.probe-card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.probe-num{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-bottom:8px;letter-spacing:.04em}
.probe-routing{margin-top:14px;display:none;border-top:1px dashed var(--line);padding-top:14px}
.probe-routing.show{display:block}
.routing-row{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--ink-soft);padding:4px 0}
.routing-cond{font-family:var(--mono);font-size:11px;background:var(--paper-deep);padding:2px 8px;border-radius:4px;color:var(--ink)}

/* ─── Motivation hooks ───────────────────────────────── */
.hook{
  border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:14px;font-family:var(--read);font-size:16px;line-height:1.5;
  border-left:3px solid;position:relative;
}
.hook-icon{font-size:20px;flex-shrink:0;margin-top:1px;font-family:var(--sans)}
.hook .hk-type{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.85}
.hook-real-world-stakes{background:var(--warn-wash);border-color:var(--warn);color:#6e261d}
.hook-prediction-gap{background:var(--gold-wash);border-color:var(--gold);color:#6b4910}
.hook-curiosity-prompt{background:var(--plum-wash);border-color:var(--plum);color:#492a52}
.hook-relevance-anchor{background:var(--moss-wash);border-color:var(--moss);color:#36462a}

/* objectives */
.objectives-list li{
  padding:12px 16px 12px 40px;position:relative;font-size:14.5px;background:var(--surface-raised);
  border:1px solid var(--line);border-radius:var(--radius);margin-bottom:7px;
}
.objectives-list li::before{content:'→';position:absolute;left:15px;top:12px;color:var(--accent);font-weight:600}
.obj-comps{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}

/* ─── Experience ─────────────────────────────────────── */
.exp-header{margin-bottom:26px}
.exp-header h2{font-size:30px;margin:10px 0;line-height:1.08}
.exp-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.exp-meta-item{font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
.diff-dots{display:inline-flex;gap:3px;align-items:center}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
.diff-dot.on{background:var(--accent)}
.cog-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}

/* content blocks */
.cb-text{font-family:var(--read);font-size:18px;line-height:1.68;color:var(--ink);margin-bottom:20px;white-space: pre-wrap;}
.cb-text:first-letter{}
.cb-media{margin-bottom:22px}
.cb-media img{width:100%;border-radius:var(--radius-lg);border:1px solid var(--line);display:block}
.cb-media video,.cb-media audio{width:100%;border-radius:var(--radius-lg)}
.cb-caption{font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:8px;font-style:italic;font-family:var(--read)}
.cb-placeholder{
  background:var(--paper-deep);border:1px dashed var(--line);border-radius:var(--radius-lg);
  min-height:150px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:13px;
}
.cb-placeholder .ph-ico{font-size:26px;opacity:.6}
.cb-transcript{margin-top:8px}
.cb-transcript summary{font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:500}
.cb-transcript p{font-size:13.5px;color:var(--ink-soft);margin-top:8px;font-family:var(--read);line-height:1.6}
.cb-interactive{background:var(--indigo-wash);border:1px solid #c9d2e8;border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;font-size:14px;color:var(--indigo)}

/* worked example */
.worked{background:var(--surface-raised);border:1px solid var(--line);border-left:3px solid var(--moss);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:20px 24px;margin-bottom:22px}
.worked-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--moss);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.worked-problem{font-family:var(--read);font-size:16.5px;font-weight:500;margin-bottom:14px;color:var(--ink)}
.we-steps{list-style:none;counter-reset:we}
.we-steps li{counter-increment:we;padding:8px 0 8px 36px;position:relative;font-size:14.5px;color:var(--ink-soft);line-height:1.55}
.we-steps li::before{content:counter(we);position:absolute;left:0;top:7px;width:24px;height:24px;background:var(--moss-wash);color:var(--moss);border-radius:50%;font-size:12px;font-weight:700;font-family:var(--sans);display:flex;align-items:center;justify-content:center}
.we-conclusion{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-family:var(--read);font-size:15px;color:var(--moss);font-style:italic}

/* ─── Interactions ───────────────────────────────────── */
.interaction{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.interaction::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.6}
.int-prediction::before{background:var(--indigo)}
.int-reflection::before{background:var(--plum)}
.int-compare::before{background:var(--gold)}
.int-mc::before{background:var(--accent)}
.int-scenario::before{background:var(--rust)}
.int-dragdrop::before{background:var(--moss)}
.int-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.int-prediction .int-label{color:var(--indigo)}
.int-reflection .int-label{color:var(--plum)}
.int-compare .int-label{color:var(--gold)}
.int-mc .int-label{color:var(--accent)}
.int-scenario .int-label{color:var(--rust)}
.int-dragdrop .int-label{color:var(--moss)}
.int-label .req-star{color:var(--accent);font-size:11px}
.int-prompt{font-family:var(--read);font-size:18px;font-weight:500;margin-bottom:18px;line-height:1.45;color:var(--ink)}

.sa-input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--radius);
  font-size:15px;font-family:var(--read);color:var(--ink);resize:vertical;min-height:100px;
  transition:border .18s,box-shadow .18s;background:var(--surface);line-height:1.55;
}
.sa-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-wash)}
.sa-input:disabled{opacity:.8;background:var(--paper-deep);cursor:default}

/* multiple choice */
.mc-options{display:flex;flex-direction:column;gap:9px;margin-bottom:4px}
.mc-option{
  display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--line);
  border-radius:var(--radius);cursor:pointer;font-size:14.5px;transition:all .15s;background:var(--surface);
}
.mc-option:hover{border-color:var(--ink-faint);background:var(--paper-deep)}
.mc-option .mc-key{
  width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
  font-family:var(--mono);color:var(--ink-soft);transition:all .15s;
}
.mc-option.selected{border-color:var(--accent);background:var(--accent-wash)}
.mc-option.selected .mc-key{background:var(--accent);border-color:var(--accent);color:#fff}
.mc-option.correct{border-color:var(--good);background:var(--good-wash)}
.mc-option.correct .mc-key{background:var(--good);border-color:var(--good);color:#fff}
.mc-option.incorrect{border-color:var(--warn);background:var(--warn-wash)}
.mc-option.incorrect .mc-key{background:var(--warn);border-color:var(--warn);color:#fff}
.mc-option.locked{cursor:default;pointer-events:none}

/* ranking */
.rank-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius);background:var(--surface);cursor:grab;font-size:14px}
.rank-item:active{cursor:grabbing}
.rank-item.dragging{opacity:.5;border-style:dashed}
.rank-grip{color:var(--ink-faint);font-size:15px;cursor:grab}
.rank-num{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;width:18px}

/* likert */
.likert{display:flex;gap:8px;margin-top:6px}
.likert-opt{flex:1;text-align:center;padding:10px 4px;border:1.5px solid var(--line);border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s;background:var(--surface)}
.likert-opt:hover{border-color:var(--ink-faint)}
.likert-opt.selected{border-color:var(--accent);background:var(--accent-wash);color:var(--accent);font-weight:600}

/* confidence */
.confidence{background:var(--gold-wash);border:1px solid #e6d3a6;border-radius:var(--radius);padding:14px 18px;margin-top:14px}
.confidence-label{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.confidence-row{display:flex;align-items:center;gap:14px}
.confidence-slider{flex:1;accent-color:var(--gold);cursor:pointer;height:4px}
.confidence-value{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--gold);min-width:42px;text-align:center}
.confidence-anchors{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-faint);margin-top:6px}

/* compare-responses (learner self-compares against model) */
.compare-note{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;font-family:var(--read)}

/* submit + feedback */
.submit-row{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.saved-flag{font-size:12.5px;color:var(--good);font-weight:600;display:flex;align-items:center;gap:5px}
.hint-btn{background:none;border:1px dashed var(--gold);color:var(--gold);border-radius:99px;padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.hint-btn:hover{background:var(--gold-wash)}
.hint-box{margin-top:12px;background:var(--gold-wash);border:1px solid #e6d3a6;border-radius:var(--radius);padding:12px 16px;font-size:13.5px;color:#6b4910;display:none;font-family:var(--read);line-height:1.5}
.hint-box.show{display:block;animation:rise .3s}
.hint-box .hint-n{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.7}

.feedback{margin-top:18px;border-radius:var(--radius-lg);padding:16px 18px;font-size:15px;line-height:1.6;display:none;font-family:var(--read);border:1px solid}
.feedback.show{display:block;animation:rise .35s}
.feedback .fb-head{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.fb-elaborative{background:var(--indigo-wash);border-color:#c9d2e8;color:#2a386a}
.fb-elaborative .fb-head{color:var(--indigo)}
.fb-corrective{background:var(--accent-wash);border-color:var(--accent-line);color:var(--accent-deep)}
.fb-corrective .fb-head{color:var(--accent)}
.fb-socratic{background:var(--plum-wash);border-color:#d9c4e0;color:#492a52}
.fb-socratic .fb-head{color:var(--plum)}
.fb-correct{background:var(--good-wash);border-color:#bcd6c2;color:#2f5740}
.fb-correct .fb-head{color:var(--good)}

/* retrieval practice */
.retrieval{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:0;margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow-sm)}
.retrieval-banner{background:var(--moss-wash);padding:16px 24px;border-bottom:1px solid #cdd8bd}
.retrieval-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.retrieval-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--moss);display:flex;align-items:center;gap:7px}
.retrieval-type{font-size:10px;color:var(--moss);font-family:var(--mono);opacity:.8}
.retrieval-prompt{font-family:var(--read);font-size:17px;font-weight:500;color:var(--ink);line-height:1.45}
.retrieval-body{padding:18px 24px}
.schedule-strip{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-faint);flex-wrap:wrap}
.sched-chip{font-family:var(--mono);font-size:11px;background:var(--paper-deep);border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--ink-soft)}
.decay-meta{font-size:11px;color:var(--ink-faint);margin-top:8px;font-family:var(--mono)}

/* transfer */
.transfer{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.transfer::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rust)}
.transfer-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.transfer-ctx{font-family:var(--mono);font-size:10px;background:var(--rust-wash);color:var(--rust);padding:2px 8px;border-radius:4px;text-transform:none;letter-spacing:0}
.transfer-scenario{background:var(--rust-wash);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;font-family:var(--read);font-size:16px;line-height:1.5;color:#5e2e16}
.transfer-task{font-family:var(--read);font-size:17px;font-weight:500;margin-bottom:14px;color:var(--ink)}
.criteria-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
.criteria-list{list-style:none;margin-bottom:14px}
.criteria-list li{font-size:14px;color:var(--ink-soft);padding:5px 0 5px 22px;position:relative;line-height:1.45}
.criteria-list li::before{content:'◇';position:absolute;left:0;color:var(--rust);font-size:11px;top:6px}

/* mastery verification */
.mastery-box{background:linear-gradient(120deg,var(--accent-wash),var(--surface-raised));border:1px solid var(--accent-line);border-radius:var(--radius-lg);padding:20px 24px;margin:6px 0 18px}
.mastery-box h4{font-size:15px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mastery-thresholds{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px}
.mthresh{font-size:13px;color:var(--ink-soft)}
.mthresh b{font-family:var(--mono);color:var(--accent);font-size:15px;display:block}

/* ─── Further reading ─────────────────────────────────── */
.further{background:var(--indigo-wash);border:1px solid var(--line);border-left:3px solid var(--indigo);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:20px 24px;margin:6px 0 22px}
.further-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--indigo);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.further-note{font-size:12.5px;color:var(--ink-soft);font-style:italic;margin-bottom:14px}
.fr-item{padding:12px 0;border-top:1px dashed var(--line)}
.fr-item:first-of-type{border-top:none}
.fr-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.fr-title{font-family:var(--read);font-size:16.5px;font-weight:500;color:var(--ink)}
.fr-title a{color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--accent-line)}
.fr-title a:hover{border-bottom-color:var(--indigo)}
.fr-type{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;background:var(--indigo);color:#fff;padding:2px 8px;border-radius:4px}
.fr-author{font-size:13px;color:var(--ink-faint);margin-top:2px}
.fr-cite{font-size:12.5px;color:var(--ink-faint);font-style:italic;margin-top:2px}
.fr-rationale{font-family:var(--read);font-size:14.5px;color:var(--ink-soft);line-height:1.5;margin-top:6px}

/* ─── Self-guided exercise ────────────────────────────── */
.selfguided{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.selfguided::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--plum)}
.sg-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--plum);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sg-formative{font-family:var(--mono);font-size:9.5px;background:var(--plum-wash);color:var(--plum);padding:2px 8px;border-radius:4px;text-transform:none;letter-spacing:0}
.sg-context{background:var(--plum-wash);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;font-family:var(--read);font-size:15px;line-height:1.5;color:#4a2b55}
.sg-objective{font-family:var(--read);font-size:17px;font-weight:500;margin-bottom:16px;color:var(--ink)}
.sg-heading{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin:14px 0 8px}
.sg-steps{list-style:none;counter-reset:sg;margin-bottom:6px}
.sg-steps li{counter-increment:sg;padding:7px 0 7px 36px;position:relative;font-size:14.5px;color:var(--ink-soft);line-height:1.55}
.sg-steps li::before{content:counter(sg);position:absolute;left:0;top:6px;width:24px;height:24px;background:var(--plum-wash);color:var(--plum);border-radius:50%;font-size:12px;font-weight:700;font-family:var(--sans);display:flex;align-items:center;justify-content:center}
.sg-meta{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px;font-size:12.5px;color:var(--ink-faint)}
.sg-prep{list-style:none}
.sg-prep li{font-size:14px;color:var(--ink-soft);padding:4px 0 4px 20px;position:relative;line-height:1.45}
.sg-prep li::before{content:'▪';position:absolute;left:0;color:var(--plum);font-size:11px;top:5px}
.sg-reflect{list-style:none}
.sg-reflect li{font-size:14.5px;color:var(--ink-soft);font-family:var(--read);padding:5px 0 5px 22px;position:relative;line-height:1.5}
.sg-reflect li::before{content:'❀';position:absolute;left:0;color:var(--plum);font-size:11px;top:7px}
.sg-criteria{list-style:none}
.sg-criteria li{font-size:14px;color:var(--ink-soft);padding:5px 0 5px 24px;position:relative;line-height:1.45}
.sg-criteria li::before{content:'☐';position:absolute;left:0;color:var(--plum);font-size:13px;top:4px}

/* ─── Assessment ─────────────────────────────────────── */
.assess-head{margin-bottom:26px}
.assess-head h2{font-size:28px;margin:8px 0}
.q-card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.q-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.q-prompt{font-family:var(--read);font-size:18px;font-weight:500;margin-bottom:16px;line-height:1.45;color:var(--ink)}
.rubric{background:var(--paper-deep);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-top:16px}
.rubric-title{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
.rubric-row{display:flex;gap:14px;margin-bottom:10px;font-size:14px;align-items:baseline}
.rubric-row:last-child{margin-bottom:0}
.rubric-level{font-weight:700;min-width:78px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--sans)}
.rubric-excellent .rubric-level{color:var(--good)}
.rubric-adequate .rubric-level{color:var(--gold)}
.rubric-weak .rubric-level{color:var(--warn)}
.rubric-desc{color:var(--ink-soft);font-family:var(--read);line-height:1.45}
.error-patterns{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}
.ep-title{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);margin-bottom:10px}
.ep-item{font-size:13px;color:var(--ink-soft);padding:7px 0;border-bottom:1px solid var(--line-soft);line-height:1.45}
.ep-item:last-child{border-bottom:none}
.ep-item b{color:var(--ink)}
.ep-remedy{display:block;margin-top:3px;font-size:12px;color:var(--ink-faint)}
.ep-remedy::before{content:'↳ ';color:var(--rust)}

/* ─── Glossary ───────────────────────────────────────── */
.glossary-link{border-bottom:1px dotted var(--accent);cursor:help;color:var(--accent-deep)}
#glossary-btn{
  position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;border:none;
  border-radius:99px;padding:11px 18px;font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;box-shadow:var(--shadow);z-index:120;display:flex;align-items:center;gap:7px;transition:all .2s;
}
#glossary-btn:hover{background:var(--accent-deep);transform:translateY(-2px)}
#scrim{position:fixed;inset:0;background:rgba(35,33,28,.34);backdrop-filter:blur(2px);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
#scrim.open{opacity:1;pointer-events:auto}
#glossary-drawer{
  position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:var(--surface);
  border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:200;
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.22,1,.36,1);
}
#glossary-drawer.open{transform:none}
#glossary-drawer-header{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
#glossary-drawer-header h3{font-size:20px}
#glossary-drawer-header .sub{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
#glossary-close{background:none;border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;font-size:16px;color:var(--ink-soft);width:34px;height:34px;display:flex;align-items:center;justify-content:center}
#glossary-search{margin:16px 24px 0;padding:10px 14px;border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-family:var(--sans);background:var(--surface-raised);width:calc(100% - 48px)}
#glossary-search:focus{outline:none;border-color:var(--accent)}
#glossary-body{overflow-y:auto;padding:14px 0 24px;flex:1}
.glossary-term{padding:14px 24px;border-bottom:1px solid var(--line-soft)}
.glossary-term dt{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--accent)}
.glossary-term dd{font-family:var(--read);font-size:15px;color:var(--ink-soft);margin-top:4px;line-height:1.5}

/* ─── Complete ───────────────────────────────────────── */
#screen-complete{text-align:center;padding:70px 20px}
.complete-seal{
  width:96px;height:96px;border:2px solid var(--accent);border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:30px;
  color:var(--accent);margin:0 auto 28px;position:relative;animation:sealIn .6s cubic-bezier(.22,1,.36,1);
}
@keyframes sealIn{from{opacity:0;transform:scale(.7) rotate(-8deg)}to{opacity:1;transform:none}}
.complete-seal::after{content:'';position:absolute;inset:-7px;border:1px solid var(--accent-line);border-radius:50%}
#screen-complete h1{font-size:42px;margin-bottom:14px}
#screen-complete .c-sub{font-family:var(--read);font-size:19px;color:var(--ink-soft);max-width:480px;margin:0 auto 18px;line-height:1.5}
.complete-stats{display:flex;justify-content:center;gap:36px;margin:30px 0 36px;flex-wrap:wrap}
.cstat .cs-val{font-family:var(--serif);font-size:30px;color:var(--accent)}
.cstat .cs-key{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-top:4px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:99px;font-size:13.5px;z-index:300;transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px}
#toast.show{transform:translateX(-50%) translateY(0)}

/* scrollbars */
#sidebar::-webkit-scrollbar,#glossary-body::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb,#glossary-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}

/* responsive */
@media(max-width:920px){
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg)}
  #sidebar.open{transform:none}
  #topbar{display:flex}
  #main{padding:32px 22px 80px}
  .meta-strip{grid-template-columns:repeat(2,1fr)}
  .meta-cell:nth-child(2){border-right:none}
  .cover-body h1{font-size:30px}
}
@media(max-width:520px){
  #main{padding:24px 16px 72px}
  .cover-body h1{font-size:26px}
  .nav-buttons{flex-direction:column-reverse;align-items:stretch}
  .nav-buttons .btn{justify-content:center}
}

/* ─── Review queue / self-grade / tools / loader ─────── */
.due-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
#sidebar-tools{margin-top:auto;border-top:1px solid var(--line);padding:14px 24px 18px;display:flex;flex-direction:column;gap:8px}
#sidebar-tools button{background:none;border:1px solid var(--line);border-radius:var(--radius);padding:8px 10px;font-size:11.5px;font-family:var(--sans);color:var(--ink-soft);cursor:pointer;text-align:left;transition:all .15s}
#sidebar-tools button:hover{border-color:var(--accent);color:var(--accent)}
.selfgrade{margin-top:14px;background:var(--paper-deep);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px}
.selfgrade .sg-q{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:9px}
.sg-btns{display:flex;gap:8px;flex-wrap:wrap}
.sg-btn{border-radius:99px;padding:8px 16px;font-size:12.5px;font-weight:600;font-family:var(--sans);cursor:pointer;border:1.5px solid;background:var(--surface-raised);transition:all .15s}
.sg-good{border-color:#bcd6c2;color:var(--good)} .sg-good:hover{background:var(--good-wash)}
.sg-gold{border-color:#e6d3a6;color:var(--gold)} .sg-gold:hover{background:var(--gold-wash)}
.sg-warn{border-color:#e8c4bd;color:var(--warn)} .sg-warn:hover{background:var(--warn-wash)}
.review-item{margin-bottom:18px}
.review-head-card{background:linear-gradient(120deg,var(--moss-wash),var(--surface-raised));border:1px solid #cdd8bd;border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start}

<script>
/* ════════════════════════════════════════════════════════════════════════
   COURSE DATA — conforms to Course Engine JSON Schema v4 (v1.0 reference)
   Replace this object with your own course. Every field the player reads is
   optional-safe: missing arrays/objects degrade gracefully.
   ════════════════════════════════════════════════════════════════════════ */
let COURSE = {
  "courseMetadata": {
    "courseId": "practical-ai",
    "title": "Practical AI for Working Professionals",
    "description": "Practical AI equips working professionals with an accurate mental model of modern artificial intelligence — from conceptual foundations through machine learning and neural networks to large language models — and the hands-on judgment to select, apply, and critically evaluate AI tools in real workflows. The course balances conceptual literacy (how these systems actually work), applied skill (using them well), and critical skill (knowing when not to trust them). Learners move through three acts: building a technical mental model, putting it to work, and learning to audit and verify AI outputs.",
    "thumbnailImage": "https://cdn.practicalai.course/assets/thumbnail-v1.png",
    "estimatedDurationMinutes": 600,
    "difficultyLevel": "intermediate",
    "version": "1.0",
    "lastUpdated": "2025-06-12",
    "language": "en",
    "tags": [
      "artificial intelligence",
      "machine learning",
      "large language models",
      "generative AI",
      "AI literacy",
      "professional development",
      "workflow automation",
      "prompting",
      "AI tools",
      "responsible AI",
      "AI risk",
      "content verification"
    ],
    "prerequisites": [
      {
        "type": "knowledge",
        "description": "Comfortable using standard professional software (email, documents, spreadsheets). No programming or statistics background required."
      },
      {
        "type": "knowledge",
        "description": "Basic familiarity with at least one AI assistant tool (ChatGPT, Copilot, Gemini, or similar) — having used it at least once, even casually."
      },
      {
        "type": "assessment",
        "description": "Complete the prior knowledge check. Learners who score above 85% on core competencies may be routed directly to advanced sections or transfer-focused assessments."
      }
    ]
  },

  "learningModel": {
    "masteryThreshold": 0.80,
    "passingThreshold": 0.70,
    "retrievalPracticeEnabled": true,
    "confidenceCalibrationEnabled": true,
    "adaptiveDifficultyEnabled": true,
    "interleavingEnabled": true,
    "interleavingGroups": [
      {
        "groupId": "ig-foundations-mechanics",
        "competencyIds": ["ai-foundations", "ml-fundamentals", "neural-network-literacy"],
        "experienceIds": [
          "exp-ai-landscape-worked-example",
          "exp-ml-essentials-paradigms",
          "exp-nn-compute-model"
        ],
        "rationaleNote": "These three Act-I competencies form the causal chain: what AI is → how systems learn → how networks compute. Interleaving them surfaces the nested relationships (AI ⊃ ML ⊃ DL) and prevents learners from treating them as isolated silos. Contrasting supervised learning (ml-fundamentals) with the transformer attention mechanism (neural-network-literacy) during review deepens both."
      },
      {
        "groupId": "ig-llm-and-tools",
        "competencyIds": ["llm-mechanics", "tool-selection-workflow"],
        "experienceIds": [
          "exp-llm-generation-mechanics",
          "exp-tool-selection-framework",
          "exp-workflow-aria"
        ],
        "rationaleNote": "LLM mechanics is the explanatory engine for tool selection: understanding next-token prediction, context windows, and RAG directly determines how to evaluate a tool's fitness for a task. Interleaving these competencies forces learners to apply mechanistic knowledge to practical decisions — satisfying the llm-mechanics transfer requirement."
      },
      {
        "groupId": "ig-prompting-and-agency",
        "competencyIds": ["prompt-context-craft", "agentic-ai"],
        "experienceIds": [
          "exp-prompt-components",
          "exp-prompt-decomposition",
          "exp-agentic-risk-assessment"
        ],
        "rationaleNote": "Prompting craft is the prerequisite for agentic design: agent instructions are prompts at scale, and poor specification causes goal-drift and compounding errors. Interleaving these immediately after the learner has practised single-turn prompting ensures they carry a calibrated sense of specification failure into their first encounter with agentic architectures."
      },
      {
        "groupId": "ig-risk-and-verification",
        "competencyIds": ["limitation-risk-assessment", "content-verification"],
        "experienceIds": [
          "exp-failure-modes-taxonomy",
          "exp-audit-method",
          "exp-detection-limits"
        ],
        "rationaleNote": "These Act-III competencies are the course's capstone integration: identifying failure modes (limitation-risk-assessment) motivates the specific verification techniques (content-verification). Interleaving surfaces the mechanism-prediction loop: learners who can explain WHY hallucination occurs can design verification steps to catch it. This group also re-activates llm-mechanics and ml-fundamentals through causal reasoning about error origins."
      },
      {
        "groupId": "ig-cross-act-transfer",
        "competencyIds": ["llm-mechanics", "limitation-risk-assessment", "prompt-context-craft"],
        "experienceIds": [
          "exp-structural-failure-decision-tree",
          "exp-failure-modes-taxonomy",
          "exp-prompt-decomposition"
        ],
        "rationaleNote": "This cross-act group ensures the course's central payoff: learners who understand LLM generation (Act I) can predict failures (Act III) and know when to stop prompting (Act II). Periodic retrieval items from all three competencies together close the explanatory loop from mechanism to mitigation."
      }
    ],
    "spacedRepetitionEnabled": true
  },

  "priorKnowledgeCheck": {
    "enabled": true,
    "placement": "before-course",
    "probeQuestions": [
      {
        "probeId": "pkc-001",
        "prompt": "Which of the following correctly describes the relationship between artificial intelligence, machine learning, and deep learning?",
        "questionType": "multiple-choice",
        "options": [
          "They are three different names for the same technology.",
          "Machine learning is a subset of deep learning, which is a subset of AI.",
          "Deep learning is a subset of machine learning, which is a subset of AI.",
          "AI is a subset of machine learning, which is a subset of deep learning."
        ],
        "correctIndex": 2,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "These terms describe distinct concepts with a specific nesting relationship — conflating them makes it impossible to evaluate vendor AI claims accurately.",
            "linkedMisconceptionId": "ai-foundations-m2"
          },
          {
            "optionIndex": 1,
            "feedback": "This inverts the hierarchy. Deep learning is a subset of ML (one approach among many in ML), not the other way around.",
            "linkedMisconceptionId": "ai-foundations-m2"
          },
          {
            "optionIndex": 2,
            "feedback": "Correct. AI is the broadest category; ML is a data-learning subset of AI; deep learning is a multi-layer neural-network subset of ML. Generative AI sits within deep learning."
          },
          {
            "optionIndex": 3,
            "feedback": "This inverts the entire hierarchy. AI is the broadest umbrella; ML and deep learning are progressively narrower subsets within it.",
            "linkedMisconceptionId": "ai-foundations-m2"
          }
        ],
        "linkedCompetencies": ["ai-foundations"],
        "scoringCriteria": ["Selects option C (index 2)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-ai-foundations-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-002",
        "prompt": "A deployed machine learning model is giving outdated recommendations — it doesn't seem to know about events from the past six months. What is the most likely explanation?",
        "questionType": "multiple-choice",
        "options": [
          "The model has been learning from user interactions and has drifted toward older patterns.",
          "The model's weights are fixed from its training period; it does not update from new events unless retrained.",
          "The model's context window is too small to hold recent information.",
          "The recommendation algorithm needs more training data added to its database."
        ],
        "correctIndex": 1,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "Most deployed models do not update from user interactions. Weights are frozen after training; any learning from interactions requires a deliberate retraining pipeline.",
            "linkedMisconceptionId": "ml-fundamentals-m3"
          },
          {
            "optionIndex": 1,
            "feedback": "Correct. Deployed model weights are fixed at the end of the training run. New events after the training cutoff are invisible to the model until it is retrained."
          },
          {
            "optionIndex": 2,
            "feedback": "The context window limits what a model can process in one interaction, but it does not cause knowledge staleness. Staleness is caused by the training cutoff, not context size.",
            "linkedMisconceptionId": "llm-mechanics-m2"
          },
          {
            "optionIndex": 3,
            "feedback": "ML models learn from training data, not from a live database they query at runtime (unless explicitly built with a retrieval layer). Simply adding data to a database does not update the model.",
            "linkedMisconceptionId": "ml-fundamentals-m1"
          }
        ],
        "linkedCompetencies": ["ml-fundamentals", "llm-mechanics"],
        "scoringCriteria": ["Selects option B (index 1)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-ml-fundamentals-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-003",
        "prompt": "A colleague receives a polished, confident, detailed response from an LLM citing three specific research studies. She concludes the answer is reliable. What critical error is she making?",
        "questionType": "multiple-choice",
        "options": [
          "She should have used a larger model for research questions.",
          "LLMs generate statistically plausible text, so a fluent, confident output may be entirely fabricated — fluency does not imply accuracy.",
          "She should have asked the question multiple times to check consistency.",
          "The model's context window may have caused it to lose track of accurate information."
        ],
        "correctIndex": 1,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "Model size reduces some error rates but does not eliminate hallucination. The structural issue — next-token prediction optimising for fluency, not factual accuracy — applies regardless of scale.",
            "linkedMisconceptionId": "neural-network-literacy-m2"
          },
          {
            "optionIndex": 1,
            "feedback": "Correct. LLMs are trained to produce coherent, fluent text — not to be accurate. A hallucinated citation is indistinguishable in style from a real one. Verification must focus on claims, not tone or confidence."
          },
          {
            "optionIndex": 2,
            "feedback": "Checking consistency is a useful probe but doesn't resolve the core issue: all consistent responses may be consistently wrong if the model hallucinated the same fabricated citation repeatedly.",
            "linkedMisconceptionId": "llm-mechanics-m3"
          },
          {
            "optionIndex": 3,
            "feedback": "Context window limitations cause the model to forget earlier parts of a long conversation — not to fabricate citations. Fabrication is caused by the generative mechanism, not memory management.",
            "linkedMisconceptionId": "llm-mechanics-m1"
          }
        ],
        "linkedCompetencies": ["llm-mechanics", "limitation-risk-assessment"],
        "scoringCriteria": ["Selects option B (index 1)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-llm-mechanics-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-004",
        "prompt": "You need to use an AI assistant to help draft a document that includes your client's revenue projections, strategic roadmap, and key personnel. Which action is most appropriate?",
        "questionType": "multiple-choice",
        "options": [
          "Use the free consumer tier of a major AI assistant — the output quality is the same as enterprise.",
          "Use an enterprise-tier AI tool with a signed data processing agreement that does not train on your inputs.",
          "Use any AI tool but delete the conversation afterward to protect the data.",
          "Ask the AI tool to keep the information confidential before pasting it in."
        ],
        "correctIndex": 1,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "Consumer-tier tools frequently use inputs for model training and offer no contractual data protection. Using them with client confidential data creates legal and compliance exposure regardless of output quality.",
            "linkedMisconceptionId": "tool-selection-workflow-m3"
          },
          {
            "optionIndex": 1,
            "feedback": "Correct. Client financial data, strategic plans, and personnel information require contractual data protections. An enterprise tier with a DPA ensures your data is not used for training and provides the legal basis for processing personal data under GDPR/CCPA."
          },
          {
            "optionIndex": 2,
            "feedback": "Deleting a conversation removes it from your view but does not affect how the vendor processes or retains the data on their servers. Data handling is governed by the terms of service, not by whether you delete your copy.",
            "linkedMisconceptionId": "tool-selection-workflow-m3"
          },
          {
            "optionIndex": 3,
            "feedback": "AI tools do not have legal privacy obligations based on conversational instructions — they are governed by their terms of service and data processing agreements. Instructing the model to 'keep this confidential' has no technical or legal effect.",
            "linkedMisconceptionId": "tool-selection-workflow-m3"
          }
        ],
        "linkedCompetencies": ["tool-selection-workflow", "limitation-risk-assessment"],
        "scoringCriteria": ["Selects option B (index 1)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-tool-selection-workflow-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-005",
        "prompt": "You have tried four different prompt formulations asking an LLM to summarise a confidential internal policy document, but all four produce plausible-sounding but inaccurate results. What is the most appropriate next step?",
        "questionType": "multiple-choice",
        "options": [
          "Try a fifth formulation with stronger emphasis on accuracy.",
          "Switch to a more capable model — larger models make fewer errors.",
          "Provide the actual policy document text in the prompt context, or use a retrieval-augmented system over the document.",
          "Accept that AI cannot summarise policy documents and do it manually."
        ],
        "correctIndex": 2,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "This is a structural failure — the model lacks the document content in its knowledge. Reprompting with different wording produces more confidently worded versions of the same fabrication, not accurate summaries.",
            "linkedMisconceptionId": "prompt-context-craft-m4"
          },
          {
            "optionIndex": 1,
            "feedback": "A larger model also lacks access to a confidential internal document it was never trained on. Scale does not resolve a knowledge-gap failure; grounding the model in the actual content does.",
            "linkedMisconceptionId": "neural-network-literacy-m2"
          },
          {
            "optionIndex": 2,
            "feedback": "Correct. The failure is structural: the model lacks the document. The fix is to provide the document text directly in the prompt context (if it fits the context window) or to use a RAG system that retrieves it. Once the model has the actual text, it can summarise accurately."
          },
          {
            "optionIndex": 3,
            "feedback": "AI can absolutely summarise policy documents — when given the text. The issue is the knowledge gap, not a categorical incapability. Providing the document resolves the problem without abandoning AI assistance.",
            "linkedMisconceptionId": "prompt-context-craft-m4"
          }
        ],
        "linkedCompetencies": ["prompt-context-craft", "llm-mechanics"],
        "scoringCriteria": ["Selects option C (index 2)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-prompt-context-craft-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-006",
        "prompt": "An agentic AI system is tasked with processing insurance claims: it classifies claims, calculates payouts, and issues payments automatically. After six months of flawless operation, the team removes the human approval step before payment issuance to save time. Why is this a mistake?",
        "questionType": "multiple-choice",
        "options": [
          "It is fine to remove the approval step once the system has a proven track record.",
          "Agentic systems improve over time, so fewer approvals are needed as the system matures.",
          "Payment issuance is irreversible; a single novel error after removal of the checkpoint could cause unrecoverable harm regardless of prior performance.",
          "The approval step is only needed for claims above a certain dollar threshold."
        ],
        "correctIndex": 2,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "Prior performance on historical inputs does not guarantee performance on future novel inputs. The approval gate's necessity is determined by the irreversibility of the action, not the system's track record.",
            "linkedMisconceptionId": "agentic-ai-m3"
          },
          {
            "optionIndex": 1,
            "feedback": "Most deployed models do not improve in production — they are frozen at training time and may even degrade as the data distribution shifts. The assumption of ongoing improvement is incorrect.",
            "linkedMisconceptionId": "ml-fundamentals-m3"
          },
          {
            "optionIndex": 2,
            "feedback": "Correct. Irreversible actions — payments, deletions, sent communications — require human checkpoints regardless of historical performance. Novel inputs with novel errors are unavoidable in production, and the cost of an undetected error at an irreversible step is permanent."
          },
          {
            "optionIndex": 3,
            "feedback": "Dollar thresholds can inform the depth of review required, but irreversible actions require at minimum a basic approval gate at any dollar level. The irreversibility property — not the amount — is what determines the checkpoint requirement.",
            "linkedMisconceptionId": "agentic-ai-m3"
          }
        ],
        "linkedCompetencies": ["agentic-ai", "limitation-risk-assessment"],
        "scoringCriteria": ["Selects option C (index 2)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-agentic-ai-as-likely-known"
          }
        ]
      },
      {
        "probeId": "pkc-007",
        "prompt": "A manager receives a market research report she suspects may be AI-generated. She runs it through an AI-detection tool, which returns a verdict of 'likely human-written.' She accepts the report as genuine. What is wrong with this reasoning?",
        "questionType": "multiple-choice",
        "options": [
          "Nothing — AI detection tools are reliable enough to use as a final verdict.",
          "She should have run two detection tools and required both to agree before accepting.",
          "AI-detection tools have significant false-negative rates; edited or well-prompted AI text regularly evades them. The verdict is one weak signal, not proof of human authorship.",
          "She should have asked the author directly — self-reporting is more reliable than detection tools."
        ],
        "correctIndex": 2,
        "optionFeedback": [
          {
            "optionIndex": 0,
            "feedback": "AI-detection tools have documented high false-positive and false-negative rates, degrade against newer models, and produce inconsistent results on the same text. They are not reliable enough to serve as final verdicts in high-stakes decisions.",
            "linkedMisconceptionId": "content-verification-m1"

            "linkedMisconceptionId": "content-verification-m1"

          {
            "optionIndex": 3,

            "linkedMisconceptionId": "content-verification-m3"
          }
        ],
        "linkedCompetencies": ["content-verification"],
        "scoringCriteria": ["Selects option C (index 2)"],
        "routingRules": [
          {
            "condition": "score == 1",
            "action": "flag-competency-content-verification-as-likely-known"
          }
        ]

        "questionType": "scenario-analysis",
        "options": [],
        "correctIndex": -1,
        "optionFeedback": [],
        "linkedCompetencies": ["ai-foundations", "ml-fundamentals", "neural-network-literacy", "llm-mechanics", "tool-selection-workflow", "prompt-context-craft", "agentic-ai", "limitation-risk-assessment", "content-verification"],

          }
        ]
      }
    ]
  },

  "glossary": [
    {"term": "Artificial Intelligence (AI)", "definition": "The broad field of building systems that perform tasks normally requiring human intelligence — perception, reasoning, language, decision-making. Encompasses ML, deep learning, generative AI, and rule-based expert systems."},
    {"term": "Machine Learning (ML)", "definition": "A subset of AI in which systems learn statistical patterns from data rather than following hand-coded rules. Engineers shape the training data and objective; the model derives its own rules."},
    {"term": "Deep Learning", "definition": "A subset of ML using neural networks with many layers. Responsible for most major AI advances since 2012, including image recognition, speech, and large language models."},
    {"term": "Generative AI", "definition": "A subset of deep learning focused on generating new content (text, images, audio, code, video) rather than classifying or predicting."},
    {"term": "Natural Language Processing (NLP)", "definition": "AI subfield dealing with understanding and generating human language. Applications include chatbots, document analysis, machine translation, and sentiment analysis."},
    {"term": "Computer Vision", "definition": "AI subfield dealing with interpreting images and video. Applications include quality inspection, medical imaging, facial recognition, and autonomous vehicles."},
    {"term": "Recommender System", "definition": "An ML system that predicts user preferences to surface relevant content, products, or connections. Used by Netflix, Spotify, Amazon, TikTok."},
    {"term": "Supervised Learning", "definition": "ML paradigm where the model learns from labelled examples — input paired with the correct answer. Used for classification and regression tasks."},
    {"term": "Unsupervised Learning", "definition": "ML paradigm where the model finds structure in unlabelled data without predefined correct answers. Used for clustering and anomaly detection."},
    {"term": "Reinforcement Learning (RL)", "definition": "ML paradigm where an agent learns by taking actions, receiving reward or penalty signals, and adjusting behaviour to maximise cumulative reward. Used in game-playing, robotics, and RLHF for LLM alignment."},
    {"term": "Training", "definition": "The process of adjusting a model's parameters on a dataset to minimise prediction error. Occurs before deployment; model weights change only during training."},
    {"term": "Inference", "definition": "Using a trained, fixed model to make predictions on new data. Weights are frozen during inference; user interactions do not update the model."},
    {"term": "Feature", "definition": "An individual measurable input property used by a model to make predictions (e.g. days since last purchase, transaction amount, pixel value)."},
    {"term": "Label", "definition": "The correct answer associated with a training example (e.g. 'spam' or 'not spam'). In supervised learning, the model learns to predict labels from features."},
    {"term": "Overfitting", "definition": "When a model learns training data too precisely — including its noise — and fails to generalise to new, unseen data. Diagnosed by a large gap between training and test performance."},
    {"term": "Generalisation", "definition": "The ability of a trained model to perform well on new, unseen data. The primary goal of ML model development."},
    {"term": "Neuron (artificial)", "definition": "A mathematical function that takes weighted inputs, sums them, applies a nonlinear activation, and produces an output. The basic computational unit of a neural network."},
    {"term": "Layer", "definition": "A collection of neurons that all receive input from the same source and pass output to the next stage. Networks learn increasingly abstract representations across successive layers."},
    {"term": "Weights", "definition": "The numerical parameters in a neural network that determine how much each input influences a neuron's output. Adjusted during training via backpropagation."},
    {"term": "Backpropagation", "definition": "The algorithm that computes how each weight contributed to prediction error and adjusts weights to reduce that error. The mechanism by which neural networks are trained."},
    {"term": "Loss Function", "definition": "A measurement of how wrong the model's current prediction is. Training minimises the loss function across the training dataset."},
    {"term": "Convolutional Neural Network (CNN)", "definition": "Neural network architecture using sliding filters to detect local spatial patterns regardless of position. Dominant for image classification, object detection, and computer vision tasks."},
    {"term": "Recurrent Neural Network (RNN)", "definition": "Neural network architecture that processes sequences step-by-step with a running hidden state. Pre-transformer architecture for text and time-series; largely superseded by transformers for language tasks."},
    {"term": "Transformer", "definition": "Neural network architecture using self-attention to process all input tokens simultaneously, directly relating any token to any other regardless of distance. Foundation of all major LLMs. Introduced 2017."},
    {"term": "Token", "definition": "The basic unit an LLM processes — roughly a word fragment (approximately 0.75 words per token in English). Sentences are converted to token sequences before processing."},
    {"term": "Context Window", "definition": "The maximum number of tokens an LLM can process in one interaction (input + output combined). Information beyond this limit is dropped or must be summarised."},
    {"term": "Embedding", "definition": "A vector (list of numbers) that represents a word, phrase, or document in high-dimensional space, where semantic similarity corresponds to geometric proximity. Foundation of semantic search and RAG."},
    {"term": "Fine-tuning", "definition": "Additional training on a smaller, task-specific dataset on top of a pre-trained model to specialise its behaviour. Adjusts weights; does not update core world knowledge from pre-training."},
    {"term": "RAG (Retrieval-Augmented Generation)", "definition": "An architecture that adds a retrieval step to LLM generation: relevant documents are retrieved from a database before generating a response, grounding the output in retrieved evidence."},
    {"term": "Diffusion Model", "definition": "Image generation architecture that learns to reverse a noise-adding process. Used in Midjourney, DALL-E, and Stable Diffusion to generate images from text prompts."},
    {"term": "Hallucination", "definition": "AI-generated content that is factually false or fabricated, presented with apparent confidence. A structural property of next-token prediction: the model generates plausible text regardless of factual accuracy."},
    {"term": "Training-Data Bias", "definition": "Systematic skews in AI outputs caused by over- or under-representation of groups, perspectives, or topics in training data. Not eliminated by safety filters."},
    {"term": "Knowledge Cutoff", "definition": "The date after which new information is not reflected in an LLM's training data. The model cannot know about events or changes after this date unless given them in context or via retrieval."},
    {"term": "Prompt Sensitivity", "definition": "The property of AI outputs changing significantly based on small, superficially irrelevant changes in prompt wording. A reliability concern for high-stakes queries."},
    {"term": "Human-in-the-Loop (HITL)", "definition": "A system design where humans review, approve, or intervene at critical decision points rather than fully delegating to AI. Mandatory at irreversible actions in agentic systems."},
    {"term": "Agentic AI", "definition": "An AI system designed to take sequences of autonomous actions toward a goal using tools (web browsing, code execution, API calls) across multiple steps, with real-world consequences."},
    {"term": "Error Compounding", "definition": "When a small error in an early step of an autonomous pipeline propagates and amplifies through subsequent steps, producing a large error at the output that is difficult to trace back to its origin."},
    {"term": "Irreversibility", "definition": "The property of an action that cannot be undone once taken (email sent, file deleted, payment issued). Irreversible actions in agentic systems require mandatory human approval gates."},
    {"term": "Prompt Injection", "definition": "An attack where malicious instructions embedded in external content (web pages, emails, documents) attempt to override an agent's original directives when the agent processes that content."},
    {"term": "Sandboxing", "definition": "Restricting an agent's access to systems and resources to the minimum necessary for its task, limiting the damage scope if the agent makes an error or is attacked."},
    {"term": "Claim Extraction", "definition": "Identifying the specific factual assertions in a passage that can be verified against external sources. The first step of the AI content audit process."},
    {"term": "Source-Checking", "definition": "Tracing a specific claim to a primary or authoritative source to confirm or disconfirm its accuracy. The second step of the AI content audit process."},
    {"term": "Cross-Model Comparison", "definition": "Querying multiple AI models with the same question and comparing responses. Divergence signals uncertain or inconsistent model knowledge and flags claims for primary source verification."},
    {"term": "Bias Probe", "definition": "A prompt designed to test whether an AI system exhibits systematic bias on a topic, typically by varying demographic characteristics or asking for both sides of a position."},
    {"term": "AI-Detection Tool", "definition": "Software claiming to classify text as human-written or AI-generated based on statistical patterns (e.g. perplexity). Subject to high false-positive and false-negative rates; should be treated as one weak signal, not a definitive verdict."},
    {"term": "Data Processing Agreement (DPA)", "definition": "A contractual document defining how a data processor handles personal data on behalf of the data controller. Required for GDPR-compliant use of AI tools with personal data."},
    {"term": "Enterprise Tier", "definition": "A paid product tier for AI tools that includes contractual data handling protections (DPA), opt-out from model training on user inputs, and enterprise security certifications. Required for work with confidential or regulated data."},
    {"term": "ARIA Method", "definition": "A four-step workflow integration framework: Audit (map the current workflow), Redesign (specify AI-assists vs. human-decides), Integrate (pilot one tool), Assess (measure outcomes and iterate)."},
    {"term": "Multi-Agent System", "definition": "An architecture where multiple AI agents collaborate, each specialised for a sub-task, coordinated by an orchestrator agent. Used for complex, multi-domain tasks too large for a single context window."},
    {"term": "RLHF (Reinforcement Learning from Human Feedback)", "definition": "A technique used to align LLM outputs with human preferences. Human raters score model responses; a reward model is trained on these ratings; the LLM is then fine-tuned to maximise reward model scores."}
  ],

    {
      "experienceId": "ai-landscape-exp-02",
      "title": "Lecture: The Nesting Diagram and Why Precision Matters",
      "experienceType": "guided-analysis",
      "difficultyProfile": {

      "linkedCompetencies": ["ai-foundations"],
