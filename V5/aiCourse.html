function renderIntro(){
  const m = C.courseMetadata||{};
  const tagColors=['accent','moss','gold','indigo','plum','rust'];
  const tags = (m.tags||[]).map((t,i)=>`<span class="tag tag-${tagColors[i%tagColors.length]}"><span class="tdot"></span>${t}</span>`).join('');
  const seal = (m.version? 'v'+m.version : (m.difficultyLevel||''));

  const hrs = Math.floor((m.estimatedDurationMinutes||0)/60), mins=(m.estimatedDurationMinutes||0)%60;
  const dur = hrs? `${hrs}h${mins?' '+mins+'m':''}` : `${mins}m`;

  const lmFlags = [
    ['retrievalPracticeEnabled','Retrieval Practice'],
    ['confidenceCalibrationEnabled','Confidence Calibration'],
    ['adaptiveDifficultyEnabled','Adaptive Difficulty'],
    ['interleavingEnabled','Interleaving'],
    ['spacedRepetitionEnabled','Spaced Repetition']
  ];
  const lmPills = lmFlags.map(([k,label])=>`<span class="lm-pill ${LM[k]?'on':''}"><span class="dot"></span>${label}</span>`).join('');

  // outcomes from all competencies
  const outcomes = (C.competencies||[]).flatMap(c=>(c.desiredOutcomes||[]).map(o=>o.description));
  const outcomesHTML = outcomes.map(o=>`<li>${o}</li>`).join('');

  const prereqs = (m.prerequisites||[]).map(p=>`<li><b style="color:var(--ink);text-transform:capitalize">${p.type}:</b> ${p.description}</li>`).join('');

  const startScreen = C.priorKnowledgeCheck?.enabled && !state.pkcDone ? "goScreen('pkc')" : "goScreen('section',0,0)";
  const startLabel  = C.priorKnowledgeCheck?.enabled && !state.pkcDone ? 'Begin with a knowledge check' : 'Begin the course';

  const coverArt = m.thumbnailImage
    ? `<img src="${m.thumbnailImage}" alt="${m.title}">`
    : `<div class="seal">${seal||'✦'}</div>`;

  document.getElementById('screen-intro').innerHTML = `
   <div class="stagger">
    <div class="cover">
      <div class="cover-art">${coverArt}</div>
      <div class="cover-body">
        <div class="cover-tags">${tags}</div>
        <h1>${m.title||'Untitled Course'}</h1>
        <p class="cover-desc">${m.description||''}</p>
      </div>
    </div>

    <div class="meta-strip">
      <div class="meta-cell"><div class="mc-val">${dur}</div><div class="mc-key">Est. time</div></div>
      <div class="meta-cell"><div class="mc-val" style="text-transform:capitalize">${m.difficultyLevel||'—'}</div><div class="mc-key">Level</div></div>
      <div class="meta-cell"><div class="mc-val">${(C.sections||[]).length}</div><div class="mc-key">Sections</div></div>
      <div class="meta-cell"><div class="mc-val">${(C.competencies||[]).length}</div><div class="mc-key">Competencies</div></div>
    </div>

    ${reviewCardHTML()}

    <div class="eyebrow"><span class="rule"></span>Learning design</div>
    <div class="lm-grid">${lmPills}</div>

    ${outcomesHTML?`<div class="eyebrow" style="margin-top:30px"><span class="rule"></span>What you'll be able to do</div>
    <ul class="list-clean outcomes-list">${outcomesHTML}</ul>`:''}

    ${prereqs?`<div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Before you start</div>
    <ul class="list-clean prereq-list">${prereqs}</ul>`:''}

    <div style="margin-top:36px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="${startScreen}">${startLabel} →</button>
      <button class="btn btn-secondary" onclick="document.getElementById('course-file').click()">Load course JSON</button>
    </div>
   </div>`;
}

// ════════════════════════════════════════════════════════════════════════
//  PRIOR KNOWLEDGE CHECK
// ════════════════════════════════════════════════════════════════════════
function renderPKC(){
  const pkc = C.priorKnowledgeCheck;
  if(!pkc?.enabled){ goScreen('section',0,0); return; }

  const probes = (pkc.probeQuestions||[]).map((p,i)=>{
    const saved = state.pkcAnswers[p.probeId];
    const comps = (p.linkedCompetencies||[]).map(cId=>{
      const c=findCompetency(cId); return c?`<span class="tag tag-line" style="margin-left:4px">${c.title}</span>`:'';
    }).join('');

    let inputHTML='';
    if(p.questionType==='multiple-choice' && p.options){
      inputHTML = `<div class="mc-options" id="pkc-mc-${p.probeId}">` + p.options.map((o,oi)=>`
        <div class="mc-option ${saved&&saved.choice===oi?'selected':''} ${saved?'locked':''} ${saved&&saved.choice===oi&&oi===p.correctIndex?'correct':''} ${saved&&saved.choice===oi&&oi!==p.correctIndex?'incorrect':''} ${saved&&oi===p.correctIndex&&saved.choice!==oi?'correct':''}"
             onclick="answerProbeMC('${p.probeId}',${oi},${p.correctIndex})">
          <span class="mc-key">${String.fromCharCode(65+oi)}</span><span>${o}</span>
        </div>`).join('') + `</div>`;
    } else {
      inputHTML = `<textarea class="sa-input" id="pkc-sa-${p.probeId}" placeholder="Type what you already know…" ${saved?'disabled':''}>${saved?saved.text||'':''}</textarea>
        ${!saved?`<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="answerProbeSA('${p.probeId}')">Submit</button></div>`:''}`;
    }

    const routing = (p.routingRules||[]).map(r=>`
      <div class="routing-row"><span class="routing-cond">${r.condition}</span><span>→ ${r.action}</span></div>`).join('');
    const crit = (p.scoringCriteria||[]).map(c=>`<li>${c}</li>`).join('');

    return `<div class="probe-card" id="probe-${p.probeId}">
      <div class="probe-num">Probe ${i+1} · ${p.questionType}</div>
      <div class="int-prompt">${p.prompt}</div>
      <div style="margin-bottom:12px">${comps}</div>
      ${inputHTML}
      ${saved?probeOptionFeedback(p,saved):''}
      <div class="probe-routing ${saved?'show':''}" id="routing-${p.probeId}">
        <div class="criteria-label">Scoring criteria</div>
        <ul class="criteria-list">${crit}</ul>
        <div class="criteria-label" style="margin-top:10px">Adaptive routing</div>
        ${routing}
      </div>
    </div>`;
  }).join('');

  const allAnswered = (pkc.probeQuestions||[]).every(p=>state.pkcAnswers[p.probeId]);

  document.getElementById('screen-pkc').innerHTML = `
   <div class="stagger">
    <div class="eyebrow"><span class="rule"></span>Calibration · ${pkc.placement}</div>
    <h1 style="font-size:32px;margin-bottom:14px">Prior Knowledge Check</h1>
    <div class="pkc-banner">
      <span class="pkc-icon">🧭</span>
      <div>
        <h3>This isn't graded</h3>
        <p>Your answers help the engine route you — skipping what you've mastered, reinforcing what you haven't. Answer honestly; the routing rules below each probe show how responses are used.</p>
      </div>
    </div>
    ${probes}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('intro')">← Back</button>
      <button class="btn btn-primary" onclick="finishPKC()">${allAnswered?'Continue to the course →':'Skip & start course →'}</button>
    </div>
   </div>`;
}
function answerProbeMC(probeId, choice, correct){
  state.pkcAnswers[probeId] = { choice, correct: choice===correct };
  // light competency credit for correct prior knowledge
  const pkc = C.priorKnowledgeCheck.probeQuestions.find(p=>p.probeId===probeId);
  recordEvidence(pkc.linkedCompetencies, choice===correct?1:0, 'pkc');
  saveState(); renderPKC();
}
function answerProbeSA(probeId){
  const ta = document.getElementById('pkc-sa-'+probeId);
  if(!ta || !ta.value.trim()){ toast('Write a short answer first'); return; }
  state.pkcAnswers[probeId] = { text: ta.value };
  const pkc = C.priorKnowledgeCheck.probeQuestions.find(p=>p.probeId===probeId);
  recordEvidence(pkc.linkedCompetencies, 1, 'participation');
  saveState(); renderPKC();
}
function finishPKC(){
  state.pkcDone = true; add(state.completedProbes,'all'); saveState();
  toast('Knowledge check recorded'); goScreen('section',0,0);
}

function renderSection(){
  const sec = curSection(); if(!sec) return;
  const si = state.sectionIdx;

  const hookIcons={'real-world-stakes':'⚠','prediction-gap':'◎','curiosity-prompt':'?','relevance-anchor':'⚓'};
  const hooks=(sec.motivationHooks||[]).map(h=>`
    <div class="hook hook-${h.type}">
      <span class="hook-icon">${hookIcons[h.type]||'✦'}</span>
      <div><span class="hk-type">${h.type.replace(/-/g,' ')}</span>${h.prompt}</div>
    </div>`).join('');

  const objectives=(sec.learningObjectives||[]).map(o=>{
    const comps=(o.linkedCompetencies||[]).map(cId=>{
      const c=findCompetency(cId); return c?`<span class="tag tag-line">${c.title}</span>`:'';
    }).join('');
    return `<li>${o.description}<div class="obj-comps">${comps}</div></li>`;
  }).join('');

  const expList = (sec.learningExperiences||[]).map((e,ei)=>{
    const done = has(state.completedExperiences,e.experienceId);
    return `<div class="card" style="display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:10px" onclick="goScreen('exp',${si},${ei})">
      <div style="width:34px;height:34px;border-radius:50%;border:1.5px solid ${done?'var(--accent)':'var(--line)'};background:${done?'var(--accent)':'transparent'};color:${done?'#fff':'var(--ink-faint)'};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;flex-shrink:0">${done?'✓':ei+1}</div>
      <div style="flex:1">
        <div style="font-family:var(--serif);font-size:16px;color:var(--ink)">${e.title}</div>
        <div style="font-size:12px;color:var(--ink-faint);margin-top:2px">${expTypeLabel(e.experienceType)} · ${e.estimatedDurationMinutes||'—'} min</div>
      </div>
      <span style="color:var(--ink-faint)">→</span>
    </div>`;
  }).join('');

  const prevAction = si>0 ? `goScreen('section',${si-1},0)` : `goScreen('intro')`;

  document.getElementById('screen-section').innerHTML = `
   <div class="stagger">
    <div class="eyebrow"><span class="rule"></span>Section ${si+1} of ${C.sections.length}</div>
    <h1 style="font-size:34px;margin-bottom:12px">${sec.title}</h1>
    <p class="lede">${sec.description||''}</p>
    <div style="margin-top:24px">${hooks}</div>
    ${objectives?`<div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Learning objectives</div>
    <ul class="list-clean objectives-list">${objectives}</ul>`:''}
    <div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Experiences in this section</div>
    ${expList}
    ${renderFurther(sec)}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
      <button class="btn btn-primary" onclick="goScreen('exp',${si},0)">Start section →</button>
    </div>
   </div>`;
}

// ════════════════════════════════════════════════════════════════════════
//  EXPERIENCE SCREEN
// ════════════════════════════════════════════════════════════════════════
function renderFurther(sec){
  const items=(sec.furtherReading||[]);
  if(!items.length) return '';
  const rows=items.map(r=>{
    const type=(r.resourceType||'resource');
    const titleHTML = r.url
      ? `<a href="${r.url}" target="_blank" rel="noopener">${r.title||'Untitled'}</a>`
      : (r.title||'Untitled');
    const comps=(r.linkedCompetencies||[]).map(cId=>{const c=findCompetency(cId);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');
    return `<div class="fr-item">
      <div class="fr-top">
        <span class="fr-title">${titleHTML}</span>
        <span class="fr-type">${type}</span>
      </div>
      ${r.author?`<div class="fr-author">${r.author}</div>`:''}
      ${(!r.url && r.citation)?`<div class="fr-cite">${r.citation}</div>`:''}
      ${r.rationaleNote?`<div class="fr-rationale">${r.rationaleNote}</div>`:''}
      ${comps?`<div class="obj-comps" style="margin-top:8px">${comps}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Further reading</div>
    <div class="further">
      <div class="further-label">📖 Optional · go deeper</div>
      <div class="further-note">Supplementary resources for those who want more — never required to progress.</div>
      ${rows}
    </div>`;
}

function renderExp(){
  const sec = curSection(); const exp = curExp(); if(!exp) return;
  const si=state.sectionIdx, ei=state.expIdx;
  const isLast = ei === sec.learningExperiences.length-1;
  state.revealed[exp.experienceId] = state.revealed[exp.experienceId]||[];
  state.answers[exp.experienceId]  = state.answers[exp.experienceId]||{};

  const dp = exp.difficultyProfile||{};
  const diffDots = renderDiffDots(dp.overall||0);
  const cogTags = (exp.desiredCognitiveActions||[]).map(a=>`<span class="tag tag-${cogColor(a)}"><span class="tdot"></span>${a}</span>`).join('');
  const compTags = (exp.linkedCompetencies||[]).map(cId=>{const c=findCompetency(cId);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');

  const content = (exp.contentBlocks||[]).map(renderContentBlock).join('');
  const worked  = (exp.workedExamples||[]).map(renderWorked).join('');
  const selfGuided = renderSelfGuided(exp.selfGuidedExercise);
  const interactions = (exp.interactionSequence||[]).map(int=>renderInteraction(int,exp)).join('');
  const retrieval = (exp.retrievalPractice||[]).map(r=>renderRetrieval(r,exp)).join('');
  const transfer  = (exp.transferExercises||[]).map(t=>renderTransfer(t,exp)).join('');
  const mastery   = renderMastery(exp);

  const nextLabel = isLast ? 'Complete section →' : 'Next experience →';
  const nextAction = isLast ? `completeExp('${exp.experienceId}');finishSection(${si})` : `completeExp('${exp.experienceId}');goScreen('exp',${si},${ei+1})`;
  const prevAction = ei>0 ? `goScreen('exp',${si},${ei-1})` : `goScreen('section',${si})`;

  document.getElementById('screen-exp').innerHTML = `
   <div class="exp-header">
     <div class="eyebrow">${sec.title} · ${expTypeLabel(exp.experienceType)}</div>
     <h2>${exp.title}</h2>
     <div class="exp-meta">
       <span class="exp-meta-item">◷ ${exp.estimatedDurationMinutes||'—'} min</span>
       <span class="exp-meta-item">Difficulty ${diffDots}</span>
       ${dp.conceptualComplexity?`<span class="exp-meta-item">Conceptual ${dp.conceptualComplexity}/5</span>`:''}
       ${dp.ambiguity?`<span class="exp-meta-item">Ambiguity ${dp.ambiguity}/5</span>`:''}
     </div>
     <div class="cog-actions">${cogTags}${compTags}</div>
   </div>
   ${content}
   ${worked}
   ${selfGuided}
   ${interactions}
   ${retrieval}
   ${transfer}
   ${mastery}
   <div class="nav-buttons">
     <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
     <button class="btn btn-primary" onclick="${nextAction}">${nextLabel}</button>
   </div>`;
  attachGlossaryLinks();
}

function renderContentBlock(b){
  if(b.type==='text') return `<div class="cb-text">${b.content||''}</div>`;
  if(b.type==='image'){
    return `<figure class="cb-media">${
      b.url ? `<img src="${b.url}" alt="${b.altText||''}">`
            : `<div class="cb-placeholder"><span class="ph-ico">🖼</span><span>${b.altText||'Image'}</span></div>`
    }${b.altText?`<figcaption class="cb-caption">${b.altText}</figcaption>`:''}</figure>`;
  }
  if(b.type==='video'){
    return `<figure class="cb-media">${
      b.url ? `<video controls src="${b.url}"></video>`
            : `<div class="cb-placeholder"><span class="ph-ico">▶</span><span>Video</span></div>`
    }${b.captionOrTranscript?`<details class="cb-transcript"><summary>Transcript</summary><p>${b.captionOrTranscript}</p></details>`:''}</figure>`;
  }
  if(b.type==='audio'){
    return `<figure class="cb-media">${
      b.url ? `<audio controls src="${b.url}"></audio>`
            : `<div class="cb-placeholder"><span class="ph-ico">♪</span><span>Audio</span></div>`
    }${b.captionOrTranscript?`<details class="cb-transcript"><summary>Transcript</summary><p>${b.captionOrTranscript}</p></details>`:''}</figure>`;
  }
  if(b.type==='interactive') return `<div class="cb-interactive">⚡ ${b.content||'Interactive element'}</div>`;
  return '';
}

function renderWorked(we){
  const steps=(we.steps||[]).map(s=>`<li>${s}</li>`).join('');
  return `<div class="worked">
    <div class="worked-label">✦ Worked Example</div>
    <div class="worked-problem">${we.problem||''}</div>
    <ol class="we-steps">${steps}</ol>
    ${we.conclusion?`<div class="we-conclusion">${we.conclusion}</div>`:''}
  </div>`;
}

function renderSelfGuided(sg){
  if(!sg) return '';
  const steps=(sg.instructions||[]).map(s=>`<li>${s}</li>`).join('');
  const reflect=(sg.reflectionPrompts||[]).map(p=>`<li>${p}</li>`).join('');
  const prep=(sg.materialsOrPrerequisites||[]).map(m=>`<li>${m}</li>`).join('');
  const crit=(sg.verification&&sg.verification.selfAssessmentCriteria||[]).map(c=>`<li>${c}</li>`).join('');
  const meta=[];
  if(sg.estimatedRealWorldDurationMinutes) meta.push(`◷ ~${sg.estimatedRealWorldDurationMinutes} min in the real world`);
  if(sg.verification&&sg.verification.mode&&sg.verification.mode!=='none') meta.push(`✎ ${sg.verification.mode.replace(/-/g,' ')}`);
  return `<div class="selfguided">
    <div class="sg-label">⇲ Self-Guided Exercise <span class="sg-formative">formative · not graded</span></div>
    ${sg.realWorldContext?`<div class="sg-context"><b>Where:</b> ${sg.realWorldContext}</div>`:''}
    ${sg.objective?`<div class="sg-objective">${sg.objective}</div>`:''}
    ${meta.length?`<div class="sg-meta">${meta.map(m=>`<span>${m}</span>`).join('')}</div>`:''}
    ${steps?`<div class="sg-heading">What to do</div><ol class="sg-steps">${steps}</ol>`:''}
    ${prep?`<div class="sg-heading">Before you start</div><ul class="sg-prep">${prep}</ul>`:''}
    ${reflect?`<div class="sg-heading">When you return — reflect</div><ul class="sg-reflect">${reflect}</ul>`:''}
    ${crit?`<div class="sg-heading">Judge your own work</div><ul class="sg-criteria">${crit}</ul>`:''}
  </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────
const INT_META = {
  'prediction':   {cls:'int-prediction', icon:'◎', label:'Prediction'},
  'reflection':   {cls:'int-reflection', icon:'❀', label:'Reflection'},
  'compare-responses':{cls:'int-compare', icon:'⚖', label:'Compare Responses'},
  'multiple-choice':{cls:'int-mc', icon:'◉', label:'Multiple Choice'},
  'scenario-analysis':{cls:'int-scenario', icon:'⌖', label:'Scenario Analysis'},
  'drag-drop':    {cls:'int-dragdrop', icon:'↕', label:'Ranking'}
};
function renderInteraction(int, exp){
  const expId=exp.experienceId;
  const meta = INT_META[int.interactionType]||{cls:'',icon:'•',label:int.interactionType};
  const saved = state.answers[expId][int.interactionId];
  const revealed = has(state.revealed[expId], int.interactionId);
  const reqStar = int.required ? `<span class="req-star">● required</span>` : '';

  const head = `<div class="int-label">${meta.icon} ${meta.label} ${reqStar}</div>
                <div class="int-prompt">${int.prompt||''}</div>`;
  let bodyHTML='';

  if(int.interactionType==='multiple-choice' && int.options){
    bodyHTML = `<div class="mc-options">` + int.options.map((o,oi)=>{
      let cls='';
      if(saved){
        if(oi===int.correctIndex) cls='correct';
        else if(saved.choice===oi) cls='incorrect';
        cls+=' locked';
      } else if(saved && saved.choice===oi) cls='selected';
      return `<div class="mc-option ${cls}" ${!saved?`onclick="answerMC('${expId}','${int.interactionId}',${oi})"`:''}>
        <span class="mc-key">${String.fromCharCode(65+oi)}</span><span>${o}</span></div>`;
    }).join('') + `</div>`;
  }
  else if(int.interactionType==='drag-drop' && int.options){
    // ranking — render as ordered list, reveal best answer on attempt
    const order = (saved && saved.order) ? saved.order : int.options.map((_,i)=>i);
    bodyHTML = `<ul class="rank-list" id="rank-${int.interactionId}">` +
      order.map((origIdx,pos)=>`<li class="rank-item" draggable="${!saved}" data-idx="${origIdx}">
        <span class="rank-num">${pos+1}</span><span class="rank-grip">⋮⋮</span><span>${int.options[origIdx]}</span></li>`).join('') +
      `</ul>${!saved?`<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitRanking('${expId}','${int.interactionId}')">Lock in order</button></div>`:''}`;
  }
  else if(int.interactionType==='reflection' && int.responseFormat==='likert' && int.options){
    bodyHTML = `<div class="likert">` + int.options.map((o,oi)=>`
      <div class="likert-opt ${saved&&saved.choice===oi?'selected':''}" onclick="answerLikert('${expId}','${int.interactionId}',${oi})">${o}</div>`).join('') + `</div>`;
  }
  else {
    // short-answer style (prediction, reflection, scenario, compare)
    bodyHTML = `<textarea class="sa-input" id="sa-${int.interactionId}" placeholder="Write your response…" ${revealed?'disabled':''}>${saved?saved.answer||'':''}</textarea>`;
  }

  // confidence prompt
  let confHTML='';
  if(int.confidencePrompt?.enabled && LM.confidenceCalibrationEnabled && !revealed){
    const cp=int.confidencePrompt, mid=Math.round(((cp.scaleMin||1)+(cp.scaleMax||5))/2);
    const cur = saved?.confidence || mid;
    confHTML = `<div class="confidence">
      <div class="confidence-label">◷ ${cp.prompt||'How confident are you?'}</div>
      <div class="confidence-row">
        <input type="range" class="confidence-slider" min="${cp.scaleMin||1}" max="${cp.scaleMax||5}" value="${cur}"
               id="conf-${int.interactionId}" oninput="document.getElementById('confval-${int.interactionId}').textContent=this.value+' / ${cp.scaleMax||5}'">
        <span class="confidence-value" id="confval-${int.interactionId}">${cur} / ${cp.scaleMax||5}</span>
      </div>
      <div class="confidence-anchors"><span>Not sure</span><span>Certain</span></div>
    </div>`;
  }

  // hints (hint-only or socratic feedback)
  const fb = int.feedback||{};
  let hintHTML='';
  if((fb.hints||[]).length){
    hintHTML = `<div id="hints-${int.interactionId}">
      <div class="submit-row"><button class="hint-btn" onclick="revealHint('${int.interactionId}')">💡 Need a hint?</button></div>
      <div class="hint-box" id="hintbox-${int.interactionId}"></div>
    </div>`;
  }

  // submit / feedback
  let submitHTML='', feedbackHTML='';
  const needsSubmit = ['prediction','reflection','scenario-analysis','compare-responses'].includes(int.interactionType)
                      && int.responseFormat!=='likert';
  if(needsSubmit && !revealed){
    const label = int.interactionType==='reflection' ? 'Save reflection' : 'Submit & reveal';
    submitHTML = `<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitText('${expId}','${int.interactionId}')">${label}</button></div>`;
  } else if(needsSubmit && revealed){
    submitHTML = `<div class="submit-row"><span class="saved-flag">✓ Response recorded</span></div>`;
  }

  // feedback shown if revealed (or MC/ranking answered)
  const showFb = revealed || (saved && ['multiple-choice','drag-drop'].includes(int.interactionType));
  if(showFb) feedbackHTML = renderFeedback(fb, saved, int) + optionFeedbackHTML(int, saved);

  return `<div class="interaction ${meta.cls}" id="int-${int.interactionId}">
    ${head}${bodyHTML}${confHTML}${hintHTML}${submitHTML}${feedbackHTML}
  </div>`;
}

function renderFeedback(fb, saved, int){
  let cls='fb-elaborative', head='Why', body='';
  if(int && int.interactionType==='multiple-choice' && saved){
    const right = saved.choice===int.correctIndex;
    cls = right?'fb-correct':'fb-corrective';
    head = right?'Correct':'Not quite';
  }
  if(fb.type==='elaborative' && fb.elaborativeFeedback){ cls=cls==='fb-correct'?'fb-correct':'fb-elaborative'; head=head==='Why'?'Explanation':head; body=fb.elaborativeFeedback; }
  else if(fb.type==='corrective' && fb.correctiveFeedback){ cls=cls==='fb-correct'?'fb-correct':'fb-corrective'; head=head==='Why'?'Correction':head; body=fb.correctiveFeedback; }
  else if(fb.type==='socratic'){ cls='fb-socratic'; head='Consider'; body=(fb.hints||[]).join(' '); }
  else { body = fb.elaborativeFeedback || fb.correctiveFeedback || (fb.hints||[]).join(' '); }
  if(!body) return '';
  return `<div class="feedback show ${cls}"><div class="fb-head">✦ ${head}</div>${body}</div>`;
}

// ── Interaction handlers ──────────────────────────────────────────────────
function ansStore(expId,id,val){ state.answers[expId]=state.answers[expId]||{}; state.answers[expId][id]=val; saveState(); }
function reveal(expId,id){ state.revealed[expId]=state.revealed[expId]||[]; add(state.revealed[expId],id); saveState(); }

function submitText(expId,intId){
  const ta=document.getElementById('sa-'+intId);
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  if(int.required && (!ta||!ta.value.trim())){ toast('This response is required'); return; }
  const confEl=document.getElementById('conf-'+intId);
  ansStore(expId,intId,{answer:ta?ta.value:'',confidence:confEl?+confEl.value:null});
  reveal(expId,intId);
  recordEvidence(exp.linkedCompetencies, 1, 'participation');
  renderExp(); toast(int.interactionType==='reflection'?'Reflection saved':'Response recorded');
}
function answerMC(expId,intId,choice){
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  ansStore(expId,intId,{choice}); reveal(expId,intId);
  recordEvidence(exp.linkedCompetencies, choice===int.correctIndex?1:0, 'mc');
  renderExp();
}
function answerLikert(expId,intId,choice){
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  ansStore(expId,intId,{choice}); reveal(expId,intId);
  recordEvidence(exp.linkedCompetencies, 1, 'participation', 0.05);
  renderExp();
}
function submitRanking(expId,intId){
  const list=document.getElementById('rank-'+intId);
  const order=[...list.querySelectorAll('.rank-item')].map(li=>+li.dataset.idx);
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  ansStore(expId,intId,{order}); reveal(expId,intId);
  let score;
  if(Array.isArray(int.correctOrder) && int.correctOrder.length===order.length){
    const hits = order.filter((v,i)=>v===int.correctOrder[i]).length;
    score = hits/order.length;
  } else {
    score = order[0]===int.correctIndex ? 1 : 0.3;
  }
  recordEvidence(exp.linkedCompetencies, score, 'ranking');
  renderExp(); toast(score>=0.99?'Perfect order':'Order locked — see explanation');
}
let _hintIdx={};
function revealHint(intId){
  const exp=curExp();
  const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  const hints=int.feedback?.hints||[];
  _hintIdx[intId]=(_hintIdx[intId]||0);
  if(_hintIdx[intId]>=hints.length){ toast('No more hints'); return; }
  const box=document.getElementById('hintbox-'+intId);
  box.classList.add('show');
  box.innerHTML = hints.slice(0,_hintIdx[intId]+1).map((h,i)=>`<div style="${i>0?'margin-top:8px':''}"><span class="hint-n">Hint ${i+1}</span>${h}</div>`).join('');
  _hintIdx[intId]++;
}

function submitRetrieval(expId,itemId){
  const ta=document.getElementById('sa-'+itemId);
  if(!ta||!ta.value.trim()){ toast('Write what you remember first'); return; }
  ansStore(expId,itemId,{answer:ta.value}); reveal(expId,itemId);

}
function gradeRetrieval(expId,itemId,score){
  const saved=state.answers[expId][itemId]||{}; saved.score=score; saved.gradedAt=Date.now();

function openAssessment(aId){ state.assessId=aId; saveState(); goScreen('assess'); }
function renderAssess(){
  const a=findAssess(state.assessId); if(!a){ goScreen('intro'); return; }
  const submitted=has(state.assessSubmitted,a.assessmentId);
  state.assessAnswers[a.assessmentId]=state.assessAnswers[a.assessmentId]||{};

  const comps=(a.linkedCompetencies||[]).map(cId=>{const c=findCompetency(cId);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');

  const questions=(a.questions||[]).map((q,qi)=>{
    const isMC = q.questionType==='multiple-choice' && Array.isArray(q.options);
    const ans=state.assessAnswers[a.assessmentId][q.questionId];
    const rubric=q.rubric||{};

    let inputHTML;
    if(isMC){
      inputHTML = `<div class="mc-options">` + q.options.map((o,oi)=>{
        let cls='', click='';
        if(submitted){
          if(oi===q.correctIndex) cls='correct';
          else if(ans===oi) cls='incorrect';
          cls+=' locked';
        } else {
          if(ans===oi) cls='selected';
          click=`onclick="answerAssessMC('${a.assessmentId}','${q.questionId}',${oi})"`;
        }
        return `<div class="mc-option ${cls}" ${click}><span class="mc-key">${String.fromCharCode(65+oi)}</span><span>${o}</span></div>`;
      }).join('') + `</div>`;
      if(submitted && ans!=null){
        const of=(q.optionFeedback||[]).find(f=>f.optionIndex===ans);
        if(of && of.feedback) inputHTML += `<div class="feedback show ${ans===q.correctIndex?'fb-correct':'fb-corrective'}" style="margin-top:10px"><div class="fb-head">✦ ${ans===q.correctIndex?'Correct':'Not quite'}</div>${of.feedback}</div>`;
      }
    } else {
      inputHTML = `<textarea class="sa-input" id="aq-${a.assessmentId}-${q.questionId}" placeholder="Write your response…" ${submitted?'disabled':''}>${ans||''}</textarea>`;
    }

    const rubricHTML = (submitted && !isMC) ? `
      <div class="rubric">
        <div class="rubric-title">Self-assess against the rubric</div>
        <div class="rubric-row rubric-excellent"><span class="rubric-level">Excellent</span><span class="rubric-desc">${rubric.excellent||''}</span></div>
        <div class="rubric-row rubric-adequate"><span class="rubric-level">Adequate</span><span class="rubric-desc">${rubric.adequate||''}</span></div>
        <div class="rubric-row rubric-weak"><span class="rubric-level">Weak</span><span class="rubric-desc">${rubric.weak||''}</span></div>
      </div>
      ${(q.successCriteria||[]).length?`<div style="margin-top:14px"><div class="criteria-label">Success criteria</div><ul class="criteria-list">${q.successCriteria.map(c=>`<li>${c}</li>`).join('')}</ul></div>`:''}
      ${renderErrorPatterns(q)}
    `:'';

    let selfRate='';
    if(submitted && !isMC){
      const rated=(state.assessSelfRatings[a.assessmentId]||{})[q.questionId];
      selfRate = rated
        ? `<div class="submit-row"><span class="saved-flag">✓ Self-rated: ${rated.label}</span></div>`
        : selfGradeRow(`rateAssessQ('${a.assessmentId}','${q.questionId}',SCORE,'LBL')`, 'Rate your answer against the rubric',
            [['Excellent',1,'good'],['Adequate',0.6,'gold'],['Weak',0.25,'warn']]);
    }

    return `<div class="q-card">
      <div class="q-meta">Q${qi+1} · ${q.questionType} · Difficulty ${renderDiffDots(q.difficulty,true)}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${inputHTML}
      ${rubricHTML}
      ${selfRate}
    </div>`;
  }).join('');

  document.getElementById('screen-assess').innerHTML=`
   <div class="stagger">
    <div class="assess-head">
      <div class="eyebrow"><span class="rule"></span>${a.assessmentType}</div>
      <h2>${a.title}</h2>
      <div style="margin:10px 0 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--ink-faint)">Measures:</span> ${comps}</div>
      ${a.adaptiveDifficulty?`<div style="font-size:13px;color:var(--indigo);display:flex;align-items:center;gap:6px"><span>⚡</span>Adaptive difficulty enabled — questions adjust to your responses.</div>`:''}
    </div>
    ${questions}
    ${!submitted?`<button class="btn btn-primary" onclick="submitAssessment('${a.assessmentId}')">Submit assessment</button>`
      :`<div class="card" style="background:var(--good-wash);border-color:#bcd6c2">
          <h3 style="font-size:19px;margin-bottom:6px;color:var(--good)">Submitted ✓</h3>
          <p style="font-family:var(--read);font-size:15px;color:var(--ink-soft)">Multiple-choice answers were scored automatically. Rate each written answer against its rubric — your self-rating is recorded as mastery evidence. Error patterns show how specific mistakes map to misconceptions.</p>
        </div>`}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('exp',${state.sectionIdx},${state.expIdx})">← Back to experience</button>
      ${submitted?`<button class="btn btn-primary" onclick="goScreen('complete')">Finish →</button>`:''}
    </div>
   </div>`;
}
function renderErrorPatterns(q){
  const eps=q.errorPatterns||[]; if(!eps.length) return '';
  const rows=eps.map(ep=>{
    const mis=findMisconception(ep.linkedMisconceptionId);
    return `<div class="ep-item">
      <b>${ep.description}</b>
      ${mis?`<span style="display:block;margin-top:3px;color:var(--ink-faint)">Misconception: "${mis.misconception}"</span>`:''}
      <span class="ep-remedy">${ep.remediationAction}</span>
    </div>`;
  }).join('');
  return `<div class="error-patterns"><div class="ep-title">⚠ Watch for these error patterns</div>${rows}</div>`;
}
function findMisconception(id){
  for(const c of C.competencies||[]) for(const m of c.commonMisconceptions||[])
    if(m.misconceptionId===id) return m;
  return null;
}
function answerAssessMC(aId,qId,oi){
  if(has(state.assessSubmitted,aId)) return;
  state.assessAnswers[aId]=state.assessAnswers[aId]||{};
  state.assessAnswers[aId][qId]=oi; saveState(); renderAssess();
}
function submitAssessment(aId){
  const a=findAssess(aId);
  let answered=0;
  (a.questions||[]).forEach(q=>{
    if(q.questionType==='multiple-choice' && Array.isArray(q.options)){
      if(state.assessAnswers[aId][q.questionId]!=null) answered++;
    } else {
      const ta=document.getElementById(`aq-${aId}-${q.questionId}`);
      if(ta){ state.assessAnswers[aId][q.questionId]=ta.value; if(ta.value.trim()) answered++; }
    }
  });
  if(answered===0){ toast('Answer at least one question'); return; }
  add(state.assessSubmitted,aId); add(state.completedAssessments,aId);
  // auto-score the objective questions; written ones await self-rating
  (a.questions||[]).forEach(q=>{
    if(q.questionType==='multiple-choice' && Array.isArray(q.options) && q.correctIndex!=null){
      const ch=state.assessAnswers[aId][q.questionId];
      if(ch!=null) recordEvidence(a.linkedCompetencies||[], ch===q.correctIndex?1:0, 'assessment');
    }
  });
  saveState(); renderAssess(); toast('Submitted — self-rate your written answers below');
}
function rateAssessQ(aId,qId,score,label){
  state.assessSelfRatings[aId]=state.assessSelfRatings[aId]||{};
  if(state.assessSelfRatings[aId][qId]!=null) return;
  state.assessSelfRatings[aId][qId]={score,label};
  const a=findAssess(aId);
  recordEvidence(a.linkedCompetencies||[], score, 'assessment');
  saveState(); renderAssess(); toast('Self-rating recorded: '+label);
}

}
function gradeLabel(s){ return s>=0.75?'Recalled':s>=0.4?'Partial recall':'Missed — it will return sooner'; }

function optionFeedbackHTML(int, saved){
  if(!saved) return '';
  let out='';
  const ofs=int.optionFeedback||[];
  const block=(of,head)=>{
    if(!of||!of.feedback) return '';
    const mis=of.linkedMisconceptionId?findMisconception(of.linkedMisconceptionId):null;
    return `<div class="feedback show fb-elaborative" style="margin-top:10px"><div class="fb-head">✦ ${head}</div>${of.feedback}${mis?`<div style="margin-top:6px;font-size:13px;color:var(--ink-faint)">Common misconception: "${mis.misconception}"</div>`:''}</div>`;
  };
  if(int.interactionType==='multiple-choice' && saved.choice!=null){
    out += block(ofs.find(f=>f.optionIndex===saved.choice),'About your choice');
    if(saved.choice!==int.correctIndex){
      out += block(ofs.find(f=>f.optionIndex===int.correctIndex),'Why '+String.fromCharCode(65+(int.correctIndex??0))+' is right');
    }
  }
  if(int.interactionType==='drag-drop' && Array.isArray(int.correctOrder) && saved.order){
    const hits=saved.order.filter((v,i)=>v===int.correctOrder[i]).length;
    out += `<div class="feedback show fb-elaborative" style="margin-top:10px"><div class="fb-head">✦ Expert order · you matched ${hits}/${int.correctOrder.length}</div><ol style="margin:6px 0 0 18px">${int.correctOrder.map(i=>`<li>${int.options[i]}</li>`).join('')}</ol></div>`;
  }
  return out;
}
function probeOptionFeedback(p,saved){
  if(!saved || saved.choice==null) return '';

// ════════════════════════════════════════════════════════════════════════
//  SPACED-REPETITION SCHEDULER + REVIEW QUEUE
//  The course JSON stays static; the engine owns all timestamps in
//  state.reviewSchedule. Intervals come from each item's schedule block.
// ════════════════════════════════════════════════════════════════════════
function findRetrievalItem(itemId){
  for(const sec of C.sections||[]) for(const e of sec.learningExperiences||[])
    for(const r of e.retrievalPractice||[]) if(r.retrievalItemId===itemId) return {item:r, exp:e, sec};
  return null;
}
function expIndices(expId){
  for(let si=0;si<(C.sections||[]).length;si++){
    const es=C.sections[si].learningExperiences||[];
    for(let ei=0;ei<es.length;ei++) if(es[ei].experienceId===expId) return [si,ei];
  }
  return [0,0];
}
function scheduleReview(itemId, expId, score){
  const found=findRetrievalItem(itemId); if(!found) return;
  const sch=found.item.schedule||{};
  const seq=[sch.initialReviewDays??1, ...((sch.subsequentReviewDays&&sch.subsequentReviewDays.length)?sch.subsequentReviewDays:[3,7,14,30])];
  const dp=sch.decayParameters||{};
  const minI=dp.minimumIntervalDays??1, maxI=dp.maximumIntervalDays??365;
  const rec=state.reviewSchedule[itemId]||{expId, step:-1, intervalDays:0, reps:0};
  rec.expId=expId; rec.reps=(rec.reps||0)+1;
  let interval;
  if(score>=0.75){                       // solid recall → advance the ladder
    rec.step=Math.min((rec.step??-1)+1, seq.length);
    interval = rec.step<seq.length
      ? seq[rec.step]
      : Math.round(Math.max(rec.intervalDays, seq[seq.length-1])*(dp.strengthMultiplier||2));
  } else if(score>=0.4){                 // partial → shrink the interval
    interval=Math.max(minI, Math.round((rec.intervalDays||seq[0])/2));
  } else {                               // missed → restart the ladder
    rec.step=0; interval=seq[0];
  }
  interval=Math.max(minI, Math.min(maxI, interval));
  rec.intervalDays=interval;
  rec.due=Date.now()+interval*86400000;
  rec.lastScore=score; rec.lastReviewed=Date.now();
  state.reviewSchedule[itemId]=rec; saveState();
}
function dueReviews(){
  const now=Date.now();
  return Object.entries(state.reviewSchedule||{})
    .filter(([id,rec])=>rec.due<=now)
    .map(([id,rec])=>({id,rec,found:findRetrievalItem(id)}))
    .filter(x=>x.found);
}
function interleaveByCompetency(items){
  // round-robin across each item's primary competency so adjacent items differ
  const groups={};
  items.forEach(x=>{
    const k=(x.found.exp.linkedCompetencies||['_'])[0];
    (groups[k]=groups[k]||[]).push(x);
  });
  Object.values(groups).forEach(g=>g.sort(()=>Math.random()-0.5));
  const keys=Object.keys(groups); const out=[]; let added=true;
  while(added){ added=false; keys.forEach(k=>{ if(groups[k].length){ out.push(groups[k].shift()); added=true; } }); }
  return out;
}
function nextDueTs(){
  const all=Object.values(state.reviewSchedule||{});
  return all.length ? Math.min(...all.map(r=>r.due)) : null;
}
function fmtDue(ts){
  const d=ts-Date.now();
  if(d<=0) return 'due now';
  const days=Math.ceil(d/86400000);
  if(days===1) return 'tomorrow';
  if(days<30) return 'in '+days+'d';
  return new Date(ts).toLocaleDateString();
}
function reviewCardHTML(){
  const scheduled=Object.keys(state.reviewSchedule||{}).length;
  if(!scheduled) return '';
  const due=dueReviews().length;
  if(due) return `<div class="card" style="display:flex;align-items:center;gap:16px;border-left:3px solid var(--moss)">
    <span style="font-size:22px">&#8635;</span>
    <div style="flex:1"><b>${due} retrieval review${due>1?'s':''} due</b><div style="font-size:13px;color:var(--ink-soft)">Spaced recall is where the durable memory gets built.</div></div>
    <button class="btn btn-primary btn-sm" onclick="goScreen('review')">Start reviews →</button></div>`;
  const nd=nextDueTs();
  return `<div class="card" style="display:flex;align-items:center;gap:16px"><span style="font-size:20px;color:var(--good)">✓</span><div style="flex:1"><b>Reviews up to date</b><div style="font-size:13px;color:var(--ink-soft)">Next review ${nd?fmtDue(nd):'—'}.</div></div></div>`;
}
function renderReview(){
  const dueAll=interleaveByCompetency(dueReviews());
  const scheduled=Object.keys(state.reviewSchedule||{}).length;
  let body;
  if(!scheduled){
    body=`<div class="card"><b>Nothing scheduled yet.</b><p style="font-family:var(--read);color:var(--ink-soft);font-size:15px;margin-top:6px">Retrieval items enter this queue the first time you recall and grade them inside a lesson. The engine then schedules each next review from the item's spacing parameters.</p></div>`;
  } else if(!dueAll.length){
    body=`<div class="card" style="border-left:3px solid var(--good)"><b>All caught up ✓</b><p style="font-family:var(--read);color:var(--ink-soft);font-size:15px;margin-top:6px">Next review ${fmtDue(nextDueTs())}. The gap is the point — come back then.</p></div>`;
  } else {
    body=dueAll.map((x,i)=>renderReviewItem(x,i)).join('');
  }
  document.getElementById('screen-review').innerHTML=`
   <div class="stagger">
    <div class="eyebrow"><span class="rule"></span>Spaced retrieval</div>
    <h1 style="font-size:32px;margin-bottom:14px">Review queue</h1>
    <div class="review-head-card"><span style="font-size:22px">&#8635;</span><div>
      <h3>${dueAll.length?dueAll.length+' item'+(dueAll.length>1?'s':'')+' due':'Review schedule'}</h3>
      <p>Answer from memory before grading yourself — the source content stays hidden on purpose. Items are interleaved across competencies, and your self-grade sets the next interval.</p>
    </div></div>
    ${body}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('intro')">← Back</button>
    </div>
   </div>`;
  window.scrollTo({top:0});
}
function renderReviewItem(x,i){
  const r=x.found.item, exp=x.found.exp;
  const comps=(exp.linkedCompetencies||[]).map(cid=>{const c=findCompetency(cid);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');
  const [si,ei]=expIndices(exp.experienceId);
  return `<div class="retrieval review-item" id="review-${r.retrievalItemId}">
    <div class="retrieval-banner">
      <div class="retrieval-top">
        <span class="retrieval-label">&#8635; Review ${i+1} ${renderDiffDots(r.difficulty,true)}</span>
        <span class="retrieval-type">${r.retrievalType||''}</span>
      </div>
      <div class="retrieval-prompt">${r.prompt}</div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${comps}
        <button class="review-lesson-link" onclick="goScreen('exp',${si},${ei})">revisit lesson ↗</button></div>
    </div>
    <div class="retrieval-body">
      <textarea class="sa-input" placeholder="Retrieve from memory — write or rehearse it, then grade yourself."></textarea>
      ${selfGradeRow(`gradeReview('${r.retrievalItemId}',SCORE)`,'How did the recall go?')}
    </div>
  </div>`;
}
function gradeReview(itemId,score){
  const found=findRetrievalItem(itemId); if(!found) return;
  recordEvidence(found.exp.linkedCompetencies||[], score, 'retrieval');
  scheduleReview(itemId, found.exp.experienceId, score);
  toast((score>=0.75?'Scheduled — next review ':'No problem — it returns ')+fmtDue(state.reviewSchedule[itemId].due));
  renderReview(); buildSidebar();
}

// ════════════════════════════════════════════════════════════════════════
//  COURSE LOADER + VALIDATION
// ════════════════════════════════════════════════════════════════════════
function handleCourseFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ loadCourse(JSON.parse(r.result)); }
                 catch(e){ showReport('Could not load course',['Invalid JSON: '+e.message]); } };
  r.readAsText(file);
}
function validateCourse(c){
  const errors=[], warnings=[];
  if(!c || typeof c!=='object' || Array.isArray(c)){ errors.push('Root must be a JSON object.'); return {errors,warnings}; }
  if(!c.courseMetadata) errors.push('Missing courseMetadata.');
  if(!Array.isArray(c.sections)||!c.sections.length) errors.push('sections[] missing or empty.');
  if(errors.length) return {errors,warnings};
  if(!Array.isArray(c.competencies)||!c.competencies.length) warnings.push('competencies[] missing or empty — mastery tracking will be inert.');

  const compIds=new Set((c.competencies||[]).map(x=>x.competencyId));
  const assessIds=new Set((c.assessments||[]).map(x=>x.assessmentId));
  const misIds=new Set((c.competencies||[]).flatMap(x=>(x.commonMisconceptions||[]).map(m=>m.misconceptionId)));
  const exerciseIds=new Set();
  (c.sections||[]).forEach(s=>(s.learningExperiences||[]).forEach(e=>(e.transferExercises||[]).forEach(t=>exerciseIds.add(t.exerciseId))));
  const badComp=(ids,where)=>(ids||[]).forEach(id=>{ if(!compIds.has(id)) warnings.push(`${where}: unresolved competencyId "${id}"`); });

  (c.sections||[]).forEach(s=>{
    (s.learningObjectives||[]).forEach(o=>badComp(o.linkedCompetencies,`section ${s.sectionId} objective ${o.objectiveId}`));
    (s.furtherReading||[]).forEach(fr=>badComp(fr.linkedCompetencies,`furtherReading ${fr.resourceId}`));
    (s.learningExperiences||[]).forEach(e=>{
      badComp(e.linkedCompetencies,`experience ${e.experienceId}`);
      ((e.masteryVerification||{}).assessmentIds||[]).forEach(id=>{
        if(!assessIds.has(id)) warnings.push(`experience ${e.experienceId}: unresolved assessmentId "${id}"`);
      });
      (e.interactionSequence||[]).forEach(it=>{
        if(['multiple-choice','drag-drop'].includes(it.interactionType)){
          if(!Array.isArray(it.options)||!it.options.length)
            warnings.push(`interaction ${it.interactionId}: ${it.interactionType} has no options[] — will fall back to free text.`);
          else if(it.interactionType==='multiple-choice' && it.correctIndex==null)
            warnings.push(`interaction ${it.interactionId}: options[] without correctIndex — cannot be scored.`);
        }
      });
    });
  });
  (c.competencies||[]).forEach(cc=>(cc.desiredOutcomes||[]).forEach(o=>(o.verifiedBy||[]).forEach(id=>{
    if(!assessIds.has(id)&&!exerciseIds.has(id))
      warnings.push(`competency ${cc.competencyId} outcome ${o.outcomeId}: verifiedBy "${id}" matches no assessment or transfer exercise`);
  })));
  (c.assessments||[]).forEach(a=>{
    badComp(a.linkedCompetencies,`assessment ${a.assessmentId}`);
    (a.questions||[]).forEach(q=>{
      (q.errorPatterns||[]).forEach(ep=>{
        if(ep.linkedMisconceptionId && !misIds.has(ep.linkedMisconceptionId))
          warnings.push(`question ${q.questionId}: errorPattern "${ep.errorPatternId}" links unknown misconception "${ep.linkedMisconceptionId}"`);
      });
      if(q.questionType==='multiple-choice' && (!Array.isArray(q.options)||q.correctIndex==null))
        warnings.push(`question ${q.questionId}: multiple-choice without options/correctIndex — rendered as free text.`);
    });
  });
  ((c.learningModel||{}).interleavingGroups||[]).forEach(g=>badComp(g.competencyIds,`interleavingGroup ${g.groupId}`));
  ((c.priorKnowledgeCheck||{}).probeQuestions||[]).forEach(pq=>badComp(pq.linkedCompetencies,`probe ${pq.probeId}`));
  return {errors,warnings};
}
function loadCourse(obj){
  const {errors,warnings}=validateCourse(obj);
  if(errors.length){ showReport('Course failed to load',errors); return; }
  COURSE=obj; C=COURSE; LM=C.learningModel||{};
  STORE_KEY='course-progress:'+(C.courseMetadata?.courseId||'default');
  state=loadState();
  buildSidebar(); renderGlossary(); goScreen('intro');
  if(warnings.length) showReport(`Loaded with ${warnings.length} warning${warnings.length>1?'s':''}`, warnings);
  else toast('Course loaded: '+(C.courseMetadata?.title||'untitled'));
}

// ════════════════════════════════════════════════════════════════════════
//  PROGRESS EXPORT / IMPORT
// ════════════════════════════════════════════════════════════════════════
function exportProgress(){
  const payload={ courseId:C.courseMetadata?.courseId||'default', exportedAt:new Date().toISOString(), state };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(C.courseMetadata?.courseId||'course')+'-progress.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('Progress exported');
}
function handleProgressFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const pr=JSON.parse(r.result);
    if(!pr || typeof pr.state!=='object') throw new Error('No "state" object found in file.');
    const curId=C.courseMetadata?.courseId||'default';
    if(pr.courseId && pr.courseId!==curId &&
       !confirm(`This progress file is for course "${pr.courseId}", but "${curId}" is loaded. Import anyway?`)) return;
    state=Object.assign(freshState(), pr.state); saveState();
    buildSidebar(); goScreen(state.screen||'intro', state.sectionIdx, state.expIdx);
    toast('Progress imported');
  }catch(e){ showReport('Could not import progress',[e.message]); } };
  r.readAsText(file);
}
function showReport(title,lines){
  document.getElementById('report-title').textContent=title;
  document.getElementById('report-body').innerHTML=
    (lines||[]).map(l=>`<div class="report-line">${String(l).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join('')
    || '<div class="report-line">No details.</div>';
  document.getElementById('report-overlay').classList.add('open');
}
function closeReport(){ document.getElementById('report-overlay').classList.remove('open'); }

// drag & drop a course .json anywhere onto the window
window.addEventListener('dragover',e=>{
  if([...(e.dataTransfer?.types||[])].includes('Files')) e.preventDefault();
});
window.addEventListener('drop',e=>{
  const f=e.dataTransfer?.files?.[0];
  if(f && /\.json$/i.test(f.name)){ e.preventDefault(); handleCourseFile(f); }
});

// keyboard: Esc closes overlays
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeOverlays(); });

// ── INIT ────────────────────────────────────────────────────────────────
buildSidebar();
goScreen(state.screen||'intro', state.sectionIdx, state.expIdx);

</script>
