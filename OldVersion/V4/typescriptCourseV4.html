  "glossary": [
    {
      "term": "Structural typing",
      "definition": "Compatibility determined by a type’s members (shape), not its declared name."
    },
    {
      "term": "Nominal typing",
      "definition": "Compatibility determined by explicit declared relationships (e.g. implements/extends); TypeScript is not nominal by default."
    },
    {
      "term": "Assignability",
      "definition": "Whether a value of one type may be placed where another type is expected; a source is assignable if it satisfies every requirement of the target."
    },
    {
      "term": "any",
      "definition": "An opt-out of type checking; assignable to and from everything and propagating, so it silently disables safety."
    },
    {
      "term": "unknown",
      "definition": "The top type that accepts any value but requires narrowing before use; the type-safe counterpart to any."
    },
    {
      "term": "never",
      "definition": "The bottom type with no possible values; signals unreachable or impossible states."
    },
    {
      "term": "Type assertion (as)",
      "definition": "A compile-time-only instruction to treat a value as a given type; it has no runtime effect, conversion, or check."
    },
    {
      "term": "Control-flow analysis",
      "definition": "The compiler’s tracking of how a variable’s type changes across branches."
    },
    {
      "term": "Narrowing",
      "definition": "Refining a broad type to a more specific one within a code path."
    },
    {
      "term": "Type guard",
      "definition": "An expression or function that narrows a type (typeof, instanceof, in, equality, or custom predicate functions)."
    },
    {
      "term": "Generic / type parameter",
      "definition": "A placeholder type filled per use that relates input and output types, preserving type information."
    },
    {
      "term": "Constraint (extends)",
      "definition": "A bound limiting what a type parameter may be, unlocking its members."
    },
    {
      "term": "Default type parameter",
      "definition": "A fallback type used when none is supplied or inferred."
    },
    {
      "term": "Inference site",
      "definition": "The place the compiler reads to deduce a type parameter."
    },
    {
      "term": "Indexed access type (T[K])",
      "definition": "The type of a property at key K."
    },
    {
      "term": "Mapped type",
      "definition": "A type that iterates over a type’s keys to build a new type."
    },
    {
      "term": "Key remapping (as)",
      "definition": "Renaming or filtering keys inside a mapped type (mapping to never drops a key)."
    },
    {
      "term": "Template literal type",
      "definition": "A string-literal type built by interpolating other types."
    },
    {
      "term": "Conditional type",
      "definition": "A type of the form T extends U ? X : Y that selects a branch by a type relationship."
    },
    {
      "term": "infer",
      "definition": "A keyword that captures (binds) a type from within a conditional type’s pattern."
    },
    {
      "term": "Distributive conditional type",
      "definition": "A conditional over a naked union type parameter that applies per member then unions the results."
    },
    {
      "term": "Make invalid states unrepresentable",
      "definition": "Designing types so that illegal combinations cannot be constructed."
    },
    {
      "term": "Discriminated (tagged) union",
      "definition": "A union whose members share a literal discriminant property used by the compiler to narrow to one variant."
    },
    {
      "term": "Discriminant",
      "definition": "The shared literal property (e.g. status) the compiler switches on to narrow a union."
    },
    {
      "term": "Exhaustiveness check",
      "definition": "Using a never assignment in the default branch to force handling of every union variant."
    },
    {
      "term": "Branded (nominal-emulation) type",
      "definition": "A primitive intersected with a unique phantom marker to make structurally-identical types distinct."
    },
    {
      "term": "Phantom property",
      "definition": "A type-only field with no runtime presence, used for branding."
    },
    {
      "term": "readonly / ReadonlyArray",
      "definition": "Type-level immutability that prevents mutation through a reference."
    },
    {
      "term": "as const",
      "definition": "An assertion giving a value its narrowest, deeply-readonly literal type."
    },
    {
      "term": "Boundary / seam",
      "definition": "Any point where external, untyped data enters the system."
    },
    {
      "term": "Runtime validation",
      "definition": "Executing real checks against data’s actual shape at run time."
    },
    {
      "term": "Type predicate (x is T)",
      "definition": "A type-guard return type whose truth narrows its argument to T."
    },
    {
      "term": "Schema",
      "definition": "A runtime description of valid data from which both validation and a static type are derived."
    },
    {
      "term": "Schema-derived type",
      "definition": "A static type extracted from a schema (e.g. z.infer)."
    },
    {
      "term": "parse vs safeParse",
      "definition": "Throw-on-failure validation (parse) versus return-a-result-union validation (safeParse)."
    },
    {
      "term": "Validated perimeter",
      "definition": "The pattern of validating all external input at the edges so the interior can trust its types."
    },
    {
      "term": "Single source of truth",
      "definition": "Each shape defined once and flowing outward, never re-declared."
    },
    {
      "term": "Component contract (props)",
      "definition": "The typed interface between a component and its callers."
    },
    {
      "term": "Co-location",
      "definition": "Keeping types beside the code that owns them rather than in a global dumping ground."
    },
    {
      "term": "Ambient declaration (.d.ts)",
      "definition": "Type-only descriptions for untyped JS modules or globals."
    },
    {
      "term": "Declaration merging / module augmentation",
      "definition": "Extending existing (often third-party) types in place rather than forking them."
    },
    {
      "term": "import type",
      "definition": "A type-only import the bundler can fully erase."
    },
    {
      "term": "satisfies",
      "definition": "An operator that validates a value against a type while preserving its narrow inferred type."
    },
    {
      "term": "tsconfig strictness flags",
      "definition": "Compiler options (strict, strictNullChecks, noImplicitAny, noUncheckedIndexedAccess, etc.) that move defect classes from runtime to compile time."
    },
    {
      "term": "Type governance",
      "definition": "The lightweight policy coordinating boundary, domain, state, and component types as one system."
    }
  ]
};

/* ════════════════════════════════════════════════════════════════════════
   COURSE PLAYER ENGINE
   ════════════════════════════════════════════════════════════════════════ */
const C = COURSE; // shorthand
const LM = C.learningModel || {};

// ── State ───────────────────────────────────────────────────────────────
const STORE_KEY = 'course-progress:' + (C.courseMetadata?.courseId || 'default');
let state = loadState();

function freshState(){
  return {
    screen:'intro', sectionIdx:0, expIdx:0, assessId:null,
    completedExperiences:[], completedAssessments:[], completedProbes:[],
    competencyProgress:{},            // competencyId -> 0..1
    answers:{},                        // expId -> {interactionId:{answer,confidence}}
    revealed:{},                       // expId -> [ids]
    assessAnswers:{},                  // assessId -> {questionId:answer}
    assessSubmitted:[],
    pkcDone:false, pkcAnswers:{}
  };
}
function loadState(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw){ const s=JSON.parse(raw); return Object.assign(freshState(), s); } }catch(e){}
  return freshState();
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }
function resetProgress(){
  if(!confirm('Reset all progress for this course? This cannot be undone.')) return;
  state = freshState(); saveState(); buildSidebar(); goScreen('intro'); toast('Progress reset');
}

// helpers for set-like arrays
const has = (arr,v)=> Array.isArray(arr) && arr.includes(v);
const add = (arr,v)=>{ if(!arr.includes(v)) arr.push(v); };

// ── Competency maths ──────────────────────────────────────────────────────
function compLevel(p){
  const levels = C.masterySystem?.masteryLevels || ['novice','developing','proficient','mastered'];
  if(p >= 0.85) return levels[3]||'mastered';
  if(p >= 0.55) return levels[2]||'proficient';
  if(p >= 0.25) return levels[1]||'developing';
  return levels[0]||'novice';
}
function levelClass(lvl){ return 'lvl-' + String(lvl).toLowerCase(); }
function compColor(p){
  if(p >= 0.85) return 'var(--good)';
  if(p >= 0.55) return 'var(--indigo)';
  if(p >= 0.25) return 'var(--gold)';
  return 'var(--ink-faint)';
}
function advanceCompetency(compIds, delta){
  (compIds||[]).forEach(id=>{
    state.competencyProgress[id] = Math.min(1, (state.competencyProgress[id]||0) + delta);
  });
  saveState(); updateSidebarProgress();
}
function expCompetencies(expId){
  for(const sec of C.sections||[]) for(const e of sec.learningExperiences||[])
    if(e.experienceId===expId) return e.linkedCompetencies||[];
  return [];
}

// ── Progress accounting ───────────────────────────────────────────────────
function allExperiences(){ return (C.sections||[]).flatMap(s=>s.learningExperiences||[]); }
function totalUnits(){ return allExperiences().length + (C.assessments||[]).length; }
function doneUnits(){ return state.completedExperiences.length + state.completedAssessments.length; }
function overallPct(){ const t=totalUnits(); return t? Math.round(doneUnits()/t*100):0; }

// ════════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════════════════════
function goScreen(screen, sIdx, eIdx){
  state.screen = screen;
  if(sIdx!=null) state.sectionIdx = sIdx;
  if(eIdx!=null) state.expIdx = eIdx;
  saveState();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('screen-'+screen);

  if(screen==='intro') renderIntro();
  else if(screen==='pkc') renderPKC();
  else if(screen==='section') renderSection();
  else if(screen==='exp') renderExp();
  else if(screen==='assess') renderAssess();
  else if(screen==='complete') renderComplete();

  el.classList.add('active');
  document.getElementById('main').scrollTop = 0;
  window.scrollTo({top:0, behavior:'smooth'});
  buildSidebar();
  closeSidebarMobile();
  updateTopbar();
}
function updateTopbar(){
  let t = C.courseMetadata?.title || 'Course';
  if(state.screen==='exp'){ const e=curExp(); if(e) t=e.title; }
  else if(state.screen==='section'){ const s=C.sections[state.sectionIdx]; if(s) t=s.title; }
  else if(state.screen==='assess'){ const a=findAssess(state.assessId); if(a) t=a.title; }
  document.getElementById('tb-title').textContent = t;
}
function curSection(){ return C.sections?.[state.sectionIdx]; }
function curExp(){ return curSection()?.learningExperiences?.[state.expIdx]; }
function findAssess(id){ return (C.assessments||[]).find(a=>a.assessmentId===id); }
function findCompetency(id){ return (C.competencies||[]).find(c=>c.competencyId===id); }

// ════════════════════════════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════════════════════════════
function buildSidebar(){
  const meta = C.courseMetadata||{};
  document.getElementById('sidebar-title').textContent = meta.title||'Course';
  document.getElementById('sidebar-eyebrow').textContent = (meta.difficultyLevel||'course');
  document.getElementById('brand-seal').textContent = (meta.title||'C').trim()[0]||'C';

  // competency rail
  const rail = document.getElementById('competency-bars');
  rail.innerHTML = (C.competencies||[]).map(c=>{
    const p = state.competencyProgress[c.competencyId]||0;
    const lvl = compLevel(p);
    return `<div class="comp-badge">
      <div class="comp-badge-top">
        <span class="comp-badge-title">${c.title}</span>
        <span class="comp-badge-level ${levelClass(lvl)}">${lvl}</span>
      </div>
      <div class="comp-bar-wrap"><div class="comp-bar" style="width:${Math.round(p*100)}%;background:${compColor(p)}"></div></div>
    </div>`;
  }).join('');

  // section nav
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  if(C.priorKnowledgeCheck?.enabled){
    const done = state.pkcDone;
    const active = state.screen==='pkc';
    html += `<div class="nav-section-label">Start</div>
      <div class="section-nav-item ${active?'open':''}">
        <div class="section-nav-header ${active?'active':''}" onclick="goScreen('pkc')">
          <span class="section-check ${done?'done':''} ${active?'active':''}">${done?'✓':''}</span>
          <span class="section-nav-title">Prior Knowledge Check</span>
        </div>
      </div>`;
  }
  html += `<div class="nav-section-label">Sections</div>`;
  (C.sections||[]).forEach((sec,si)=>{
    const exps = sec.learningExperiences||[];
    const allDone = exps.every(e=>has(state.completedExperiences,e.experienceId)) && exps.length>0;
    const isCur = (state.screen==='exp'||state.screen==='section') && state.sectionIdx===si;
    const open = isCur;
    html += `<div class="section-nav-item ${open?'open':''}" id="nav-sec-${si}">
      <div class="section-nav-header ${isCur?'active':''}" onclick="toggleNavSection(${si})">
        <span class="section-check ${allDone?'done':''} ${isCur?'active':''}">${allDone?'✓':''}</span>
        <span class="section-nav-title">${si+1}. ${sec.title}</span>
        <span class="section-nav-arrow">▶</span>
      </div>
      <div class="section-nav-children">`;
    exps.forEach((e,ei)=>{
      const d = has(state.completedExperiences,e.experienceId);
      const a = state.screen==='exp'&&state.sectionIdx===si&&state.expIdx===ei;
      html += `<div class="sub-nav-item ${d?'done':''} ${a?'active':''}" onclick="event.stopPropagation();goScreen('exp',${si},${ei})">
        <span class="sub-dot"></span>
        <span class="sub-nav-label">${e.title}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  // assessments
  if((C.assessments||[]).length){
    html += `<div class="nav-section-label">Assessments</div>`;
    (C.assessments||[]).forEach(a=>{
      const d = has(state.completedAssessments,a.assessmentId);
      const act = state.screen==='assess'&&state.assessId===a.assessmentId;
      html += `<div class="section-nav-item">
        <div class="sub-nav-item assess ${d?'done':''} ${act?'active':''}" style="padding-left:24px" onclick="openAssessment('${a.assessmentId}')">
          <span class="sub-dot"></span>
          <span class="sub-nav-label">${a.title}</span>
        </div>
      </div>`;
    });
  }
  nav.innerHTML = html;
  updateSidebarProgress();
}
function updateSidebarProgress(){
  const pct = overallPct();
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${doneUnits()} of ${totalUnits()} complete · ${pct}%`;
  // refresh comp bars live
  (C.competencies||[]).forEach((c,i)=>{});
  const rail = document.getElementById('competency-bars');
  if(rail){
    rail.querySelectorAll('.comp-badge').forEach((node,i)=>{
      const c = C.competencies[i]; if(!c) return;
      const p = state.competencyProgress[c.competencyId]||0;
      const lvl = compLevel(p);
      const bar = node.querySelector('.comp-bar');
      bar.style.width = Math.round(p*100)+'%'; bar.style.background = compColor(p);
      const lvlEl = node.querySelector('.comp-badge-level');
      lvlEl.textContent = lvl; lvlEl.className = 'comp-badge-level '+levelClass(lvl);
    });
  }
}
function toggleNavSection(si){
  const item = document.getElementById('nav-sec-'+si);
  const wasOpen = item.classList.contains('open');
  // navigate to section intro if not already inside it
  if(state.screen==='exp' && state.sectionIdx===si){ item.classList.toggle('open'); return; }
  goScreen('section', si, 0);
}

// ════════════════════════════════════════════════════════════════════════
//  INTRO SCREEN
// ════════════════════════════════════════════════════════════════════════
function renderIntro(){
  const m = C.courseMetadata||{};
  const tagColors=['accent','moss','gold','indigo','plum','rust'];
  const tags = (m.tags||[]).map((t,i)=>`<span class="tag tag-${tagColors[i%tagColors.length]}"><span class="tdot"></span>${t}</span>`).join('');
  const seal = (m.version? 'v'+m.version : (m.difficultyLevel||''));

  const hrs = Math.floor((m.estimatedDurationMinutes||0)/60), mins=(m.estimatedDurationMinutes||0)%60;
  const dur = hrs? `${hrs}h${mins?' '+mins+'m':''}` : `${mins}m`;

  const lmFlags = [
    ['retrievalPracticeEnabled','Retrieval Practice'],
    ['confidenceCalibrationEnabled','Confidence Calibration'],
    ['adaptiveDifficultyEnabled','Adaptive Difficulty'],
    ['interleavingEnabled','Interleaving'],
    ['spacedRepetitionEnabled','Spaced Repetition']
  ];
  const lmPills = lmFlags.map(([k,label])=>`<span class="lm-pill ${LM[k]?'on':''}"><span class="dot"></span>${label}</span>`).join('');

  // outcomes from all competencies
  const outcomes = (C.competencies||[]).flatMap(c=>(c.desiredOutcomes||[]).map(o=>o.description));
  const outcomesHTML = outcomes.map(o=>`<li>${o}</li>`).join('');

// ════════════════════════════════════════════════════════════════════════
//  PRIOR KNOWLEDGE CHECK
// ════════════════════════════════════════════════════════════════════════
function renderPKC(){
  const pkc = C.priorKnowledgeCheck;
  if(!pkc?.enabled){ goScreen('section',0,0); return; }

  const probes = (pkc.probeQuestions||[]).map((p,i)=>{
    const saved = state.pkcAnswers[p.probeId];
    const comps = (p.linkedCompetencies||[]).map(cId=>{
      const c=findCompetency(cId); return c?`<span class="tag tag-line" style="margin-left:4px">${c.title}</span>`:'';
    }).join('');

    let inputHTML='';
    if(p.questionType==='multiple-choice' && p.options){
      inputHTML = `<div class="mc-options" id="pkc-mc-${p.probeId}">` + p.options.map((o,oi)=>`
        <div class="mc-option ${saved&&saved.choice===oi?'selected':''} ${saved?'locked':''} ${saved&&saved.choice===oi&&oi===p.correctIndex?'correct':''} ${saved&&saved.choice===oi&&oi!==p.correctIndex?'incorrect':''} ${saved&&oi===p.correctIndex&&saved.choice!==oi?'correct':''}"
             onclick="answerProbeMC('${p.probeId}',${oi},${p.correctIndex})">
          <span class="mc-key">${String.fromCharCode(65+oi)}</span><span>${o}</span>
        </div>`).join('') + `</div>`;
    } else {
      inputHTML = `<textarea class="sa-input" id="pkc-sa-${p.probeId}" placeholder="Type what you already know…" ${saved?'disabled':''}>${saved?saved.text||'':''}</textarea>
        ${!saved?`<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="answerProbeSA('${p.probeId}')">Submit</button></div>`:''}`;
    }

    const routing = (p.routingRules||[]).map(r=>`
      <div class="routing-row"><span class="routing-cond">${r.condition}</span><span>→ ${r.action}</span></div>`).join('');
    const crit = (p.scoringCriteria||[]).map(c=>`<li>${c}</li>`).join('');

    return `<div class="probe-card" id="probe-${p.probeId}">
      <div class="probe-num">Probe ${i+1} · ${p.questionType}</div>
      <div class="int-prompt">${p.prompt}</div>
      <div style="margin-bottom:12px">${comps}</div>
      ${inputHTML}
      <div class="probe-routing ${saved?'show':''}" id="routing-${p.probeId}">
        <div class="criteria-label">Scoring criteria</div>
        <ul class="criteria-list">${crit}</ul>
        <div class="criteria-label" style="margin-top:10px">Adaptive routing</div>
        ${routing}
      </div>
    </div>`;
  }).join('');

  const allAnswered = (pkc.probeQuestions||[]).every(p=>state.pkcAnswers[p.probeId]);

  document.getElementById('screen-pkc').innerHTML = `
   <div class="stagger">
    <div class="eyebrow"><span class="rule"></span>Calibration · ${pkc.placement}</div>
    <h1 style="font-size:32px;margin-bottom:14px">Prior Knowledge Check</h1>
    <div class="pkc-banner">
      <span class="pkc-icon">🧭</span>
      <div>
        <h3>This isn't graded</h3>
        <p>Your answers help the engine route you — skipping what you've mastered, reinforcing what you haven't. Answer honestly; the routing rules below each probe show how responses are used.</p>
      </div>
    </div>
    ${probes}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('intro')">← Back</button>
      <button class="btn btn-primary" onclick="finishPKC()">${allAnswered?'Continue to the course →':'Skip & start course →'}</button>
    </div>
   </div>`;
}
function answerProbeMC(probeId, choice, correct){
  state.pkcAnswers[probeId] = { choice, correct: choice===correct };
  // light competency credit for correct prior knowledge
  const pkc = C.priorKnowledgeCheck.probeQuestions.find(p=>p.probeId===probeId);
  if(choice===correct) advanceCompetency(pkc.linkedCompetencies, 0.12);
  saveState(); renderPKC();
}
function answerProbeSA(probeId){
  const ta = document.getElementById('pkc-sa-'+probeId);
  if(!ta || !ta.value.trim()){ toast('Write a short answer first'); return; }
  state.pkcAnswers[probeId] = { text: ta.value };
  const pkc = C.priorKnowledgeCheck.probeQuestions.find(p=>p.probeId===probeId);
  advanceCompetency(pkc.linkedCompetencies, 0.06);
  saveState(); renderPKC();
}
function finishPKC(){
  state.pkcDone = true; add(state.completedProbes,'all'); saveState();
  toast('Knowledge check recorded'); goScreen('section',0,0);
}

  const hookIcons={'real-world-stakes':'⚠','prediction-gap':'◎','curiosity-prompt':'?','relevance-anchor':'⚓'};
  const hooks=(sec.motivationHooks||[]).map(h=>`
    <div class="hook hook-${h.type}">
      <span class="hook-icon">${hookIcons[h.type]||'✦'}</span>
      <div><span class="hk-type">${h.type.replace(/-/g,' ')}</span>${h.prompt}</div>
    </div>`).join('');

  const objectives=(sec.learningObjectives||[]).map(o=>{
    const comps=(o.linkedCompetencies||[]).map(cId=>{
      const c=findCompetency(cId); return c?`<span class="tag tag-line">${c.title}</span>`:'';
    }).join('');
    return `<li>${o.description}<div class="obj-comps">${comps}</div></li>`;

      <div style="width:34px;height:34px;border-radius:50%;border:1.5px solid ${done?'var(--accent)':'var(--line)'};background:${done?'var(--accent)':'transparent'};color:${done?'#fff':'var(--ink-faint)'};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;flex-shrink:0">${done?'✓':ei+1}</div>
      <div style="flex:1">
        <div style="font-family:var(--serif);font-size:16px;color:var(--ink)">${e.title}</div>
        <div style="font-size:12px;color:var(--ink-faint);margin-top:2px">${expTypeLabel(e.experienceType)} · ${e.estimatedDurationMinutes||'—'} min</div>
      </div>
      <span style="color:var(--ink-faint)">→</span>
    </div>`;
  }).join('');

  const prevAction = si>0 ? `goScreen('section',${si-1},0)` : `goScreen('intro')`;

  document.getElementById('screen-section').innerHTML = `
   <div class="stagger">
    <div class="eyebrow"><span class="rule"></span>Section ${si+1} of ${C.sections.length}</div>
    <h1 style="font-size:34px;margin-bottom:12px">${sec.title}</h1>
    <p class="lede">${sec.description||''}</p>
    <div style="margin-top:24px">${hooks}</div>
    ${objectives?`<div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Learning objectives</div>
    <ul class="list-clean objectives-list">${objectives}</ul>`:''}
    <div class="eyebrow" style="margin-top:30px"><span class="rule"></span>Experiences in this section</div>
    ${expList}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
      <button class="btn btn-primary" onclick="goScreen('exp',${si},0)">Start section →</button>
    </div>
   </div>`;
}

function renderExp(){
  const sec = curSection(); const exp = curExp(); if(!exp) return;
  const si=state.sectionIdx, ei=state.expIdx;
  const isLast = ei === sec.learningExperiences.length-1;
  state.revealed[exp.experienceId] = state.revealed[exp.experienceId]||[];
  state.answers[exp.experienceId]  = state.answers[exp.experienceId]||{};

  const dp = exp.difficultyProfile||{};
  const diffDots = renderDiffDots(dp.overall||0);
  const cogTags = (exp.desiredCognitiveActions||[]).map(a=>`<span class="tag tag-${cogColor(a)}"><span class="tdot"></span>${a}</span>`).join('');
  const compTags = (exp.linkedCompetencies||[]).map(cId=>{const c=findCompetency(cId);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');

  const content = (exp.contentBlocks||[]).map(renderContentBlock).join('');
  const worked  = (exp.workedExamples||[]).map(renderWorked).join('');
  const interactions = (exp.interactionSequence||[]).map(int=>renderInteraction(int,exp)).join('');
  const retrieval = (exp.retrievalPractice||[]).map(r=>renderRetrieval(r,exp)).join('');
  const transfer  = (exp.transferExercises||[]).map(t=>renderTransfer(t,exp)).join('');
  const mastery   = renderMastery(exp);

  const nextLabel = isLast ? 'Complete section →' : 'Next experience →';
  const nextAction = isLast ? `completeExp('${exp.experienceId}');finishSection(${si})` : `completeExp('${exp.experienceId}');goScreen('exp',${si},${ei+1})`;
  const prevAction = ei>0 ? `goScreen('exp',${si},${ei-1})` : `goScreen('section',${si})`;

  document.getElementById('screen-exp').innerHTML = `
   <div class="exp-header">
     <div class="eyebrow">${sec.title} · ${expTypeLabel(exp.experienceType)}</div>
     <h2>${exp.title}</h2>
     <div class="exp-meta">
       <span class="exp-meta-item">◷ ${exp.estimatedDurationMinutes||'—'} min</span>
       <span class="exp-meta-item">Difficulty ${diffDots}</span>
       ${dp.conceptualComplexity?`<span class="exp-meta-item">Conceptual ${dp.conceptualComplexity}/5</span>`:''}
       ${dp.ambiguity?`<span class="exp-meta-item">Ambiguity ${dp.ambiguity}/5</span>`:''}
     </div>
     <div class="cog-actions">${cogTags}${compTags}</div>
   </div>
   ${content}
   ${worked}
   ${interactions}
   ${retrieval}
   ${transfer}
   ${mastery}
   <div class="nav-buttons">
     <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
     <button class="btn btn-primary" onclick="${nextAction}">${nextLabel}</button>
   </div>`;
  attachGlossaryLinks();
}

function renderContentBlock(b){
  if(b.type==='text') return `<div class="cb-text">${b.content||''}</div>`;
  if(b.type==='image'){
    return `<figure class="cb-media">${
      b.url ? `<img src="${b.url}" alt="${b.altText||''}">`
            : `<div class="cb-placeholder"><span class="ph-ico">🖼</span><span>${b.altText||'Image'}</span></div>`
    }${b.altText?`<figcaption class="cb-caption">${b.altText}</figcaption>`:''}</figure>`;
  }
  if(b.type==='video'){
    return `<figure class="cb-media">${
      b.url ? `<video controls src="${b.url}"></video>`
            : `<div class="cb-placeholder"><span class="ph-ico">▶</span><span>Video</span></div>`
    }${b.captionOrTranscript?`<details class="cb-transcript"><summary>Transcript</summary><p>${b.captionOrTranscript}</p></details>`:''}</figure>`;
  }
  if(b.type==='audio'){
    return `<figure class="cb-media">${
      b.url ? `<audio controls src="${b.url}"></audio>`
            : `<div class="cb-placeholder"><span class="ph-ico">♪</span><span>Audio</span></div>`
    }${b.captionOrTranscript?`<details class="cb-transcript"><summary>Transcript</summary><p>${b.captionOrTranscript}</p></details>`:''}</figure>`;
  }
  if(b.type==='interactive') return `<div class="cb-interactive">⚡ ${b.content||'Interactive element'}</div>`;
  return '';
}

function renderWorked(we){
  const steps=(we.steps||[]).map(s=>`<li>${s}</li>`).join('');
  return `<div class="worked">
    <div class="worked-label">✦ Worked Example</div>
    <div class="worked-problem">${we.problem||''}</div>
    <ol class="we-steps">${steps}</ol>
    ${we.conclusion?`<div class="we-conclusion">${we.conclusion}</div>`:''}
  </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────
const INT_META = {
  'prediction':   {cls:'int-prediction', icon:'◎', label:'Prediction'},
  'reflection':   {cls:'int-reflection', icon:'❀', label:'Reflection'},
  'compare-responses':{cls:'int-compare', icon:'⚖', label:'Compare Responses'},
  'multiple-choice':{cls:'int-mc', icon:'◉', label:'Multiple Choice'},
  'scenario-analysis':{cls:'int-scenario', icon:'⌖', label:'Scenario Analysis'},
  'drag-drop':    {cls:'int-dragdrop', icon:'↕', label:'Ranking'}
};
function renderInteraction(int, exp){
  const expId=exp.experienceId;
  const meta = INT_META[int.interactionType]||{cls:'',icon:'•',label:int.interactionType};
  const saved = state.answers[expId][int.interactionId];
  const revealed = has(state.revealed[expId], int.interactionId);
  const reqStar = int.required ? `<span class="req-star">● required</span>` : '';

  const head = `<div class="int-label">${meta.icon} ${meta.label} ${reqStar}</div>
                <div class="int-prompt">${int.prompt||''}</div>`;
  let bodyHTML='';

  if(int.interactionType==='multiple-choice' && int.options){
    bodyHTML = `<div class="mc-options">` + int.options.map((o,oi)=>{
      let cls='';
      if(saved){
        if(oi===int.correctIndex) cls='correct';
        else if(saved.choice===oi) cls='incorrect';
        cls+=' locked';
      } else if(saved && saved.choice===oi) cls='selected';
      return `<div class="mc-option ${cls}" ${!saved?`onclick="answerMC('${expId}','${int.interactionId}',${oi})"`:''}>
        <span class="mc-key">${String.fromCharCode(65+oi)}</span><span>${o}</span></div>`;
    }).join('') + `</div>`;
  }
  else if(int.interactionType==='drag-drop' && int.options){
    // ranking — render as ordered list, reveal best answer on attempt
    const order = (saved && saved.order) ? saved.order : int.options.map((_,i)=>i);
    bodyHTML = `<ul class="rank-list" id="rank-${int.interactionId}">` +
      order.map((origIdx,pos)=>`<li class="rank-item" draggable="${!saved}" data-idx="${origIdx}">
        <span class="rank-num">${pos+1}</span><span class="rank-grip">⋮⋮</span><span>${int.options[origIdx]}</span></li>`).join('') +
      `</ul>${!saved?`<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitRanking('${expId}','${int.interactionId}',${int.correctIndex})">Lock in order</button></div>`:''}`;
  }
  else if(int.interactionType==='reflection' && int.responseFormat==='likert' && int.options){
    bodyHTML = `<div class="likert">` + int.options.map((o,oi)=>`
      <div class="likert-opt ${saved&&saved.choice===oi?'selected':''}" onclick="answerLikert('${expId}','${int.interactionId}',${oi})">${o}</div>`).join('') + `</div>`;
  }
  else {
    // short-answer style (prediction, reflection, scenario, compare)
    bodyHTML = `<textarea class="sa-input" id="sa-${int.interactionId}" placeholder="Write your response…" ${revealed?'disabled':''}>${saved?saved.answer||'':''}</textarea>`;
  }

  // confidence prompt
  let confHTML='';
  if(int.confidencePrompt?.enabled && LM.confidenceCalibrationEnabled && !revealed){
    const cp=int.confidencePrompt, mid=Math.round(((cp.scaleMin||1)+(cp.scaleMax||5))/2);
    const cur = saved?.confidence || mid;
    confHTML = `<div class="confidence">
      <div class="confidence-label">◷ ${cp.prompt||'How confident are you?'}</div>
      <div class="confidence-row">
        <input type="range" class="confidence-slider" min="${cp.scaleMin||1}" max="${cp.scaleMax||5}" value="${cur}"
               id="conf-${int.interactionId}" oninput="document.getElementById('confval-${int.interactionId}').textContent=this.value+' / ${cp.scaleMax||5}'">
        <span class="confidence-value" id="confval-${int.interactionId}">${cur} / ${cp.scaleMax||5}</span>
      </div>
      <div class="confidence-anchors"><span>Not sure</span><span>Certain</span></div>
    </div>`;
  }

  // hints (hint-only or socratic feedback)
  const fb = int.feedback||{};
  let hintHTML='';
  if((fb.hints||[]).length){
    hintHTML = `<div id="hints-${int.interactionId}">
      <div class="submit-row"><button class="hint-btn" onclick="revealHint('${int.interactionId}')">💡 Need a hint?</button></div>
      <div class="hint-box" id="hintbox-${int.interactionId}"></div>
    </div>`;
  }

  // submit / feedback
  let submitHTML='', feedbackHTML='';
  const needsSubmit = ['prediction','reflection','scenario-analysis','compare-responses'].includes(int.interactionType)
                      && int.responseFormat!=='likert';
  if(needsSubmit && !revealed){
    const label = int.interactionType==='reflection' ? 'Save reflection' : 'Submit & reveal';
    submitHTML = `<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitText('${expId}','${int.interactionId}')">${label}</button></div>`;
  } else if(needsSubmit && revealed){
    submitHTML = `<div class="submit-row"><span class="saved-flag">✓ Response recorded</span></div>`;
  }

  // feedback shown if revealed (or MC/ranking answered)
  const showFb = revealed || (saved && ['multiple-choice','drag-drop'].includes(int.interactionType));
  if(showFb) feedbackHTML = renderFeedback(fb, saved, int);

  return `<div class="interaction ${meta.cls}" id="int-${int.interactionId}">
    ${head}${bodyHTML}${confHTML}${hintHTML}${submitHTML}${feedbackHTML}
  </div>`;
}

function renderFeedback(fb, saved, int){
  let cls='fb-elaborative', head='Why', body='';
  if(int && int.interactionType==='multiple-choice' && saved){
    const right = saved.choice===int.correctIndex;
    cls = right?'fb-correct':'fb-corrective';
    head = right?'Correct':'Not quite';
  }
  if(fb.type==='elaborative' && fb.elaborativeFeedback){ cls=cls==='fb-correct'?'fb-correct':'fb-elaborative'; head=head==='Why'?'Explanation':head; body=fb.elaborativeFeedback; }
  else if(fb.type==='corrective' && fb.correctiveFeedback){ cls=cls==='fb-correct'?'fb-correct':'fb-corrective'; head=head==='Why'?'Correction':head; body=fb.correctiveFeedback; }
  else if(fb.type==='socratic'){ cls='fb-socratic'; head='Consider'; body=(fb.hints||[]).join(' '); }
  else { body = fb.elaborativeFeedback || fb.correctiveFeedback || (fb.hints||[]).join(' '); }
  if(!body) return '';
  return `<div class="feedback show ${cls}"><div class="fb-head">✦ ${head}</div>${body}</div>`;
}

// ── Interaction handlers ──────────────────────────────────────────────────
function ansStore(expId,id,val){ state.answers[expId]=state.answers[expId]||{}; state.answers[expId][id]=val; saveState(); }
function reveal(expId,id){ state.revealed[expId]=state.revealed[expId]||[]; add(state.revealed[expId],id); saveState(); }

function submitText(expId,intId){
  const ta=document.getElementById('sa-'+intId);
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  if(int.required && (!ta||!ta.value.trim())){ toast('This response is required'); return; }
  const confEl=document.getElementById('conf-'+intId);
  ansStore(expId,intId,{answer:ta?ta.value:'',confidence:confEl?+confEl.value:null});
  reveal(expId,intId);
  advanceCompetency(exp.linkedCompetencies, int.interactionType==='reflection'?0.05:0.1);
  renderExp(); toast(int.interactionType==='reflection'?'Reflection saved':'Response recorded');
}
function answerMC(expId,intId,choice){
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  ansStore(expId,intId,{choice}); reveal(expId,intId);
  advanceCompetency(exp.linkedCompetencies, choice===int.correctIndex?0.14:0.05);
  renderExp();
}
function answerLikert(expId,intId,choice){
  const exp=curExp(); const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  ansStore(expId,intId,{choice}); reveal(expId,intId);
  advanceCompetency(exp.linkedCompetencies,0.05);
  renderExp();
}
function submitRanking(expId,intId,correctIdx){
  const list=document.getElementById('rank-'+intId);
  const order=[...list.querySelectorAll('.rank-item')].map(li=>+li.dataset.idx);
  const exp=curExp();
  ansStore(expId,intId,{order}); reveal(expId,intId);
  const topCorrect = order[0]===correctIdx;
  advanceCompetency(exp.linkedCompetencies, topCorrect?0.14:0.06);
  renderExp(); toast(topCorrect?'Top choice correct':'Order locked — see explanation');
}
let _hintIdx={};
function revealHint(intId){
  const exp=curExp();
  const int=exp.interactionSequence.find(i=>i.interactionId===intId);
  const hints=int.feedback?.hints||[];
  _hintIdx[intId]=(_hintIdx[intId]||0);
  if(_hintIdx[intId]>=hints.length){ toast('No more hints'); return; }
  const box=document.getElementById('hintbox-'+intId);
  box.classList.add('show');
  box.innerHTML = hints.slice(0,_hintIdx[intId]+1).map((h,i)=>`<div style="${i>0?'margin-top:8px':''}"><span class="hint-n">Hint ${i+1}</span>${h}</div>`).join('');
  _hintIdx[intId]++;
}

// ── Retrieval practice ─────────────────────────────────────────────────────
function renderRetrieval(r,exp){
  const expId=exp.experienceId;
  const saved = state.answers[expId][r.retrievalItemId];
  const revealed = has(state.revealed[expId], r.retrievalItemId);
  const sch=r.schedule||{};
  const chips = [sch.initialReviewDays, ...(sch.subsequentReviewDays||[])].filter(d=>d!=null)
    .map((d,i)=>`<span class="sched-chip">${i===0?'Day ':'+'}${d}${i===0?'':'d'}</span>`).join('');
  const dp=sch.decayParameters;
  const decay = dp ? `<div class="decay-meta">decay ${dp.decayRate} · ×${dp.strengthMultiplier} on recall · ${dp.minimumIntervalDays||1}–${dp.maximumIntervalDays||'∞'}d window</div>`:'';

  return `<div class="retrieval" id="rp-${r.retrievalItemId}">
    <div class="retrieval-banner">
      <div class="retrieval-top">
        <span class="retrieval-label">↻ Retrieval Practice ${renderDiffDots(r.difficulty,true)}</span>
        <span class="retrieval-type">${r.retrievalType}</span>
      </div>
      <div class="retrieval-prompt">${r.prompt}</div>
    </div>
    <div class="retrieval-body">
      <textarea class="sa-input" id="sa-${r.retrievalItemId}" placeholder="Retrieve from memory — resist looking back." ${revealed?'disabled':''}>${saved?saved.answer||'':''}</textarea>
      ${!revealed
        ? `<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitRetrieval('${expId}','${r.retrievalItemId}')">Submit recall</button></div>`
        : `<div class="schedule-strip"><span class="saved-flag">✓ Recalled</span> <span style="color:var(--ink-faint)">Next reviews:</span> ${chips}</div>${decay}`}
    </div>
  </div>`;
}
function submitRetrieval(expId,itemId){
  const ta=document.getElementById('sa-'+itemId);
  if(!ta||!ta.value.trim()){ toast('Write what you remember first'); return; }
  ansStore(expId,itemId,{answer:ta.value}); reveal(expId,itemId);
  advanceCompetency(expCompetencies(expId),0.1);
  renderExp(); toast('Recall logged · review scheduled');
}

// ── Transfer ───────────────────────────────────────────────────────────────
function renderTransfer(t,exp){
  const expId=exp.experienceId;
  const saved=state.answers[expId][t.exerciseId];
  const crit=(t.successCriteria||[]).map(c=>`<li>${c}</li>`).join('');
  return `<div class="transfer" id="tr-${t.exerciseId}">
    <div class="transfer-label">⇄ Transfer Exercise <span class="transfer-ctx">${t.context||''}</span></div>
    <div class="transfer-scenario">${t.scenario||''}</div>
    <div class="transfer-task">${t.task||''}</div>
    <div class="criteria-label">Success criteria</div>
    <ul class="criteria-list">${crit}</ul>
    <textarea class="sa-input" id="sa-${t.exerciseId}" placeholder="Apply your reasoning to this new context…" ${saved?'disabled':''}>${saved?saved.answer||'':''}</textarea>
    ${!saved
      ? `<div class="submit-row"><button class="btn btn-primary btn-sm" onclick="submitTransfer('${expId}','${t.exerciseId}')">Submit transfer</button></div>`
      : `<div class="submit-row"><span class="saved-flag">✓ Transfer recorded</span></div>`}
  </div>`;
}
function submitTransfer(expId,exId){
  const ta=document.getElementById('sa-'+exId);
  if(!ta||!ta.value.trim()){ toast('Write your applied answer first'); return; }
  ansStore(expId,exId,{answer:ta.value});
  state.revealed[expId]=state.revealed[expId]||[]; add(state.revealed[expId],exId); saveState();
  advanceCompetency(expCompetencies(expId),0.2);
  renderExp(); toast('Transfer recorded — strong signal of mastery');
}

// ── Mastery verification block ─────────────────────────────────────────────
function renderMastery(exp){
  const mv=exp.masteryVerification; if(!mv) return '';
  const rp=mv.requiredPerformance||{};
  const links=(mv.assessmentIds||[]).map(aId=>{
    const a=findAssess(aId); return a?`<button class="btn btn-secondary btn-sm" onclick="openAssessment('${aId}')">Open ${a.title} →</button>`:'';
  }).join('');
  return `<div class="mastery-box">
    <h4>✓ Mastery verification</h4>
    <div class="mastery-thresholds">
      ${rp.minimumAccuracy!=null?`<div class="mthresh"><b>${Math.round(rp.minimumAccuracy*100)}%</b>min. accuracy</div>`:''}
      ${rp.minimumTransferScore!=null?`<div class="mthresh"><b>${Math.round(rp.minimumTransferScore*100)}%</b>min. transfer</div>`:''}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">${links}</div>
  </div>`;
}

// ── Completion of experiences/sections ──────────────────────────────────────
function completeExp(expId){ add(state.completedExperiences,expId); advanceCompetency(expCompetencies(expId),0.12); saveState(); }
function finishSection(si){
  if(si===C.sections.length-1) goScreen('complete');
  else goScreen('section',si+1,0);
}

// ════════════════════════════════════════════════════════════════════════
//  ASSESSMENT SCREEN
// ════════════════════════════════════════════════════════════════════════
function openAssessment(aId){ state.assessId=aId; saveState(); goScreen('assess'); }
function renderAssess(){
  const a=findAssess(state.assessId); if(!a){ goScreen('intro'); return; }
  const submitted=has(state.assessSubmitted,a.assessmentId);
  state.assessAnswers[a.assessmentId]=state.assessAnswers[a.assessmentId]||{};

  const comps=(a.linkedCompetencies||[]).map(cId=>{const c=findCompetency(cId);return c?`<span class="tag tag-line">${c.title}</span>`:'';}).join('');

  const questions=(a.questions||[]).map((q,qi)=>{
    const ans=state.assessAnswers[a.assessmentId][q.questionId]||'';
    const rubric=q.rubric||{};
    const rubricHTML = submitted ? `
      <div class="rubric">
        <div class="rubric-title">Self-assess against the rubric</div>
        <div class="rubric-row rubric-excellent"><span class="rubric-level">Excellent</span><span class="rubric-desc">${rubric.excellent||''}</span></div>
        <div class="rubric-row rubric-adequate"><span class="rubric-level">Adequate</span><span class="rubric-desc">${rubric.adequate||''}</span></div>
        <div class="rubric-row rubric-weak"><span class="rubric-level">Weak</span><span class="rubric-desc">${rubric.weak||''}</span></div>
      </div>
      ${(q.successCriteria||[]).length?`<div style="margin-top:14px"><div class="criteria-label">Success criteria</div><ul class="criteria-list">${q.successCriteria.map(c=>`<li>${c}</li>`).join('')}</ul></div>`:''}
      ${renderErrorPatterns(q)}
    `:'';
    return `<div class="q-card">
      <div class="q-meta">Q${qi+1} · ${q.questionType} · Difficulty ${renderDiffDots(q.difficulty,true)}</div>
      <div class="q-prompt">${q.prompt}</div>
      <textarea class="sa-input" id="aq-${a.assessmentId}-${q.questionId}" placeholder="Write your response…" ${submitted?'disabled':''}>${ans}</textarea>
      ${rubricHTML}
    </div>`;
  }).join('');

  document.getElementById('screen-assess').innerHTML=`
   <div class="stagger">
    <div class="assess-head">
      <div class="eyebrow"><span class="rule"></span>${a.assessmentType}</div>
      <h2>${a.title}</h2>
      <div style="margin:10px 0 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--ink-faint)">Measures:</span> ${comps}</div>
      ${a.adaptiveDifficulty?`<div style="font-size:13px;color:var(--indigo);display:flex;align-items:center;gap:6px"><span>⚡</span>Adaptive difficulty enabled — questions adjust to your responses.</div>`:''}
    </div>
    ${questions}
    ${!submitted?`<button class="btn btn-primary" onclick="submitAssessment('${a.assessmentId}')">Submit assessment</button>`
      :`<div class="card" style="background:var(--good-wash);border-color:#bcd6c2">
          <h3 style="font-size:19px;margin-bottom:6px;color:var(--good)">Submitted ✓</h3>
          <p style="font-family:var(--read);font-size:15px;color:var(--ink-soft)">Use each rubric to self-evaluate. Error patterns below show how specific mistakes map to misconceptions and what remediation the engine would trigger. Your competency progress has been updated.</p>
        </div>`}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('exp',${state.sectionIdx},${state.expIdx})">← Back to experience</button>
      ${submitted?`<button class="btn btn-primary" onclick="goScreen('complete')">Finish →</button>`:''}
    </div>
   </div>`;
}
function renderErrorPatterns(q){
  const eps=q.errorPatterns||[]; if(!eps.length) return '';
  const rows=eps.map(ep=>{
    const mis=findMisconception(ep.linkedMisconceptionId);
    return `<div class="ep-item">
      <b>${ep.description}</b>
      ${mis?`<span style="display:block;margin-top:3px;color:var(--ink-faint)">Misconception: "${mis.misconception}"</span>`:''}
      <span class="ep-remedy">${ep.remediationAction}</span>
    </div>`;
  }).join('');
  return `<div class="error-patterns"><div class="ep-title">⚠ Watch for these error patterns</div>${rows}</div>`;
}
function findMisconception(id){
  for(const c of C.competencies||[]) for(const m of c.commonMisconceptions||[])
    if(m.misconceptionId===id) return m;
  return null;
}
function submitAssessment(aId){
  const a=findAssess(aId);
  let answered=0;
  (a.questions||[]).forEach(q=>{
    const ta=document.getElementById(`aq-${aId}-${q.questionId}`);
    if(ta){ state.assessAnswers[aId][q.questionId]=ta.value; if(ta.value.trim()) answered++; }
  });
  if(answered===0){ toast('Answer at least one question'); return; }
  add(state.assessSubmitted,aId); add(state.completedAssessments,aId);
  advanceCompetency(a.linkedCompetencies||[],0.25);
  saveState(); renderAssess(); toast('Assessment submitted');
}

// ════════════════════════════════════════════════════════════════════════
//  COMPLETE SCREEN
// ════════════════════════════════════════════════════════════════════════
function renderComplete(){
  const m=C.courseMetadata||{};
  const mastered=(C.competencies||[]).filter(c=>(state.competencyProgress[c.competencyId]||0)>=0.85).length;
  document.getElementById('screen-complete').innerHTML=`
    <div class="complete-seal">${(m.version?'v'+m.version:'✦')}</div>
    <h1>Course complete</h1>
    <p class="c-sub">You've worked through every section, experience, and assessment in <em>${m.title||'this course'}</em>. The reasoning reflexes you practiced here are built to transfer.</p>
    <div class="complete-stats">
      <div class="cstat"><div class="cs-val">${state.completedExperiences.length}</div><div class="cs-key">Experiences</div></div>
      <div class="cstat"><div class="cs-val">${state.completedAssessments.length}</div><div class="cs-key">Assessments</div></div>
      <div class="cstat"><div class="cs-val">${mastered}/${(C.competencies||[]).length}</div><div class="cs-key">Competencies mastered</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="goScreen('intro')">Back to start</button>
      <button class="btn btn-primary" onclick="goScreen('section',0,0)">Review sections →</button>
    </div>`;
}

// ════════════════════════════════════════════════════════════════════════
//  GLOSSARY
// ════════════════════════════════════════════════════════════════════════
function renderGlossary(filter=''){
  const body=document.getElementById('glossary-body');
  const terms=(C.glossary||[]).filter(g=>!filter || g.term.toLowerCase().includes(filter.toLowerCase()) || g.definition.toLowerCase().includes(filter.toLowerCase()));
  if(!terms.length){ body.innerHTML=`<p style="padding:16px 24px;font-size:14px;color:var(--ink-faint)">No matching terms.</p>`; return; }
  body.innerHTML=terms.map(g=>`<dl class="glossary-term"><dt>${g.term}</dt><dd>${g.definition}</dd></dl>`).join('');
}
function filterGlossary(v){ renderGlossary(v); }
function toggleGlossary(){
  const d=document.getElementById('glossary-drawer'), s=document.getElementById('scrim');
  const open=d.classList.toggle('open'); s.classList.toggle('open',open);
  if(open) renderGlossary();
}
function attachGlossaryLinks(){
  document.querySelectorAll('.glossary-link').forEach(el=>{
    const term=el.dataset.term;
    const g=(C.glossary||[]).find(x=>x.term.toLowerCase()===String(term).toLowerCase());
    if(g){ el.title=g.definition; el.onclick=()=>{ if(!document.getElementById('glossary-drawer').classList.contains('open')) toggleGlossary(); filterGlossary(g.term); document.getElementById('glossary-search').value=g.term; }; }
  });
}

// ════════════════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════════════════
function cogColor(a){ return {prediction:'indigo',analysis:'plum',reflection:'gold',retrieval:'moss',comparison:'rust',synthesis:'accent'}[a]||'line'; }
function expTypeLabel(t){ return {'guided-analysis':'Guided Analysis','worked-example':'Worked Example','case-study':'Case Study','simulation':'Simulation','discussion':'Discussion'}[t]||t; }
function renderDiffDots(n,inline){
  n=n||0;
  const dots=Array.from({length:5},(_,i)=>`<span class="diff-dot ${i<n?'on':''}"></span>`).join('');
  return `<span class="diff-dots" ${inline?'style="vertical-align:middle"':''}>${dots}</span>`;
}
function toast(msg){
  const t=document.getElementById('toast'); t.innerHTML='✦ '+msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('scrim').classList.toggle('open'); }
function closeSidebarMobile(){ if(window.innerWidth<=920){ document.getElementById('sidebar').classList.remove('open'); } }
function closeOverlays(){
  document.getElementById('glossary-drawer').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
}

// drag-drop ranking wiring (event delegation)
document.addEventListener('dragstart',e=>{ const li=e.target.closest('.rank-item'); if(li&&li.draggable){ li.classList.add('dragging'); }});
document.addEventListener('dragend',e=>{ const li=e.target.closest('.rank-item'); if(li){ li.classList.remove('dragging'); renumberRanks(li.parentElement); }});
document.addEventListener('dragover',e=>{
  const list=e.target.closest('.rank-list'); if(!list) return; e.preventDefault();
  const dragging=list.querySelector('.dragging'); if(!dragging) return;
  const after=[...list.querySelectorAll('.rank-item:not(.dragging)')].find(li=>{
    const r=li.getBoundingClientRect(); return e.clientY < r.top + r.height/2;
  });
  if(after) list.insertBefore(dragging,after); else list.appendChild(dragging);
});
function renumberRanks(list){ if(!list) return; [...list.querySelectorAll('.rank-item')].forEach((li,i)=>{ const n=li.querySelector('.rank-num'); if(n)n.textContent=i+1; }); }

// keyboard: Esc closes overlays
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeOverlays(); });

// ── INIT ────────────────────────────────────────────────────────────────
buildSidebar();
goScreen(state.screen||'intro', state.sectionIdx, state.expIdx);

</script>
</body>
</html>
