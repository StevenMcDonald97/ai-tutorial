<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f4f1ea;
  --paper-deep:#ece7dc;
  --surface:#fbf9f4;
  --surface-raised:#ffffff;
  --ink:#23211c;
  --ink-soft:#5f5a4f;
  --ink-faint:#928c7d;
  --line:#ddd6c7;
  --line-soft:#e8e2d5;
  --accent:#7a2e1d;          /* oxblood */
  --accent-deep:#5e2114;
  --accent-wash:#f3e4df;
  --accent-line:#e3c4ba;
  --moss:#4a5d3a;
  --moss-wash:#e8ecdf;
  --gold:#9a6a18;
  --gold-wash:#f6ecd6;
  --indigo:#33457a;
  --indigo-wash:#e3e7f2;
  --plum:#5a3566;
  --plum-wash:#efe6f2;
  --rust:#9c4a26;
  --rust-wash:#f6e6dc;
  --good:#3f6d4e;
  --good-wash:#e6efe7;
  --warn:#9c3527;
  --warn-wash:#f7e4e0;
  --radius:4px;
  --radius-lg:8px;
  --shadow-sm:0 1px 2px rgba(47,40,28,.06);
  --shadow:0 6px 28px -12px rgba(47,40,28,.28);
  --shadow-lg:0 20px 60px -24px rgba(47,40,28,.4);
  --serif:'Fraunces',Georgia,serif;
  --read:'Newsreader',Georgia,serif;
  --sans:'Spline Sans',-apple-system,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --sidebar-w:312px;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  min-height:100vh;font-size:15px;line-height:1.6;
  background-image:
    radial-gradient(circle at 12% 8%, rgba(122,46,29,.04), transparent 38%),
    radial-gradient(circle at 88% 92%, rgba(74,93,58,.045), transparent 42%);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--serif);font-weight:500;line-height:1.12;letter-spacing:-.01em}
::selection{background:var(--accent-wash);color:var(--accent-deep)}

/* ─── Layout ─────────────────────────────────────────── */
#app{display:flex;min-height:100vh}

/* ─── Sidebar ────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--surface),var(--paper));
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;
}
#sidebar-header{padding:26px 24px 18px;border-bottom:1px solid var(--line)}
.brand-mark{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.brand-seal{
  width:30px;height:30px;border:1.5px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--accent);
  font-family:var(--serif);font-size:15px;font-style:italic;flex-shrink:0;
}
.brand-name{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--ink-soft);letter-spacing:.02em}
#sidebar-header .course-eyebrow{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
#sidebar-header h2{font-size:19px;color:var(--ink);line-height:1.22}
#progress-meta{margin-top:16px}
#progress-bar-wrap{background:var(--line);border-radius:99px;height:5px;overflow:hidden}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--rust));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1);width:0}
#progress-label{margin-top:7px;font-size:11px;color:var(--ink-faint);letter-spacing:.02em}

/* Competency rail */
#competency-rail{padding:18px 24px;border-bottom:1px solid var(--line)}
.rail-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.rail-label .ghost-btn{font-family:var(--sans);font-size:10px;letter-spacing:.08em;color:var(--accent);background:none;border:none;cursor:pointer;text-transform:uppercase}
.comp-badge{margin-bottom:13px}
.comp-badge:last-child{margin-bottom:0}
.comp-badge-top{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.comp-badge-title{font-size:12px;font-weight:500;color:var(--ink);flex:1;line-height:1.3}
.comp-badge-level{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:99px;white-space:nowrap}
.lvl-novice{background:var(--line);color:var(--ink-soft)}
.lvl-developing{background:var(--gold-wash);color:var(--gold)}
.lvl-proficient{background:var(--indigo-wash);color:var(--indigo)}
.lvl-mastered{background:var(--good-wash);color:var(--good)}
.comp-bar-wrap{background:var(--line);border-radius:99px;height:4px;overflow:hidden}
.comp-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* Section nav */
#sidebar-nav{padding:8px 0 24px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:16px 24px 8px}
.section-nav-item{}
.section-nav-header{
  padding:10px 24px;cursor:pointer;display:flex;align-items:center;gap:11px;
  font-size:13.5px;font-weight:500;color:var(--ink-soft);user-select:none;
  transition:background .15s,color .15s;position:relative;
}
.section-nav-header:hover{background:var(--paper-deep);color:var(--ink)}
.section-nav-header.active{color:var(--ink)}
.section-nav-header.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.section-check{
  width:19px;height:19px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:10px;transition:all .25s;color:transparent;
}
.section-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.section-check.active{border-color:var(--accent)}
.section-nav-title{flex:1;line-height:1.3}
.section-nav-arrow{font-size:9px;transition:transform .25s;color:var(--ink-faint)}
.section-nav-item.open .section-nav-arrow{transform:rotate(90deg)}
.section-nav-children{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-nav-item.open .section-nav-children{max-height:900px}

.sub-nav-item{
  padding:7px 24px 7px 56px;cursor:pointer;font-size:12px;color:var(--ink-faint);
  display:flex;align-items:center;gap:9px;transition:background .15s,color .15s;
}
.sub-nav-item:hover{background:var(--paper-deep);color:var(--ink)}
.sub-nav-item.active{color:var(--accent);font-weight:600}
.sub-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:all .2s}
.sub-nav-item.done .sub-dot{background:var(--moss)}
.sub-nav-item.active .sub-dot{background:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
.sub-nav-item.assess .sub-dot{border-radius:1px;background:var(--gold)}
.sub-nav-label{flex:1;line-height:1.3}
.sub-kind{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}

/* ─── Main ───────────────────────────────────────────── */
#main-wrap{flex:1;min-width:0;position:relative}
#topbar{
  position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);
  background:rgba(244,241,234,.82);border-bottom:1px solid var(--line);
  display:none;align-items:center;gap:12px;padding:12px 18px;
}
#menu-toggle{background:none;border:1px solid var(--line);border-radius:var(--radius);padding:7px 10px;cursor:pointer;color:var(--ink);font-size:15px;line-height:1}
#topbar .tb-title{font-family:var(--serif);font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main{max-width:760px;margin:0 auto;padding:54px 40px 96px}

/* ─── Screens ────────────────────────────────────────── */
.screen{display:none}
.screen.active{display:block;animation:rise .4s cubic-bezier(.22,1,.36,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.stagger>*{opacity:0;animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.20s}
.stagger>*:nth-child(5){animation-delay:.26s}
.stagger>*:nth-child(6){animation-delay:.32s}
.stagger>*:nth-child(n+7){animation-delay:.38s}

/* ─── Shared components ──────────────────────────────── */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.eyebrow .rule{height:1px;flex:1;background:var(--accent-line);max-width:60px}
.lede{font-family:var(--read);font-size:18px;line-height:1.6;color:var(--ink-soft);margin-bottom:8px}

.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--sans)}
.tag .tdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.tag-accent{background:var(--accent-wash);color:var(--accent)}
.tag-moss{background:var(--moss-wash);color:var(--moss)}
.tag-gold{background:var(--gold-wash);color:var(--gold)}
.tag-indigo{background:var(--indigo-wash);color:var(--indigo)}
.tag-plum{background:var(--plum-wash);color:var(--plum)}
.tag-rust{background:var(--rust-wash);color:var(--rust)}
.tag-line{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:99px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;border:1px solid transparent;transition:all .2s;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--accent-deep);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-primary:active{transform:none}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--surface-raised);color:var(--ink);border-color:var(--line)}
.btn-secondary:hover{background:var(--paper-deep);border-color:var(--ink-faint)}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-ghost{background:none;color:var(--accent);font-weight:600;font-family:var(--sans);cursor:pointer;border:none;padding:5px 0;font-size:13px;border-bottom:1px solid var(--accent-line)}
.btn-ghost:hover{border-color:var(--accent)}

.nav-buttons{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:44px;padding-top:26px;border-top:1px solid var(--line)}

.card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;box-shadow:var(--shadow-sm);margin-bottom:18px}

/* ─── Intro / cover ──────────────────────────────────── */
.cover{
  position:relative;border:1px solid var(--line);border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:34px;background:var(--surface-raised);box-shadow:var(--shadow);
}
.cover-art{
  height:184px;position:relative;overflow:hidden;
  background:
    repeating-linear-gradient(135deg,transparent,transparent 13px,rgba(122,46,29,.05) 13px,rgba(122,46,29,.05) 14px),
    linear-gradient(120deg,var(--accent-wash),var(--gold-wash) 55%,var(--moss-wash));
}
.cover-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-art .seal{
  position:absolute;right:22px;top:22px;width:62px;height:62px;border-radius:50%;
  border:1.5px solid var(--accent);color:var(--accent);background:rgba(251,249,244,.7);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  font-style:italic;font-size:13px;backdrop-filter:blur(3px);text-align:center;line-height:1.1;
}
.cover-body{padding:28px 30px 30px}
.cover-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.cover-body h1{font-size:38px;line-height:1.05;margin-bottom:14px;letter-spacing:-.02em}
.cover-desc{font-family:var(--read);font-size:18px;line-height:1.55;color:var(--ink-soft)}

.meta-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:30px;background:var(--surface-raised)}
.meta-cell{padding:16px 18px;border-right:1px solid var(--line-soft)}
.meta-cell:last-child{border-right:none}
.meta-cell .mc-val{font-family:var(--serif);font-size:21px;font-weight:500;color:var(--ink);line-height:1}
.meta-cell .mc-key{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}

.section-head{margin-bottom:24px}
.section-head h2{font-size:23px;margin-bottom:6px}

.lm-grid{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 6px}
.lm-pill{
  display:inline-flex;align-items:center;gap:6px;background:var(--surface-raised);
  border:1px solid var(--line);border-radius:99px;padding:6px 13px;font-size:12px;color:var(--ink-faint);
}
.lm-pill.on{background:var(--moss-wash);border-color:#c4d0b3;color:var(--moss);font-weight:500}
.lm-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.lm-pill.on .dot{opacity:1}

.list-clean{list-style:none}
.outcomes-list li{padding:10px 0 10px 28px;position:relative;font-family:var(--read);font-size:16px;color:var(--ink-soft);border-bottom:1px solid var(--line-soft)}
.outcomes-list li:last-child{border-bottom:none}
.outcomes-list li::before{content:'';position:absolute;left:2px;top:17px;width:9px;height:9px;border:1.5px solid var(--accent);border-radius:50%}

.prereq-list li{padding:8px 0 8px 26px;position:relative;font-size:14px;color:var(--ink-soft)}
.prereq-list li::before{content:'§';position:absolute;left:4px;color:var(--ink-faint);font-family:var(--serif)}

/* ─── Prior knowledge check ──────────────────────────── */
.pkc-banner{
  background:linear-gradient(120deg,var(--indigo-wash),var(--surface-raised));
  border:1px solid #c9d2e8;border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:26px;
  display:flex;gap:14px;align-items:flex-start;
}
.pkc-banner .pkc-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.pkc-banner h3{font-size:16px;margin-bottom:4px;color:var(--indigo)}
.pkc-banner p{font-size:13.5px;color:var(--ink-soft)}
.probe-card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.probe-num{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-bottom:8px;letter-spacing:.04em}
.probe-routing{margin-top:14px;display:none;border-top:1px dashed var(--line);padding-top:14px}
.probe-routing.show{display:block}
.routing-row{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--ink-soft);padding:4px 0}
.routing-cond{font-family:var(--mono);font-size:11px;background:var(--paper-deep);padding:2px 8px;border-radius:4px;color:var(--ink)}

/* ─── Motivation hooks ───────────────────────────────── */
.hook{
  border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:14px;font-family:var(--read);font-size:16px;line-height:1.5;
  border-left:3px solid;position:relative;
}
.hook-icon{font-size:20px;flex-shrink:0;margin-top:1px;font-family:var(--sans)}
.hook .hk-type{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.85}
.hook-real-world-stakes{background:var(--warn-wash);border-color:var(--warn);color:#6e261d}
.hook-prediction-gap{background:var(--gold-wash);border-color:var(--gold);color:#6b4910}
.hook-curiosity-prompt{background:var(--plum-wash);border-color:var(--plum);color:#492a52}
.hook-relevance-anchor{background:var(--moss-wash);border-color:var(--moss);color:#36462a}

/* objectives */
.objectives-list li{
  padding:12px 16px 12px 40px;position:relative;font-size:14.5px;background:var(--surface-raised);
  border:1px solid var(--line);border-radius:var(--radius);margin-bottom:7px;
}
.objectives-list li::before{content:'→';position:absolute;left:15px;top:12px;color:var(--accent);font-weight:600}
.obj-comps{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}

/* ─── Experience ─────────────────────────────────────── */
.exp-header{margin-bottom:26px}
.exp-header h2{font-size:30px;margin:10px 0;line-height:1.08}
.exp-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.exp-meta-item{font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
.diff-dots{display:inline-flex;gap:3px;align-items:center}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
.diff-dot.on{background:var(--accent)}
.cog-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}

/* content blocks */
.cb-text{font-family:var(--read);font-size:18px;line-height:1.68;color:var(--ink);margin-bottom:20px}
.cb-text:first-letter{}
.cb-media{margin-bottom:22px}
.cb-media img{width:100%;border-radius:var(--radius-lg);border:1px solid var(--line);display:block}
.cb-media video,.cb-media audio{width:100%;border-radius:var(--radius-lg)}
.cb-caption{font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:8px;font-style:italic;font-family:var(--read)}
.cb-placeholder{
  background:var(--paper-deep);border:1px dashed var(--line);border-radius:var(--radius-lg);
  min-height:150px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:13px;
}
.cb-placeholder .ph-ico{font-size:26px;opacity:.6}
.cb-transcript{margin-top:8px}
.cb-transcript summary{font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:500}
.cb-transcript p{font-size:13.5px;color:var(--ink-soft);margin-top:8px;font-family:var(--read);line-height:1.6}
.cb-interactive{background:var(--indigo-wash);border:1px solid #c9d2e8;border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;font-size:14px;color:var(--indigo)}

/* worked example */
.worked{background:var(--surface-raised);border:1px solid var(--line);border-left:3px solid var(--moss);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:20px 24px;margin-bottom:22px}
.worked-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--moss);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.worked-problem{font-family:var(--read);font-size:16.5px;font-weight:500;margin-bottom:14px;color:var(--ink)}
.we-steps{list-style:none;counter-reset:we}
.we-steps li{counter-increment:we;padding:8px 0 8px 36px;position:relative;font-size:14.5px;color:var(--ink-soft);line-height:1.55}
.we-steps li::before{content:counter(we);position:absolute;left:0;top:7px;width:24px;height:24px;background:var(--moss-wash);color:var(--moss);border-radius:50%;font-size:12px;font-weight:700;font-family:var(--sans);display:flex;align-items:center;justify-content:center}
.we-conclusion{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-family:var(--read);font-size:15px;color:var(--moss);font-style:italic}

/* ─── Interactions ───────────────────────────────────── */
.interaction{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.interaction::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.6}
.int-prediction::before{background:var(--indigo)}
.int-reflection::before{background:var(--plum)}
.int-compare::before{background:var(--gold)}
.int-mc::before{background:var(--accent)}
.int-scenario::before{background:var(--rust)}
.int-dragdrop::before{background:var(--moss)}
.int-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.int-prediction .int-label{color:var(--indigo)}
.int-reflection .int-label{color:var(--plum)}
.int-compare .int-label{color:var(--gold)}
.int-mc .int-label{color:var(--accent)}
.int-scenario .int-label{color:var(--rust)}
.int-dragdrop .int-label{color:var(--moss)}
.int-label .req-star{color:var(--accent);font-size:11px}
.int-prompt{font-family:var(--read);font-size:18px;font-weight:500;margin-bottom:18px;line-height:1.45;color:var(--ink)}

.sa-input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--radius);
  font-size:15px;font-family:var(--read);color:var(--ink);resize:vertical;min-height:100px;
  transition:border .18s,box-shadow .18s;background:var(--surface);line-height:1.55;
}
.sa-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-wash)}
.sa-input:disabled{opacity:.8;background:var(--paper-deep);cursor:default}

/* multiple choice */
.mc-options{display:flex;flex-direction:column;gap:9px;margin-bottom:4px}
.mc-option{
  display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--line);
  border-radius:var(--radius);cursor:pointer;font-size:14.5px;transition:all .15s;background:var(--surface);
}
.mc-option:hover{border-color:var(--ink-faint);background:var(--paper-deep)}
.mc-option .mc-key{
  width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
  font-family:var(--mono);color:var(--ink-soft);transition:all .15s;
}
.mc-option.selected{border-color:var(--accent);background:var(--accent-wash)}
.mc-option.selected .mc-key{background:var(--accent);border-color:var(--accent);color:#fff}
.mc-option.correct{border-color:var(--good);background:var(--good-wash)}
.mc-option.correct .mc-key{background:var(--good);border-color:var(--good);color:#fff}
.mc-option.incorrect{border-color:var(--warn);background:var(--warn-wash)}
.mc-option.incorrect .mc-key{background:var(--warn);border-color:var(--warn);color:#fff}
.mc-option.locked{cursor:default;pointer-events:none}

/* ranking */
.rank-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius);background:var(--surface);cursor:grab;font-size:14px}
.rank-item:active{cursor:grabbing}
.rank-item.dragging{opacity:.5;border-style:dashed}
.rank-grip{color:var(--ink-faint);font-size:15px;cursor:grab}
.rank-num{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;width:18px}

/* likert */
.likert{display:flex;gap:8px;margin-top:6px}
.likert-opt{flex:1;text-align:center;padding:10px 4px;border:1.5px solid var(--line);border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s;background:var(--surface)}
.likert-opt:hover{border-color:var(--ink-faint)}
.likert-opt.selected{border-color:var(--accent);background:var(--accent-wash);color:var(--accent);font-weight:600}

/* confidence */
.confidence{background:var(--gold-wash);border:1px solid #e6d3a6;border-radius:var(--radius);padding:14px 18px;margin-top:14px}
.confidence-label{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.confidence-row{display:flex;align-items:center;gap:14px}
.confidence-slider{flex:1;accent-color:var(--gold);cursor:pointer;height:4px}
.confidence-value{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--gold);min-width:42px;text-align:center}
.confidence-anchors{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-faint);margin-top:6px}

/* compare-responses (learner self-compares against model) */
.compare-note{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;font-family:var(--read)}

/* submit + feedback */
.submit-row{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.saved-flag{font-size:12.5px;color:var(--good);font-weight:600;display:flex;align-items:center;gap:5px}
.hint-btn{background:none;border:1px dashed var(--gold);color:var(--gold);border-radius:99px;padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.hint-btn:hover{background:var(--gold-wash)}
.hint-box{margin-top:12px;background:var(--gold-wash);border:1px solid #e6d3a6;border-radius:var(--radius);padding:12px 16px;font-size:13.5px;color:#6b4910;display:none;font-family:var(--read);line-height:1.5}
.hint-box.show{display:block;animation:rise .3s}
.hint-box .hint-n{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.7}

.feedback{margin-top:18px;border-radius:var(--radius-lg);padding:16px 18px;font-size:15px;line-height:1.6;display:none;font-family:var(--read);border:1px solid}
.feedback.show{display:block;animation:rise .35s}
.feedback .fb-head{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.fb-elaborative{background:var(--indigo-wash);border-color:#c9d2e8;color:#2a386a}
.fb-elaborative .fb-head{color:var(--indigo)}
.fb-corrective{background:var(--accent-wash);border-color:var(--accent-line);color:var(--accent-deep)}
.fb-corrective .fb-head{color:var(--accent)}
.fb-socratic{background:var(--plum-wash);border-color:#d9c4e0;color:#492a52}
.fb-socratic .fb-head{color:var(--plum)}
.fb-correct{background:var(--good-wash);border-color:#bcd6c2;color:#2f5740}
.fb-correct .fb-head{color:var(--good)}

/* retrieval practice */
.retrieval{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:0;margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow-sm)}
.retrieval-banner{background:var(--moss-wash);padding:16px 24px;border-bottom:1px solid #cdd8bd}
.retrieval-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.retrieval-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--moss);display:flex;align-items:center;gap:7px}
.retrieval-type{font-size:10px;color:var(--moss);font-family:var(--mono);opacity:.8}
.retrieval-prompt{font-family:var(--read);font-size:17px;font-weight:500;color:var(--ink);line-height:1.45}
.retrieval-body{padding:18px 24px}
.schedule-strip{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-faint);flex-wrap:wrap}
.sched-chip{font-family:var(--mono);font-size:11px;background:var(--paper-deep);border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--ink-soft)}
.decay-meta{font-size:11px;color:var(--ink-faint);margin-top:8px;font-family:var(--mono)}

/* transfer */
.transfer{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.transfer::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rust)}
.transfer-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.transfer-ctx{font-family:var(--mono);font-size:10px;background:var(--rust-wash);color:var(--rust);padding:2px 8px;border-radius:4px;text-transform:none;letter-spacing:0}
.transfer-scenario{background:var(--rust-wash);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;font-family:var(--read);font-size:16px;line-height:1.5;color:#5e2e16}
.transfer-task{font-family:var(--read);font-size:17px;font-weight:500;margin-bottom:14px;color:var(--ink)}
.criteria-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
.criteria-list{list-style:none;margin-bottom:14px}
.criteria-list li{font-size:14px;color:var(--ink-soft);padding:5px 0 5px 22px;position:relative;line-height:1.45}
.criteria-list li::before{content:'◇';position:absolute;left:0;color:var(--rust);font-size:11px;top:6px}

/* mastery verification */
.mastery-box{background:linear-gradient(120deg,var(--accent-wash),var(--surface-raised));border:1px solid var(--accent-line);border-radius:var(--radius-lg);padding:20px 24px;margin:6px 0 18px}
.mastery-box h4{font-size:15px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mastery-thresholds{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px}
.mthresh{font-size:13px;color:var(--ink-soft)}
.mthresh b{font-family:var(--mono);color:var(--accent);font-size:15px;display:block}

/* ─── Assessment ─────────────────────────────────────── */
.assess-head{margin-bottom:26px}
.assess-head h2{font-size:28px;margin:8px 0}
.q-card{background:var(--surface-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.q-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.q-prompt{font-family:var(--read);font-size:18px;font-weight:500;margin-bottom:16px;line-height:1.45;color:var(--ink)}
.rubric{background:var(--paper-deep);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-top:16px}
.rubric-title{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
.rubric-row{display:flex;gap:14px;margin-bottom:10px;font-size:14px;align-items:baseline}
.rubric-row:last-child{margin-bottom:0}
.rubric-level{font-weight:700;min-width:78px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--sans)}
.rubric-excellent .rubric-level{color:var(--good)}
.rubric-adequate .rubric-level{color:var(--gold)}
.rubric-weak .rubric-level{color:var(--warn)}
.rubric-desc{color:var(--ink-soft);font-family:var(--read);line-height:1.45}
.error-patterns{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}
.ep-title{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);margin-bottom:10px}
.ep-item{font-size:13px;color:var(--ink-soft);padding:7px 0;border-bottom:1px solid var(--line-soft);line-height:1.45}
.ep-item:last-child{border-bottom:none}
.ep-item b{color:var(--ink)}
.ep-remedy{display:block;margin-top:3px;font-size:12px;color:var(--ink-faint)}
.ep-remedy::before{content:'↳ ';color:var(--rust)}

/* ─── Glossary ───────────────────────────────────────── */
.glossary-link{border-bottom:1px dotted var(--accent);cursor:help;color:var(--accent-deep)}
#glossary-btn{
  position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;border:none;
  border-radius:99px;padding:11px 18px;font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;box-shadow:var(--shadow);z-index:120;display:flex;align-items:center;gap:7px;transition:all .2s;
}
#glossary-btn:hover{background:var(--accent-deep);transform:translateY(-2px)}
#scrim{position:fixed;inset:0;background:rgba(35,33,28,.34);backdrop-filter:blur(2px);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
#scrim.open{opacity:1;pointer-events:auto}
#glossary-drawer{
  position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:var(--surface);
  border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:200;
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.22,1,.36,1);
}
#glossary-drawer.open{transform:none}
#glossary-drawer-header{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
#glossary-drawer-header h3{font-size:20px}
#glossary-drawer-header .sub{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
#glossary-close{background:none;border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;font-size:16px;color:var(--ink-soft);width:34px;height:34px;display:flex;align-items:center;justify-content:center}
#glossary-search{margin:16px 24px 0;padding:10px 14px;border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-family:var(--sans);background:var(--surface-raised);width:calc(100% - 48px)}
#glossary-search:focus{outline:none;border-color:var(--accent)}
#glossary-body{overflow-y:auto;padding:14px 0 24px;flex:1}
.glossary-term{padding:14px 24px;border-bottom:1px solid var(--line-soft)}
.glossary-term dt{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--accent)}
.glossary-term dd{font-family:var(--read);font-size:15px;color:var(--ink-soft);margin-top:4px;line-height:1.5}

/* ─── Complete ───────────────────────────────────────── */
#screen-complete{text-align:center;padding:70px 20px}
.complete-seal{
  width:96px;height:96px;border:2px solid var(--accent);border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:30px;
  color:var(--accent);margin:0 auto 28px;position:relative;animation:sealIn .6s cubic-bezier(.22,1,.36,1);
}
@keyframes sealIn{from{opacity:0;transform:scale(.7) rotate(-8deg)}to{opacity:1;transform:none}}
.complete-seal::after{content:'';position:absolute;inset:-7px;border:1px solid var(--accent-line);border-radius:50%}
#screen-complete h1{font-size:42px;margin-bottom:14px}
#screen-complete .c-sub{font-family:var(--read);font-size:19px;color:var(--ink-soft);max-width:480px;margin:0 auto 18px;line-height:1.5}
.complete-stats{display:flex;justify-content:center;gap:36px;margin:30px 0 36px;flex-wrap:wrap}
.cstat .cs-val{font-family:var(--serif);font-size:30px;color:var(--accent)}
.cstat .cs-key{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-top:4px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:99px;font-size:13.5px;z-index:300;transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px}
#toast.show{transform:translateX(-50%) translateY(0)}

/* scrollbars */
#sidebar::-webkit-scrollbar,#glossary-body::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb,#glossary-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}

/* responsive */
@media(max-width:920px){
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg)}
  #sidebar.open{transform:none}
  #topbar{display:flex}
  #main{padding:32px 22px 80px}
  .meta-strip{grid-template-columns:repeat(2,1fr)}
  .meta-cell:nth-child(2){border-right:none}
  .cover-body h1{font-size:30px}
}
@media(max-width:520px){
  #main{padding:24px 16px 72px}
  .cover-body h1{font-size:26px}
  .nav-buttons{flex-direction:column-reverse;align-items:stretch}
  .nav-buttons .btn{justify-content:center}
}
</style>

  "sections": [
    {
      "sectionId": "s1-type-system-foundations",
      "title": "Rethinking the Type System",
      "description": "Rebuild the mental model of the TypeScript type system from the ground up: erasure, structural typing, assignability, any/unknown/never, assertions, and control-flow narrowing.",
      "learningObjectives": [
        {
          "objectiveId": "lo-s1-1",
          "description": "Explain structural compatibility and predict whether one shape is assignable to another.",
          "linkedCompetencies": [
            "c-type-system-foundations"
          ]
        },
        {
          "objectiveId": "lo-s1-2",
          "description": "Differentiate any, unknown and never and choose the correct one for a scenario.",
          "linkedCompetencies": [
            "c-type-system-foundations"
          ]
        },
        {
          "objectiveId": "lo-s1-3",
          "description": "Trace control-flow narrowing to determine a variable’s type at a specific point.",
          "linkedCompetencies": [
            "c-type-system-foundations"
          ]
        }
      ],
      "motivationHooks": [
        {
          "type": "real-world-stakes",
          "prompt": "The ‘types pass but production breaks’ bug almost always traces to a wrong mental model of the compiler. Fix the model and a whole bug class disappears."
        },
        {
          "type": "prediction-gap",
          "prompt": "A class that never writes implements Playable is happily assigned to a Playable. Predict why before reading on."
        }
      ],
      "learningExperiences": [
        {
          "experienceId": "xp-s1-foundations",
          "title": "How the compiler actually reasons",
          "experienceType": "guided-analysis",
          "difficultyProfile": {
            "overall": 3,
            "conceptualComplexity": 4,
            "ambiguity": 3
          },
          "estimatedDurationMinutes": 55,
          "linkedCompetencies": [
            "c-type-system-foundations"
          ],
          "desiredCognitiveActions": [
            "prediction",
            "analysis",
            "retrieval",
            "reflection"
          ],
          "contentBlocks": [
            {
              "blockId": "b-s1-why",
              "type": "text",
              "content": "Most developers arrive at TypeScript carrying a wrong mental model — that types are runtime tags, or that the compiler thinks like Java. That model is the single biggest source of ‘the types pass but production breaks’ bugs. Before you can build type infrastructure you must reason about the type system the way the compiler actually reasons. Everything later — generics, domain modelling, boundary validation — assumes you can predict what the compiler will allow and why."
            },
            {
              "blockId": "b-s1-objectives",
              "type": "text",
              "content": "By the end of this lecture you will be able to: (1) Explain how structural compatibility determines assignability and predict whether one shape is assignable to another; (2) Differentiate any, unknown and never and choose the correct one for a scenario; (3) Trace control-flow narrowing to determine a variable’s type at a specific point in code."
            },
            {
              "blockId": "b-s1-main",
              "type": "text",
              "content": "Types are a compile-time fiction. TypeScript types do not exist at runtime — they are erased entirely during compilation, so the shipped JavaScript has no knowledge of your interfaces, generics or unions. A type is a claim the compiler checks for consistency, not a guarantee the running program enforces.\n\nStructural typing: shape, not name. Two types are compatible if their shapes are compatible, regardless of declared names. This is the opposite of nominal typing (Java, C#), where A is assignable to B only if A explicitly extends or implements B. A class can be assigned to an interface it never declared it implements, purely because it has at least the required members; extra members do not matter.\n\nAssignability and the ‘fewer requirements’ rule. A source is assignable to a target if the source satisfies every requirement the target imposes. Fewer requirements = wider (more general); more requirements = narrower (more specific). You can assign narrow -> wide, not wide -> narrow. More properties = more specific = assignable to types that ask for less.\n\nany, unknown and never. any turns off the checker for a value; it is assignable to and from everything and propagates, so a single any silently disables safety across a call chain. unknown is the type-safe counterpart: anything is assignable to it, but it is assignable to almost nothing until you narrow it, forcing a check before use. never is the type with no possible values — the return type of a function that always throws, the type in an unreachable branch, and the result of an impossible intersection like string & number.\n\nType assertions do nothing at runtime. value as SomeType tells the compiler ‘trust me’; it performs no runtime conversion and no runtime check. If you are wrong, nothing catches it. Genuine conversion needs runtime code (Number(raw)); genuine validation needs runtime checks.\n\nControl-flow narrowing. The compiler tracks how a variable’s type changes as it flows through conditionals; the resulting refinement is narrowing, driven by type guards: typeof, instanceof, equality checks, in and custom guard functions. After eliminating some union members, the compiler narrows the remainder by exhaustion."
            },
            {
              "blockId": "b-s1-diagram",
              "type": "image",
              "url": "PLACEHOLDER",
              "altText": "A spectrum diagram placing never (no values) at the bottom, concrete types in the middle, and any/unknown at the top, with arrows showing assignability directions."
            },
            {
              "blockId": "b-s1-analogy",
              "type": "text",
              "content": "Analogy: a TypeScript type is like a guest list checked at the door, not a wristband worn inside. The bouncer (compiler) verifies you match the list before you enter, but once inside there is no wristband (no runtime tag) — the program cannot re-check who you claimed to be. An assertion is you telling the bouncer ‘I’m on the list, trust me’; if you lied, no one inside ever finds out until something breaks."
            },
            {
              "blockId": "b-s1-misconception",
              "type": "text",
              "content": "Misconception callout — ‘TypeScript uses nominal typing like Java/C#’ (see m-s1-nominal): it does not. A function expecting Playable accepts anything shaped correctly, so you cannot rely on type identity to keep conceptually-different values apart — we fix that with branding in s3."
            },
            {
              "blockId": "b-s1-errors",
              "type": "text",
              "content": "Common errors in this section: expecting an explicit implements clause before assignment (refuted by structural typing); treating unknown like any and accessing properties without narrowing; and trusting a type assertion to convert or validate at runtime when it does neither."
            },
            {
              "blockId": "b-s1-keyterms",
              "type": "text",
              "content": "Structural typing: compatibility by members (shape), not name. Nominal typing: compatibility by explicit declared relationships. Assignability: whether a value of one type may go where another is expected. any: opt-out of checking, unsafe and propagating. unknown: top type accepting any value but requiring narrowing. never: bottom type with no values. Type assertion (as): compile-time-only instruction, no runtime effect. Control-flow analysis: tracking how a type changes across branches. Narrowing: refining a broad type within a path. Type guard: an expression/function that narrows (typeof, instanceof, in, custom guards)."
            },
            {
              "blockId": "b-s1-summary",
              "type": "text",
              "content": "TypeScript types are erased at compile time — checked claims, not runtime guarantees. Compatibility is structural, so a value fits anywhere its shape satisfies the target; more properties make a type more specific. any disables checking and spreads unsafely; unknown is its safe sibling that forces narrowing; never represents the impossible. Assertions only change the compiler’s belief and never touch runtime behaviour. The compiler narrows union types through control-flow analysis driven by type guards."
            }
          ],
          "interactionSequence": [
            {
              "interactionId": "i-s1-predict-assign",
              "interactionType": "prediction",
              "prompt": "A function expects { id: number }. You pass { id: 5, label: 'x' }. Predict whether this compiles and state the rule that decides it.",
              "required": true,
              "responseFormat": "short-answer",
              "revealCondition": "after-response",

          "contentBlocks": [
            {
              "blockId": "b-s2-why",
              "type": "text",
              "content": "A SaaS front end is full of repeating structures: API wrappers, paginated lists, form state, cache entries. Without generics you either duplicate these per entity (unmaintainable) or reach for any (unsafe). Generics let you write the structure once while preserving exact type information. Beyond that, TypeScript’s type system is itself a small programming language — you can compute types from other types. This is how libraries derive a fully-typed API from a single schema, and it’s the machinery used in s3 (branding, immutability) and s4 (schema-derived types)."
            },
            {
              "blockId": "b-s2-objectives",
              "type": "text",
              "content": "By the end of this lecture you will be able to: (1) Design generic functions and types with appropriate constraints, defaults and inference points; (2) Construct conditional and mapped types using infer and key remapping; (3) Analyze distributive behaviour and template literal types to predict computed results."
            },
            {
              "blockId": "b-s2-main",
              "type": "text",
              "content": "Generics preserve relationships; any destroys them. A generic introduces a type parameter — a placeholder filled per use — to relate types across inputs and outputs. function first<T>(arr: T[]): T returns the exact element type (string for a string array), whereas an any[] version returns any and loses the type relationship between input and output. The compiler infers T from the argument, so callers usually annotate nothing.\n\nConstraints: extends narrows what T can be. An unconstrained T could be anything, so you cannot access its members. A constraint (T extends SomeShape) says ‘T must at least be this’, unlocking those members while preserving the specific type. With pluck<T extends object, K extends keyof T>(obj, key): T[K], K is constrained to actual keys and the indexed access type T[K] computes the exact property type.\n\nDefaults, and the cost of over-parameterizing. Parameters can have defaults (<T = string>). But more parameters is not better: each uninferable one becomes a caller burden and harms readability. Prefer constraints and defaults; add a parameter only when it carries information the caller actually varies.\n\nType-level programming is fully erased. Conditional types, mapped types, infer and template literals run only in the compiler. keyof T gives a type of keys, not a runtime array; typeof x in a type position reads the static type. To get keys at runtime you need Object.keys(config) — actual runtime code.\n\nMapped types transform every key. { [K in keyof T]?: T[K] } iterates the keys to build a new type; you can make properties readonly or optional, or replace value types (e.g. an Errors<T> whose values are string messages). Key remapping with as renames or filters keys (mapping to never drops them), and combines with template literal types like get${Capitalize<...>} to build typed getter names.\n\nConditional types and infer. T extends U ? X : Y chooses a branch by type relationship; infer captures a type from within a pattern (e.g. T extends Promise<infer V> ? V : T unwraps a Promise). This is the foundation of response-unwrapping utilities.\n\nDistributive conditional types. When the checked type is a naked type parameter and you pass a union, the conditional distributes over each member then unions the results: ToArray<string | number> is string[] | number[], not (string | number)[]. Wrapping in a tuple ([T] extends [any] …) suppresses distribution."
            },
            {
              "blockId": "b-s2-distribution-video",
              "type": "video",
              "url": "PLACEHOLDER",
              "captionOrTranscript": "Animated walkthrough: a union enters a naked-parameter conditional, splits into per-member lanes (string -> string[], number -> number[]), and the results are unioned to string[] | number[]; then the tuple-wrapped version is shown suppressing distribution."
            },
            {
              "blockId": "b-s2-analogy",
              "type": "text",
              "content": "Analogy: a mapped type is a factory conveyor belt — every key on the belt passes through the same station (readonly?, optional?, rename?) and comes out transformed, all at build time. A distributive conditional is a sorting machine that splits a mixed bin (the union) into separate lanes, processes each lane, then merges the labelled outputs back together."
            },
            {
              "blockId": "b-s2-misconception",
              "type": "text",
              "content": "Misconception callout — ‘distributive conditionals behave like a simple if’ (see m-s2-distribution-if): they iterate the union. A naked parameter distributes; wrapping the check in a tuple suppresses it. Knowing which is active is the difference between a correct type and a baffling one."
            },
            {
              "blockId": "b-s2-errors",
              "type": "text",
              "content": "Common errors: treating generics as ‘any with syntax’ and losing the input->output relationship; over-parameterizing types with parameters the compiler cannot infer; assuming keyof/typeof/conditional types do runtime reflection; and collapsing a distributive conditional as if it ran once over the whole union."
            },
            {
              "blockId": "b-s2-keyterms",
              "type": "text",
              "content": "Generic/type parameter: a placeholder filled per use, relating input and output. Constraint (extends): a bound limiting a parameter, unlocking its members. Default type parameter: a fallback when none is supplied/inferred. Inference site: where the compiler reads to deduce a parameter. Indexed access type (T[K]): the type of a property at key K. Mapped type: iterates a type’s keys to build a new type. Key remapping (as): renaming/filtering keys in a mapped type. Template literal type: a string-literal type built by interpolation. Conditional type: T extends U ? X : Y. infer: captures a type from a conditional pattern. Distributive conditional type: a conditional over a naked union parameter applied per member."
            },
            {
              "blockId": "b-s2-summary",
              "type": "text",
              "content": "Generics carry type information through code instead of discarding it like any. Constrain parameters with extends to unlock members and keep results precise; prefer constraints and defaults over piling on parameters. The type system is compile-time-only: mapped types transform every key (with remapping and template literals), conditional types branch on relationships, and infer destructures types from patterns. Watch for distribution — conditionals over naked union parameters apply per member."
            }

          "experienceType": "case-study",

          "contentBlocks": [
            {
              "blockId": "b-s3-why",
              "type": "text",
              "content": "Every SaaS bug ticket that reads ‘this shouldn’t be possible’ is usually a type that allowed an impossible combination. If your User type lets status: ‘deleted’ coexist with a populated activeSessionId, eventually code will create that contradiction and downstream logic will break. Making invalid states unrepresentable moves whole categories of bugs from runtime to compile time, using the mechanics of s1 (narrowing, structural typing) and the operators of s2 (mapped types, intersection-based branding)."
            },
            {
              "blockId": "b-s3-objectives",
              "type": "text",
              "content": "By the end of this lecture you will be able to: (1) Model mutually exclusive states with discriminated unions and enforce exhaustiveness; (2) Implement branded types and immutability to prevent primitive misuse and accidental mutation; (3) Evaluate competing data models and justify which best eliminates illegal states."
            },
            {
              "blockId": "b-s3-main",
              "type": "text",
              "content": "Optional fields: the problem. A big object with optional isLoading/data/error permits nonsense: loading and succeeded and failed simultaneously. Optionality expresses ‘maybe present’; it cannot express ‘exactly one at a time’.\n\nDiscriminated unions: exactly one variant. A union of object types sharing a common literal discriminant (e.g. status) lets the compiler narrow to a single variant. Inside case 'success' the state is the success variant — data is guaranteed present and error doesn’t exist — so the illegal ‘loading + data + error’ object can no longer be constructed.\n\nExhaustiveness checking with never. In the default case, assign the remaining value to a never-typed variable. If someone later adds a variant (e.g. status: ‘cancelled’), the default no longer narrows to never, the never assignment fails to compile, and the compiler forces you to handle the new case — a checklist that can’t be forgotten.\n\nBranded types: defeating structural typing on purpose. Because TS is structural, UserId and OrderId (both strings) are interchangeable. A branded type intersects a primitive with a unique phantom marker: type Brand<T,B> = T & { readonly __brand: B }. UserId and OrderId then differ structurally (their __brand literals differ), so passing one where the other is expected is rejected. The __brand field never exists at runtime (types are erased, per s1); you construct branded values through a validated constructor or a single controlled assertion.\n\nImmutability: readonly and as const. readonly properties and ReadonlyArray<T> prevent mutation through a reference. as const freezes a literal to its narrowest deeply-readonly form. Deriving type Role = typeof ROLES[number] from a const tuple gives one source of truth driving both the runtime array and the Role union — they can never drift.\n\nEvaluating competing models. Modelling is design with trade-offs: ask which states are legal and whether your type permits exactly those and no others. Fewer illegal states is generally better, but watch for over-modelling that hurts ergonomics. The skill is justifying the choice with a concrete illegal state the chosen model forbids."
            },
            {
              "blockId": "b-s3-statediagram",
              "type": "image",
              "url": "PLACEHOLDER",
              "altText": "State diagram of a request lifecycle (idle -> loading -> success/error) shown as four mutually exclusive boxes, contrasted with a single box of toggleable optional flags that can all be on at once."
            },
            {
              "blockId": "b-s3-analogy",
              "type": "text",
              "content": "Analogy: a discriminated union is a vending machine with one button pressed at a time — pressing ‘success’ physically blocks ‘loading’ and ‘error’. A bag of optional fields is a control panel where every switch can be flipped at once, so you can request a soda while the machine insists it’s both empty and dispensing."
            },
            {
              "blockId": "b-s3-misconception",
              "type": "text",
              "content": "Misconception callout — ‘a string is a string, branding is unnecessary ceremony’ (see m-s3-branding-ceremony): structural typing makes same-shaped primitives interchangeable, so branding is the only way to recover nominal-like safety on primitives. The phantom marker costs nothing at runtime because types are erased (s1)."
            },
            {
              "blockId": "b-s3-errors",
              "type": "text",
              "content": "Common errors: using a bag of optional fields to model exclusive states (permits contradictions); skipping the never exhaustiveness check so new variants slip through unhandled; and dismissing branding as ceremony, leaving UserId/OrderId freely swappable."
            },
            {
              "blockId": "b-s3-keyterms",
              "type": "text",
              "content": "Make invalid states unrepresentable: design types so illegal combinations can’t be constructed. Discriminated (tagged) union: a union whose members share a literal discriminant used for narrowing. Discriminant: the shared literal property switched on. Exhaustiveness check: a never assignment forcing handling of every variant. Branded (nominal-emulation) type: a primitive intersected with a phantom marker. Phantom property: a type-only field with no runtime presence. readonly/ReadonlyArray: type-level immutability. as const: asserts the narrowest deeply-readonly literal type."
            },
            {
              "blockId": "b-s3-summary",
              "type": "text",
              "content": "Optional fields can’t express ‘exactly one state at a time’ and silently permit contradictions. Discriminated unions fix this with a shared literal discriminant the compiler narrows on, guaranteeing variant-specific fields exist only where valid. A never-based exhaustiveness check fails when a new variant is forgotten. Branding intersects primitives with a phantom marker to defeat structural interchangeability, recovering the UserId/OrderId safety s1 showed was missing. readonly and as const encode immutability and a single source of truth. Good models are judged by how few illegal states they permit."
            }

      "sectionId": "s4-typing-the-boundaries",
      "title": "Typing the Boundaries",
      "description": "Convert untyped external input into trusted domain types: the typed-fetch trap, user-defined type guards, schema-derived types, parse vs safeParse, and per-seam validation strategy.",
      "learningObjectives": [
        {
          "objectiveId": "lo-s4-1",
          "description": "Implement runtime validation and type guards to safely narrow external input.",

      ],
      "motivationHooks": [
        {
          "type": "real-world-stakes",
          "prompt": "The crash at invoice.total.toFixed(2) was born three layers up, where someone wrote as Invoice instead of validating. Fix the seam, prevent the crash."
        },
        {
          "type": "prediction-gap",
          "prompt": "return res.json() as Invoice compiles cleanly. Predict what actually protects you at runtime. (Spoiler: nothing yet.)"
        }
      ],
      "learningExperiences": [
        {
          "experienceId": "xp-s4-boundaries",
          "title": "Earning your types at the perimeter",
          "experienceType": "case-study",
          "difficultyProfile": {
            "overall": 4,
            "conceptualComplexity": 4,
            "ambiguity": 4
          },
          "estimatedDurationMinutes": 60,
          "linkedCompetencies": [
            "c-typing-the-boundaries"
          ],
          "desiredCognitiveActions": [
            "analysis",
            "prediction",
            "synthesis",
            "reflection"
          ],
          "contentBlocks": [
            {
              "blockId": "b-s4-why",
              "type": "text",
              "content": "Your domain model from s3 is only as trustworthy as the data flowing into it. Every byte entering a SaaS front end — API responses, form input, URL params, env vars, localStorage — arrives untyped and unverified. The most dangerous bug in TypeScript is believing a type annotation makes external data safe; it doesn’t (types are erased; the network never reads your interfaces). This section is about the seams, where you convert unknown into trusted domain types through runtime validation. Get the boundary right and the whole interior can be trusted."
            },
            {
              "blockId": "b-s4-objectives",
              "type": "text",
              "content": "By the end of this lecture you will be able to: (1) Implement runtime validation and type guards to safely narrow external input; (2) Derive static types from validation schemas to keep runtime and compile-time shapes in sync; (3) Evaluate where validation belongs across API, form and config seams."
            },
            {
              "blockId": "b-s4-main",
              "type": "text",
              "content": "The lie of the typed fetch. return res.json() as Invoice compiles but res.json() is Promise<any>; the assertion (compile-time only) tells the compiler to believe it’s an Invoice while the server could return an error object, a renamed field, or null. The annotation is a hope, not a guarantee; downstream invoice.total.toFixed(2) crashes far from the real cause.\n\nType guards: narrowing you can trust. A user-defined type guard returns a type predicate (x is T). When it returns true after real runtime checks, the compiler narrows the argument to T. Start from unknown, perform the checks, and narrowing is earned by actual verification — the point where compile-time and runtime finally agree.\n\nHand-written guards don’t scale — schemas do. Define a schema once and derive both the validator and the static type from it. With Zod: InvoiceSchema is a runtime validator; type Invoice = z.infer<typeof InvoiceSchema> extracts the static type (conditional types + infer under the hood). Validate at the boundary with InvoiceSchema.parse(…). Change the schema and both update together — they can’t drift. Discriminated unions from s3 map onto z.discriminatedUnion.\n\nparse vs safeParse. parse throws on invalid input; safeParse returns a discriminated union ({ success: true; data } | { success: false; error }) — itself an application of s3. Use safeParse where invalid input is expected (user forms) and parse where invalid input is exceptional (a trusted internal contract you want to fail loudly).\n\nWhere does validation belong? Evaluate each seam by who controls the data and what failure means. API responses: validate once at the fetch layer, converting unknown -> domain type; everything inward trusts it. User forms: safeParse with field-level errors (shape them with s2’s Errors<T>). Env/config: validate once at boot with parse so a misconfigured deploy fails immediately rather than three hours later.\n\nThe mental model: a validated perimeter. The perimeter (API, forms, config, storage) is where unknown enters and must be validated; the interior trusts its types because the perimeter guaranteed them. Assertions belong nowhere; validation belongs at every gate."
            },
            {
              "blockId": "b-s4-perimeter",
              "type": "image",
              "url": "PLACEHOLDER",
              "altText": "Fortress diagram: outer wall labelled ‘perimeter’ with gates for API, forms, config and storage where ‘unknown’ enters and passes through validation; the trusted interior holds domain logic, state and components."
            },
            {
              "blockId": "b-s4-analogy",
              "type": "text",
              "content": "Analogy: your app is a fortress. The perimeter gates (API, forms, config, storage) are where strangers (unknown data) arrive and must show ID (runtime validation). Once admitted, the interior trusts everyone because the gate already checked them. An assertion is waving someone through while only glancing at a claimed name — no ID checked, and the impostor roams free until something breaks."
            },
            {
              "blockId": "b-s4-misconception",
              "type": "text",
              "content": "Misconception callout — ‘if the API type says it’s a User, the data is a User at runtime’ (see m-s4-typed-api): the type was erased and the server never read it. Only a runtime check guarantees the shape. The guard, or a schema.parse, is where belief and reality meet."
            },
            {
              "blockId": "b-s4-errors",
              "type": "text",

              "blockId": "b-s4-keyterms",
              "type": "text",
              "content": "Boundary/seam: any point where external untyped data enters. Runtime validation: real checks against data’s actual shape at run time. Type guard/type predicate (x is T): a function whose truth narrows its argument to T. Schema: a runtime description of valid data from which validation and a static type are derived. Schema-derived type: a static type extracted from a schema (e.g. z.infer). parse vs safeParse: throw-on-failure vs return-a-result-union. Validated perimeter: validating all external input at the edges so the interior can trust its types."
            },

              "blockId": "b-s4-summary",
              "type": "text",
              "content": "Type annotations are erased and never enforced on external data, so res.json() as Invoice is a hope. Start boundaries from unknown and earn your types through runtime validation. User-defined type guards (x is T) narrow only after real checks; hand-written guards drift, so derive both a validator and a static type from a single schema. Use parse to fail loudly and safeParse where invalid input is expected. Evaluate each seam — APIs once at the fetch layer, forms per-field, config once at boot — and keep the interior trusted behind a validated perimeter."
            }

          "contentBlocks": [
            {
              "blockId": "b-s5-why",
              "type": "text",
              "content": "You now have every building block: type-system mechanics (s1), generic and type-level machinery (s2), domain models that forbid illegal states (s3), and a validated perimeter (s4). This section assembles them into a coherent type layer for a real SaaS front end. The difference between a codebase that scales and one that decays into any is almost entirely architectural: whether state, components and contracts share a single source of truth, how types are organized across modules, and how strict the compiler is. The cost of getting it wrong compounds as the team and codebase grow."
            },
            {
              "blockId": "b-s5-objectives",
              "type": "text",
              "content": "By the end of this lecture you will be able to: (1) Design typed state and component contracts that share a single source of truth; (2) Organize shared type contracts, declarations and modules across a codebase; (3) Define a tsconfig strictness and type-governance policy and justify its trade-offs."
            },
            {
              "blockId": "b-s5-main",
              "type": "text",
              "content": "One source of truth, flowing outward. Types should originate once and flow: the boundary schema (s4) produces the domain type (s3); the domain type feeds state; state feeds component props. Never re-declare the same shape by hand — re-declaration is where drift and any creep in. A generic Resource<T> discriminated union (s2 + s3) is reused for every async resource, and InvoiceState = Resource<Invoice> composes them so a schema change ripples automatically.\n\nTyped component contracts. Props are a contract; type them from domain types, not loosely. Use indexed access (Invoice[‘id’]) to keep ids in sync and literal unions instead of string. A generic ListProps<T> with readonly T[] is reused for any entity, encodes that props aren’t mutated (s3), and gives callers full inference.\n\nOrganizing types across the codebase. Co-locate types with the code that owns them; avoid a giant types.ts dumping ground. Shared contracts live in a dedicated module both sides import. Ambient declarations (.d.ts) describe untyped JS modules or globals; use declaration merging and module augmentation to extend third-party types safely rather than forking. Prefer import type so bundlers erase cleanly (s1). Expose a stable public type surface per module and keep helper types private.\n\nsatisfies: validate without widening. const routes = {...} satisfies Record<string, /${string}> checks conformance (catching a malformed path) while preserving literal types — superior to an annotation (which widens) and to as (which doesn’t check).\n\ntsconfig strictness as policy. strict: true enables strictNullChecks (highest-value), noImplicitAny, strictFunctionTypes and more. noUncheckedIndexedAccess makes arr[i]/record[key] return T | undefined, forcing you to handle the missing case. Turning it on surfaces real places code could crash on missing data; the upfront cost is fixing them, the payoff is those crashes never reaching production. Strictness relocates defects from expensive runtime to cheap compile time — the errors are pre-empted incidents, not annoyances.\n\nType governance: designing the whole. Type infrastructure can’t be retrofitted cheaply: if boundary, domain and state types aren’t designed together, each team invents shapes, any fills the gaps, and entities get re-declared five ways. Governance is the lightweight policy that prevents this: a single boundary-validation layer (s4); domain types derived from those schemas (s3) in shared modules; a standard generic state wrapper; an agreed strictness baseline raised over time; and lint rules banning any and bare as on external data. The infrastructure is the relationships between layers."

              "blockId": "b-s5-analogy",
              "type": "text",
              "content": "Analogy: a single source of truth is a municipal water system — one reservoir (the schema) feeds treated water through pipes to every tap (state, props). Re-declaring types is each house drilling its own well: they soon disagree on what’s safe to drink, and any is the contamination that seeps into the gaps. Retrofitting infrastructure after the houses are built means tearing up the streets."
            },
            {

              "type": "text",
              "content": "Misconception callout — ‘stricter settings just create more annoying errors’ (see m-s5-strict-annoying): each surfaced error marks a real place the code could crash. Strictness relocates defects from costly runtime to cheap compile time; the errors are pre-empted incidents."

              "blockId": "b-s5-errors",
              "type": "text",

            },
            {
              "blockId": "b-s5-keyterms",
              "type": "text",
              "content": "Single source of truth: each shape defined once, flowing outward, never re-declared. Component contract (props): the typed interface between a component and its callers. Co-location: keeping types beside the code that owns them. Ambient declaration (.d.ts): type-only descriptions for untyped modules/globals. Declaration merging/module augmentation: extending existing (often third-party) types in place. import type: a type-only import the bundler can fully erase. satisfies: validates a value against a type while preserving its narrow inferred type. tsconfig strictness flags: compiler options moving defect classes to compile time. Type governance: the policy coordinating boundary, domain, state and component types as one system."
            },
            {
              "blockId": "b-s5-summary",
              "type": "text",
              "content": "A scalable SaaS type layer rests on one principle: types originate once and flow outward — schema (s4) -> domain type (s3) -> state (generic union, s2+s3) -> component props — with no hand re-declaration. Type component contracts from domain types; make shared components generic and readonly. Organize types by co-locating owned types, centralizing shared contracts, and augmenting third-party types rather than forking; use import type and satisfies to stay erasable and precise. Treat tsconfig strictness as policy that relocates defects from runtime to compile time. Type infrastructure must be designed as a coordinated system; retrofitting it late is a rewrite — which is why types are architecture."
            }
