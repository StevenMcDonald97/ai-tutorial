name = "course-engine"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

# ── KV binding ──────────────────────────────────────────────────────────────
# The catch-all Function (functions/[slug].js) reads each course by slug from
# this namespace under keys of the form  course:<slug>.
#
# 1. Create the namespace once:
#       npx wrangler kv namespace create COURSES
#    Wrangler prints an  id = "...".  Paste it below.
# 2. (Optional) a preview namespace for `wrangler pages dev`:
#       npx wrangler kv namespace create COURSES --preview
#    Paste the preview id as  preview_id.
#
# The binding name COURSES is what the Function sees as  env.COURSES.
[[kv_namespaces]]
binding = "COURSES"
id = "7c87f749a9014e289c1c35c89a54ceeb"
# preview_id = "PASTE_YOUR_PREVIEW_KV_NAMESPACE_ID_HERE"

# ── Notes ───────────────────────────────────────────────────────────────────
# The env.ASSETS binding (used to read manifest.json, player.html, 404.html)
# is provided to Pages Functions automatically — no declaration needed.
#
# Build command (set in the Pages dashboard, or your CI):
#     node scripts/build-manifest.js && node scripts/sync-kv.js
# build-manifest.js regenerates public/manifest.json from courses/*.json;
# sync-kv.js pushes changed courses into the COURSES KV namespace.
