<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f5f2;
  --surface:#ffffff;
  --border:#e8e4de;
  --text:#1a1917;
  --text-secondary:#6b6760;
  --accent:#2d5a3d;
  --accent-light:#eaf2ec;
  --accent-muted:#4a7c5f;
  --warn:#8b3a2a;
  --warn-light:#fdf0ee;
  --gold:#c9973a;
  --gold-light:#fdf6e8;
  --blue:#2563eb;
  --blue-light:#eff6ff;
  --violet:#6d28d9;
  --violet-light:#f5f3ff;
  --radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400;line-height:1.25}

/* ── Layout ── */
#app{display:flex;min-height:100vh}

/* ── Sidebar ── */
#sidebar{
  width:290px;min-width:290px;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
#sidebar-header{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
#sidebar-header .course-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
#sidebar-header h2{font-size:17px;color:var(--text);line-height:1.3}
#progress-bar-wrap{margin-top:12px;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
#progress-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;width:0%}
#progress-label{margin-top:5px;font-size:11px;color:var(--text-secondary)}

/* Competency badges in sidebar */
#competency-sidebar{padding:12px 16px;border-bottom:1px solid var(--border)}
#competency-sidebar .comp-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px}
.comp-badge{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.comp-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.comp-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
.comp-pct{font-size:11px;color:var(--text-secondary);width:28px;text-align:right}

/* Section nav */
.section-nav-item{border-bottom:1px solid var(--border)}
.section-nav-header{
  padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;color:var(--text-secondary);user-select:none;transition:background .15s;
}
.section-nav-header:hover{background:var(--bg)}
.section-nav-header.active{color:var(--text)}
.section-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .2s}
.section-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.section-check.active{border-color:var(--accent)}
.section-nav-arrow{font-size:10px;transition:transform .2s;margin-left:auto}
.section-nav-item.open .section-nav-arrow{transform:rotate(90deg)}
.section-nav-experiences{display:none}
.section-nav-item.open .section-nav-experiences{display:block}

.exp-nav-item{
  padding:7px 18px 7px 44px;cursor:pointer;font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;transition:background .15s,color .15s;
}
.exp-nav-item:hover{background:var(--bg);color:var(--text)}
.exp-nav-item.active{color:var(--accent);font-weight:600}
.exp-nav-item.done .exp-dot{background:var(--accent-muted)}
.exp-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s}
.exp-nav-item.active .exp-dot{background:var(--accent)}

.assess-nav-item{
  padding:7px 18px 7px 44px;cursor:pointer;font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;transition:background .15s;
}
.assess-nav-item:hover{background:var(--bg)}
.assess-nav-item.active{color:var(--gold);font-weight:600}
.assess-nav-item .exp-dot{background:rgba(201,151,58,.4)}
.assess-nav-item.active .exp-dot{background:var(--gold)}

/* ── Main ── */
#main{flex:1;max-width:780px;margin:0 auto;padding:44px 36px}

/* ── Screens ── */
.screen{display:none;animation:fadeIn .22s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── Shared components ── */
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.tag-green{background:var(--accent-light);color:var(--accent)}
.tag-gray{background:var(--border);color:var(--text-secondary)}
.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-gold{background:var(--gold-light);color:var(--gold)}
.tag-violet{background:var(--violet-light);color:var(--violet)}

.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:99px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-muted)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-ghost{background:none;color:var(--accent);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;padding:4px 0;text-decoration:underline;text-underline-offset:3px}

.nav-buttons{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:22px;border-top:1px solid var(--border)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}

/* ── Intro screen ── */
.course-hero{
  background:linear-gradient(135deg,var(--accent-light),var(--border));
  border-radius:var(--radius);height:180px;margin-bottom:28px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.course-hero img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius)}
.course-hero .hero-icon{font-size:52px}

.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.meta-cell{padding:14px 16px;background:var(--surface);border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-cell strong{display:block;font-size:15px;font-weight:600;color:var(--text)}
.meta-cell span{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}

.lm-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.lm-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);border-radius:99px;
  padding:5px 12px;font-size:12px;color:var(--text-secondary);
}
.lm-pill.on{background:var(--accent-light);border-color:#b8d9c2;color:var(--accent);font-weight:600}
.lm-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.outcomes-list{list-style:none;margin:10px 0 22px}
.outcomes-list li{padding:7px 0 7px 22px;position:relative;font-size:14px;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.outcomes-list li::before{content:'✓';position:absolute;left:0;color:var(--accent);font-weight:700}

/* ── Motivation hooks ── */
.hook-box{
  border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:12px;font-size:14px;
}
.hook-stakes{background:var(--warn-light);border-left:3px solid var(--warn);color:var(--warn)}
.hook-gap{background:var(--gold-light);border-left:3px solid var(--gold);color:#7a5a1a}
.hook-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* ── Section intro ── */
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.objectives-list{list-style:none;margin:10px 0 22px}
.objectives-list li{padding:8px 12px 8px 34px;position:relative;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.objectives-list li::before{content:'→';position:absolute;left:12px;color:var(--accent)}

/* ── Experience screen ── */
.exp-header{margin-bottom:24px}
.exp-header h2{font-size:26px;margin:8px 0 8px}
.exp-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.exp-meta-item{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px}

.cognitive-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}

/* Content blocks */
.content-block-text{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:18px}
.content-block-image{margin-bottom:18px}
.content-block-image img{width:100%;border-radius:var(--radius);border:1px solid var(--border)}
.content-block-image .img-caption{font-size:12px;color:var(--text-secondary);text-align:center;margin-top:6px}

/* Worked example */
.worked-example{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px}
.we-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-muted);margin-bottom:8px}
.we-problem{font-size:14px;font-weight:600;margin-bottom:10px}
.we-steps{list-style:none;counter-reset:we}
.we-steps li{counter-increment:we;padding:6px 0 6px 28px;position:relative;font-size:13.5px;color:var(--text-secondary)}
.we-steps li::before{content:counter(we);position:absolute;left:0;width:20px;height:20px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;top:6px}
.we-conclusion{margin-top:10px;font-size:13px;color:var(--accent);font-style:italic}

/* ── Interactions ── */
.interaction-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.interaction-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.int-prediction .interaction-label{color:var(--blue)}
.int-reflection .interaction-label{color:var(--violet)}
.int-compare .interaction-label{color:var(--gold)}
.int-retrieval .interaction-label{color:var(--accent)}
.int-transfer .interaction-label{color:var(--warn)}

.interaction-prompt{font-size:15px;font-weight:500;margin-bottom:16px;line-height:1.5}

/* Short answer input */
.sa-textarea{
  width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
  resize:vertical;min-height:90px;transition:border .15s;background:var(--surface);
}
.sa-textarea:focus{outline:none;border-color:var(--accent)}
.sa-textarea:disabled{opacity:.7;background:var(--bg)}

/* Confidence slider */
.confidence-block{
  background:var(--gold-light);border:1px solid #e8d5a8;border-radius:8px;
  padding:12px 16px;margin-top:12px;
}
.confidence-label{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:8px}
.confidence-row{display:flex;align-items:center;gap:12px}
.confidence-slider{flex:1;accent-color:var(--gold);cursor:pointer}
.confidence-value{font-size:13px;font-weight:700;color:var(--gold);min-width:20px;text-align:center}
.confidence-anchors{display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-top:4px}

/* Compare responses */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.compare-card{border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.5}
.compare-expert{background:var(--accent-light);border:1px solid #b8d9c2}
.compare-expert .compare-card-label{color:var(--accent);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-strong{background:var(--blue-light);border:1px solid #bfdbfe}
.compare-strong .compare-card-label{color:var(--blue);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-weak{background:var(--warn-light);border:1px solid #f5c3b8}
.compare-weak .compare-card-label{color:var(--warn);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.compare-reasoning{margin-top:8px}
.compare-reasoning li{font-size:12px;color:var(--text-secondary);margin-left:14px;margin-bottom:2px}
.compare-diagnosis{margin-top:6px;font-size:12px;color:var(--warn)}

/* Reflection shown post-feedback */
.reflection-gate{font-size:12px;color:var(--text-secondary);font-style:italic;margin-bottom:10px}

/* Transfer exercise */
.transfer-scenario{background:var(--gold-light);border:1px solid #e8d5a8;border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:14px}
.transfer-scenario-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.transfer-criteria{list-style:none;margin-top:10px}
.transfer-criteria li{font-size:13px;color:var(--text-secondary);padding:4px 0 4px 18px;position:relative}
.transfer-criteria li::before{content:'◇';position:absolute;left:0;color:var(--accent);font-size:11px}

/* Retrieval prompt */
.retrieval-prompt-box{background:var(--accent-light);border:1px solid #b8d9c2;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.retrieval-prompt-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.retrieval-difficulty{display:inline-flex;gap:2px;margin-left:8px}
.retrieval-difficulty span{width:8px;height:8px;border-radius:2px;background:var(--border)}
.retrieval-difficulty span.filled{background:var(--accent)}

/* Submit + feedback */
.submit-row{margin-top:14px;display:flex;gap:10px;align-items:center}
.feedback-revealed{display:none;margin-top:16px;padding:14px 16px;border-radius:8px;font-size:13.5px;line-height:1.6}
.feedback-revealed.show{display:block}
.feedback-correct{background:var(--accent-light);border:1px solid #b8d9c2;color:var(--accent)}
.feedback-neutral{background:var(--blue-light);border:1px solid #bfdbfe;color:var(--blue)}
.feedback-revealed strong{display:block;margin-bottom:4px;font-weight:700}

/* ── Assessment ── */
.assess-intro{margin-bottom:28px}
.assess-rubric{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-top:12px}
.rubric-row{display:flex;gap:10px;margin-bottom:6px;font-size:13px}
.rubric-row:last-child{margin-bottom:0}
.rubric-level{font-weight:700;min-width:72px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.rubric-excellent .rubric-level{color:var(--accent)}
.rubric-adequate .rubric-level{color:var(--gold)}
.rubric-weak .rubric-level{color:var(--warn)}
.rubric-desc{color:var(--text-secondary)}

/* ── Experience summary ── */
.exp-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
.exp-summary-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px}
.mastery-meter{background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.mastery-fill{height:100%;border-radius:99px;transition:width .6s ease}
.mastery-fill.novice{background:#d1d5db}
.mastery-fill.developing{background:var(--gold)}
.mastery-fill.proficient{background:var(--blue)}
.mastery-fill.mastered{background:var(--accent)}

/* ── Glossary drawer ── */
#glossary-btn{
  position:fixed;bottom:22px;right:22px;
  background:var(--accent);color:#fff;border:none;border-radius:99px;
  padding:9px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;box-shadow:0 4px 16px rgba(45,90,61,.3);z-index:100;
  display:flex;align-items:center;gap:5px;
}
#glossary-drawer{
  position:fixed;bottom:0;right:0;width:320px;max-height:50vh;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.1);z-index:200;display:none;flex-direction:column;
}
#glossary-drawer.open{display:flex}
#glossary-drawer-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#glossary-drawer-header h4{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary)}
#glossary-close{background:none;border:none;cursor:pointer;font-size:17px;color:var(--text-secondary)}
#glossary-body{overflow-y:auto;padding:8px 0}
.glossary-term{padding:9px 16px;border-bottom:1px solid var(--border)}
.glossary-term dt{font-size:13px;font-weight:600;color:var(--accent)}
.glossary-term dd{font-size:13px;color:var(--text-secondary);margin-top:2px}

/* ── Complete screen ── */
#screen-complete{text-align:center;padding:60px 20px}
.complete-badge{width:76px;height:76px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 24px}

/* Scrollbar */
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

@media(max-width:680px){#sidebar{display:none}#main{padding:24px 18px}}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <div class="course-label">Course</div>
      <h2 id="sidebar-title"></h2>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      <div id="progress-label"></div>
    </div>
    <div id="competency-sidebar">
      <div class="comp-label">Competency Progress</div>
      <div id="competency-bars"></div>
    </div>
    <div id="sidebar-nav"></div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div id="screen-intro"    class="screen active"></div>
    <div id="screen-section"  class="screen"></div>
    <div id="screen-exp"      class="screen"></div>
    <div id="screen-assess"   class="screen"></div>
    <div id="screen-complete" class="screen">
      <div class="complete-badge">🎓</div>
      <h1 style="font-size:38px;margin-bottom:12px">Course Complete!</h1>
      <p style="color:var(--text-secondary);font-size:16px;max-width:460px;margin:0 auto 30px">
        You've worked through every section, experience, and assessment. Well done.
      </p>
      <button class="btn btn-primary" onclick="goScreen('intro')">Back to Start</button>
    </div>
  </main>
</div>

<button id="glossary-btn" onclick="toggleGlossary()">📖 Glossary</button>
<div id="glossary-drawer">
  <div id="glossary-drawer-header">
    <h4>Glossary</h4>
    <button id="glossary-close" onclick="toggleGlossary()">✕</button>
  </div>
  <div id="glossary-body"></div>
</div>

<script>
// ── COURSE DATA ────────────────────────────────────────────────────────────────
// Replace this with your own course object following the v2 schema
const COURSE = {
  "courseTitle": "Finding Joy and Happiness: A Science-Based, Practical Guide",
  "courseDescription": "This course is a comprehensive, evidence-based journey into the art and science of living joyfully. Drawing on positive psychology, neuroscience, ancient spiritual wisdom, and practical daily habits, you will learn how to cultivate lasting happiness—not just feel-good moments, but deep, sustainable contentment. Designed for busy adults in their 20s and 30s, every concept is grounded in real life and immediately actionable. By the end of this course, you will have a personalized toolkit for joy that serves you for decades to come.",
  "courseImage": "",
  "estimatedDuration": "40 hours",
  "lastUpdated": "2026-05-18",
  "version": "1.0",
  "prerequisites": [
    "An open mind and willingness to reflect on your own thoughts, habits, and values",
    "No prior knowledge of psychology or philosophy required—curiosity and a desire to grow are enough"
  ],
  "difficultyLevel": "intermediate",
  "learningOutcomes": [
    "Apply key findings from positive psychology and neuroscience to understand how joy and happiness are generated and sustained in the brain and body",
    "Build a personalized set of daily practices—including gratitude, mindfulness, movement, and savoring—that reliably increase subjective wellbeing",
    "Analyze and draw practical wisdom from multiple spiritual and religious traditions (Buddhist, Christian, Stoic, and others) to enrich your own approach to contentment",
    "Cultivate deeper, more nourishing relationships by applying principles of active listening, vulnerability, and intentional social connection",
    "Clarify your personal values and long-term purpose, and create a goal-setting framework aligned with lasting meaning rather than fleeting pleasure",
    "Design and facilitate experiences that help others—friends, family, colleagues, and community members—discover and nurture their own joy",
    "Sustain long-term wellbeing by recognizing and countering hedonic adaptation, building resilience, and continuously refining your joy practices over a lifetime"
  ],
  "glossary": [

              "text": "Resilience is the capacity to adapt and even grow in the face of adversity, trauma, tragedy, threats, or significant sources of stress. It is not a fixed trait that some people have and others do not—it is a dynamic process that can be cultivated through specific attitudes, practices, and relationships. The American Psychological Association identifies five key factors associated with resilience: the capacity to form and maintain caring relationships; the ability to make realistic plans and take steps to carry them out; a positive and confident view of oneself and one's strengths; skills in communication and problem-solving; and the ability to manage strong feelings and impulses. None of these are genetic endowments—they are all developable capacities. The most powerful and consistent predictor of resilience across the research literature is the presence of at least one genuinely supportive relationship. People with even a single trusted person who believes in them and is available in crisis demonstrate dramatically greater resilience than those who face adversity in isolation.\n\nMartin Seligman's research on explanatory style—how people habitually explain the causes of negative events to themselves—is directly relevant to resilience. People with a pessimistic explanatory style attribute negative events to internal causes ('It's my fault'), permanent causes ('It will always be this way'), and pervasive causes ('It ruins everything'). This style amplifies suffering and impairs recovery. People with an optimistic explanatory style attribute negative events to external causes where relevant, temporary causes ('This is a difficult period, not a permanent condition'), and specific rather than global causes ('This particular thing went wrong, not everything'). Crucially, this is not about denying reality or forcing positive spin on genuinely bad situations—it is about making the most accurate interpretation of what happened, including whatever is g // ── LEARNER STATE (in-memory) ─────────────────────────────────────────────────
const state = {
  screen: 'intro',
  currentSectionIdx: 0,
  currentExpIdx: 0,
  completedExperiences: new Set(),
  completedAssessments: new Set(),
  interactionAnswers: {},   // expId -> { interactionId -> {answer, confidence} }
  assessmentAnswers: {},    // assessmentId -> { questionId -> answer }
  assessmentSubmitted: {},  // assessmentId -> bool
  confidenceLog: {},        // interactionId -> value
  competencyProgress: {},   // competencyId -> 0..1
  revealedInteractions: {}  // expId -> Set of revealed interactionIds
};

// Initialise competency progress
COURSE.competencies?.forEach(c => { state.competencyProgress[c.competencyId] = 0; });

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goScreen(id, sIdx, eIdx) {
  if (sIdx !== undefined) state.currentSectionIdx = sIdx;
  if (eIdx !== undefined) state.currentExpIdx = eIdx;
  state.screen = id;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  render(id);
  updateSidebar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── RENDER DISPATCHER ─────────────────────────────────────────────────────────
function render(id) {
  if (id === 'intro')   renderIntro();
  if (id === 'section') renderSection();
  if (id === 'exp')     renderExp();
  if (id === 'assess')  renderAssess();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  document.getElementById('sidebar-title').textContent = COURSE.courseMetadata.title;
  renderGlossary();
  updateSidebar();
}

function updateSidebar() {
  // Competency bars
  const barsEl = document.getElementById('competency-bars');
  barsEl.innerHTML = COURSE.competencies.map(c => {
    const pct = Math.round((state.competencyProgress[c.competencyId] || 0) * 100);
    return `<div class="comp-badge">
      <span style="font-size:12px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</span>
      <div class="comp-bar-wrap"><div class="comp-bar" style="width:${pct}%"></div></div>
      <span class="comp-pct">${pct}%</span>
    </div>`;
  }).join('');

  // Section nav
  const navEl = document.getElementById('sidebar-nav');
  navEl.innerHTML = '';
  COURSE.sections.forEach((sec, sIdx) => {
    const allExpDone = (sec.learningExperiences || []).every(e => state.completedExperiences.has(e.experienceId));
    const isOpen = sIdx === state.currentSectionIdx;

    const item = document.createElement('div');
    item.className = 'section-nav-item' + (isOpen ? ' open' : '');

    const header = document.createElement('div');
    header.className = 'section-nav-header' + (isOpen ? ' active' : '');
    header.innerHTML = `
      <span class="section-check ${allExpDone ? 'done' : (isOpen ? 'active' : '')}">${allExpDone ? '✓' : sIdx + 1}</span>
      <span style="flex:1">${sec.title}</span>
      <span class="section-nav-arrow">›</span>`;
    header.onclick = () => goScreen('section', sIdx, 0);

    const exps = document.createElement('div');
    exps.className = 'section-nav-experiences';

    (sec.learningExperiences || []).forEach((exp, eIdx) => {
      const done = state.completedExperiences.has(exp.experienceId);
      const isActive = state.screen === 'exp' && sIdx === state.currentSectionIdx && eIdx === state.currentExpIdx;
      const div = document.createElement('div');
      div.className = `exp-nav-item ${isActive ? 'active' : ''} ${done ? 'done' : ''}`;
      div.innerHTML = `<span class="exp-dot"></span>${exp.title}`;
      div.onclick = () => goScreen('exp', sIdx, eIdx);
      exps.appendChild(div);
    });

    // Assessment links
    const linkedAssessIds = new Set();
    (sec.learningExperiences || []).forEach(exp => {
      ((exp.masteryVerification || {}).assessmentIds || []).forEach(id => linkedAssessIds.add(id));
    });
    linkedAssessIds.forEach(aId => {
      const assess = COURSE.assessments.find(a => a.assessmentId === aId);
      if (!assess) return;
      const done = state.completedAssessments.has(aId);
      const isActive = state.screen === 'assess' && state._assessId === aId;
      const div = document.createElement('div');
      div.className = `assess-nav-item ${isActive ? 'active' : ''}`;
      div.innerHTML = `<span class="exp-dot"></span>${assess.title} ${done ? '✓' : ''}`;
      div.onclick = () => { state._assessId = aId; goScreen('assess', sIdx); };
      exps.appendChild(div);
    });

    item.appendChild(header);
    item.appendChild(exps);
    navEl.appendChild(item);
  });

  updateProgress();
}

function updateProgress() {
  const totalExp = COURSE.sections.reduce((a, s) => a + (s.learningExperiences || []).length, 0);
  const totalAssess = COURSE.assessments.length;
  const total = totalExp + totalAssess;
  const done = state.completedExperiences.size + state.completedAssessments.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${pct}% complete`;
}

// ── SECTION SCREEN ────────────────────────────────────────────────────────────
function renderSection() {
  const sec = COURSE.sections[state.currentSectionIdx];
  const sIdx = state.currentSectionIdx;
  const prevAction = sIdx > 0 ? `goScreen('section',${sIdx-1},0)` : `goScreen('intro')`;

  const hooks = (sec.motivationHooks || []).map(h => {
    const cls = h.type === 'real-world-stakes' ? 'hook-stakes' : 'hook-gap';
    const icon = h.type === 'real-world-stakes' ? '⚠️' : '🎯';
    return `<div class="hook-box ${cls}"><span class="hook-icon">${icon}</span><span>${h.prompt}</span></div>`;
  }).join('');

  const objectives = (sec.learningObjectives || []).map(o => {
    const comps = (o.linkedCompetencies || []).map(cId => {
      const c = COURSE.competencies.find(x => x.competencyId === cId);
      return c ? `<span class="tag tag-green" style="margin-left:6px;font-size:10px">${c.title}</span>` : '';
    }).join('');
    return `<li>${o.description}${comps}</li>`;
  }).join('');

  document.getElementById('screen-section').innerHTML = `
    <div class="section-eyebrow">Section ${sIdx + 1} of ${COURSE.sections.length}</div>
    <h1 style="font-size:30px;margin-bottom:10px">${sec.title}</h1>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:22px">${sec.description}</p>
    ${hooks}
    <h3 style="font-size:16px;margin:20px 0 8px">Learning Objectives</h3>
    <ul class="objectives-list">${objectives}</ul>
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
      <button class="btn btn-primary" onclick="goScreen('exp',${sIdx},0)">Start Section →</button>
    </div>
  `;
}

// ── EXPERIENCE SCREEN ─────────────────────────────────────────────────────────
function renderExp() {
  const sec = COURSE.sections[state.currentSectionIdx];
  const exp = sec.learningExperiences[state.currentExpIdx];
  const sIdx = state.currentSectionIdx;
  const eIdx = state.currentExpIdx;
  const isLastExp = eIdx === sec.learningExperiences.length - 1;

  // Initialise reveal tracking
  if (!state.revealedInteractions[exp.experienceId]) state.revealedInteractions[exp.experienceId] = new Set();
  if (!state.interactionAnswers[exp.experienceId]) state.interactionAnswers[exp.experienceId] = {};

  const diffDots = renderDiffDots(exp.difficultyProfile.overall);
  const cogTags = (exp.desiredCognitiveActions || []).map(a => `<span class="tag tag-${cogColor(a)}">${a}</span>`).join('');

  const contentHTML = (exp.contentBlocks || []).map(b => {
    if (b.type === 'text') return `<p class="content-block-text">${b.content}</p>`;
    if (b.type === 'image') {
      return b.url
        ? `<div class="content-block-image"><img src="${b.url}" alt="${b.altText||''}"><p class="img-caption">${b.altText||''}</p></div>`
        : `<div class="content-block-image" style="background:var(--border);border-radius:var(--radius);height:140px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:13px">${b.altText||'[image]'}</div>`;
    }
    return '';
  }).join('');

  const workedHTML = (exp.workedExamples || []).map(we => `
    <div class="worked-example">
      <div class="we-label">Worked Example</div>
      <div class="we-problem">${we.problem}</div>
      <ol class="we-steps">${(we.steps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>
      ${we.conclusion ? `<div class="we-conclusion">${we.conclusion}</div>` : ''}
    </div>`).join('');

  const interactionsHTML = (exp.interactionSequence || []).map(int => renderInteraction(int, exp)).join('');

  const retrievalHTML = (exp.retrievalPractice || []).map(r => renderRetrieval(r, exp)).join('');
  const transferHTML  = (exp.transferExercises  || []).map(t => renderTransfer(t,  exp)).join('');

  // Assessment links for this experience
  const assessIds = ((exp.masteryVerification || {}).assessmentIds || []);
  const assessLinks = assessIds.map(aId => {
    const a = COURSE.assessments.find(x => x.assessmentId === aId);
    return a ? `<button class="btn btn-secondary btn-sm" onclick="state._assessId='${aId}';goScreen('assess',${sIdx})">Open Assessment: ${a.title} →</button>` : '';
  }).join('');

  // next action
  const nextLabel = isLastExp ? 'Complete Section →' : 'Next Experience →';
  const nextAction = isLastExp ? `completeExp('${exp.experienceId}');finishSection(${sIdx})` : `completeExp('${exp.experienceId}');goScreen('exp',${sIdx},${eIdx+1})`;
  const prevAction = eIdx > 0 ? `goScreen('exp',${sIdx},${eIdx-1})` : `goScreen('section',${sIdx})`;

  document.getElementById('screen-exp').innerHTML = `
    <div class="exp-header">
      <div class="section-eyebrow">${sec.title} · ${expTypeLabel(exp.experienceType)}</div>
      <h2>${exp.title}</h2>
      <div class="exp-meta">
        <span class="exp-meta-item">⏱ ${exp.estimatedDurationMinutes} min</span>
        <span class="exp-meta-item">Difficulty ${diffDots}</span>
      </div>
      <div class="cognitive-actions">${cogTags}</div>
    </div>
    ${contentHTML}
    ${workedHTML}
    ${interactionsHTML}
    ${retrievalHTML}
    ${transferHTML}
    ${assessLinks ? `<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">${assessLinks}</div>` : ''}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="${prevAction}">← Back</button>
      <button class="btn btn-primary" onclick="${nextAction}">${nextLabel}</button>
    </div>
  `;
}

function renderInteraction(int, exp) {
  const expId = exp.experienceId;
  const answered = !!(state.interactionAnswers[expId] && state.interactionAnswers[expId][int.interactionId]);
  const revealed = state.revealedInteractions[expId] && state.revealedInteractions[expId].has(int.interactionId);

  if (int.interactionType === 'prediction') {
    const ans = (state.interactionAnswers[expId]||{})[int.interactionId]?.answer || '';
    const conf = (state.interactionAnswers[expId]||{})[int.interactionId]?.confidence || 3;
    const lm = COURSE.learningModel;
    const confBlock = lm.confidenceCalibrationEnabled ? `
      <div class="confidence-block">
        <div class="confidence-label">🎯 ${int.confidencePrompt?.prompt || 'How confident are you?'}</div>
        <div class="confidence-row">
          <input type="range" class="confidence-slider" min="${int.confidencePrompt?.scaleMin||1}" max="${int.confidencePrompt?.scaleMax||5}" value="${conf}" id="conf-${int.interactionId}" oninput="document.getElementById('confval-${int.interactionId}').textContent=this.value">
          <span class="confidence-value" id="confval-${int.interactionId}">${conf}</span>
        </div>
        <div class="confidence-anchors"><span>Not confident</span><span>Very confident</span></div>
      </div>` : '';

    return `<div class="interaction-block int-prediction" id="int-${int.interactionId}">
      <div class="interaction-label">🔮 Prediction</div>
      <div class="interaction-prompt">${int.prompt}</div>
      <textarea class="sa-textarea" id="sa-${int.interactionId}" placeholder="Write your initial reasoning here…" ${revealed?'disabled':''}>${ans}</textarea>
      ${confBlock}
      ${!revealed ? `<div class="submit-row">
        <button class="btn btn-primary btn-sm" onclick="submitPrediction('${expId}','${int.interactionId}')">Submit & See Analysis</button>
      </div>` : '<div style="margin-top:8px;font-size:12px;color:var(--accent);font-weight:600">✓ Response recorded — compare with the analysis below</div>'}
    </div>`;
  }

  if (int.interactionType === 'compare-responses') {
    const models = int.responseModels;
    const expertSteps = (models.expertResponse.reasoningSteps || []).map(s => `<li>${s}</li>`).join('');
    const weakDiag = (models.weakResponse.diagnosis || []).map(d => `<div>· ${d}</div>`).join('');
    return `<div class="interaction-block int-compare" id="int-${int.interactionId}">
      <div class="interaction-label">⚖️ Compare Responses</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:14px">Read each response below. Consider how yours compares.</p>
      <div class="compare-grid">
        <div class="compare-card compare-expert">
          <div class="compare-card-label">Expert Response</div>
          <div>${models.expertResponse.answer}</div>
          ${expertSteps ? `<div class="compare-reasoning"><ul style="margin-top:8px">${expertSteps}</ul></div>` : ''}
        </div>
        <div class="compare-card compare-strong">
          <div class="compare-card-label">Strong Learner</div>
          <div>${models.strongLearnerResponse.answer}</div>
        </div>
      </div>
      <div class="compare-card compare-weak" style="margin-top:10px">
        <div class="compare-card-label">Weak Response — Avoid This</div>
        <div>${models.weakResponse.answer}</div>
        ${weakDiag ? `<div class="compare-diagnosis">${weakDiag}</div>` : ''}
      </div>
    </div>`;
  }

  if (int.interactionType === 'reflection') {
    const ans = (state.interactionAnswers[expId]||{})[int.interactionId]?.answer || '';
    const gated = int.timing === 'post-feedback';
    // show reflection only once a prediction in this sequence has been answered
    const hasPriorAnswer = Object.keys(state.interactionAnswers[expId]||{}).length > 0;
    if (gated && !hasPriorAnswer) return `<div class="interaction-block int-reflection" id="int-${int.interactionId}">
      <div class="interaction-label">🪞 Reflection</div>
      <div class="reflection-gate">Complete the prediction above to unlock this reflection.</div>
    </div>`;

    return `<div class="interaction-block int-reflection" id="int-${int.interactionId}">
      <div class="interaction-label">🪞 Reflection</div>
      <div class="interaction-prompt">${int.prompt}</div>
      <textarea class="sa-textarea" id="sa-${int.interactionId}" placeholder="Reflect openly — this is for your benefit…">${ans}</textarea>
      <div class="submit-row">
        <button class="btn btn-primary btn-sm" onclick="submitReflection('${expId}','${int.interactionId}')">Save Reflection</button>
        <span id="ref-saved-${int.interactionId}" style="font-size:12px;color:var(--accent);display:none">✓ Saved</span>
      </div>
    </div>`;
  }

  return '';
}

function renderRetrieval(r, exp) {
  const expId = exp.experienceId;
  const ans = (state.interactionAnswers[expId]||{})[r.retrievalItemId]?.answer || '';
  const revealed = state.revealedInteractions[expId] && state.revealedInteractions[expId].has(r.retrievalItemId);
  const dots = Array.from({length:5},(_,i)=>`<span class="${i<r.difficulty?'filled':''} "></span>`).join('');
  const scheduleInfo = `Review scheduled: Day ${r.schedule.initialReviewDays}, then ${r.schedule.subsequentReviewDays.join(', ')} days`;

  return `<div class="interaction-block int-retrieval" id="int-${r.retrievalItemId}">
    <div class="retrieval-prompt-box">
      <div class="retrieval-prompt-label">
        ↩ Retrieval Practice
        <span class="retrieval-difficulty">${Array.from({length:5},(_,i)=>`<span class="${i<r.difficulty?'filled':''}" style="background:${i<r.difficulty?'var(--accent)':'var(--border)'};display:inline-block;width:8px;height:8px;border-radius:2px;margin-left:1px"></span>`).join('')}</span>
      </div>
      <div class="interaction-prompt" style="margin-bottom:0">${r.prompt}</div>
    </div>
    <textarea class="sa-textarea" id="sa-${r.retrievalItemId}" placeholder="Retrieve from memory — resist the urge to look back." ${revealed?'disabled':''}>${ans}</textarea>
    ${!revealed ? `<div class="submit-row">
      <button class="btn btn-primary btn-sm" onclick="submitRetrieval('${expId}','${r.retrievalItemId}')">Submit</button>
    </div>` : `<div style="margin-top:8px;font-size:12px;color:var(--text-secondary)">📅 ${scheduleInfo}</div>`}
  </div>`;
}

function renderTransfer(t, exp) {
  const expId = exp.experienceId;
  const ans = (state.interactionAnswers[expId]||{})[t.exerciseId]?.answer || '';
  const saved = state.revealedInteractions[expId] && state.revealedInteractions[expId].has(t.exerciseId);
  const criteria = (t.successCriteria||[]).map(c=>`<li>${c}</li>`).join('');

  return `<div class="interaction-block int-transfer" id="int-${t.exerciseId}">
    <div class="interaction-label">🔀 Transfer Exercise · ${t.context}</div>
    <div class="transfer-scenario">
      <div class="transfer-scenario-label">Scenario</div>
      <div>${t.scenario}</div>
    </div>
    <div class="interaction-prompt" style="margin-bottom:10px">${t.task}</div>
    <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">Success Criteria</div>
    <ul class="transfer-criteria">${criteria}</ul>
    <textarea class="sa-textarea" id="sa-${t.exerciseId}" placeholder="Apply your reasoning here…" ${saved?'disabled':''}>${ans}</textarea>
    ${!saved ? `<div class="submit-row">
      <button class="btn btn-primary btn-sm" onclick="submitTransfer('${expId}','${t.exerciseId}')">Submit Exercise</button>
    </div>` : `<div style="margin-top:8px;font-size:12px;color:var(--accent);font-weight:600">✓ Exercise recorded</div>`}
  </div>`;
}

// ── ASSESSMENT SCREEN ─────────────────────────────────────────────────────────
function renderAssess() {
  const aId = state._assessId;
  const assess = COURSE.assessments.find(a => a.assessmentId === aId);
  if (!assess) return;
  const submitted = !!state.assessmentSubmitted[aId];
  if (!state.assessmentAnswers[aId]) state.assessmentAnswers[aId] = {};

  const questionsHTML = (assess.questions || []).map((q, qIdx) => {
    const ans = state.assessmentAnswers[aId][q.questionId] || '';
    const rubric = q.rubric || {};
    const rubricHTML = submitted ? `
      <div class="assess-rubric">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin-bottom:10px">Rubric — evaluate your own response</div>
        <div class="rubric-row rubric-excellent"><span class="rubric-level">Excellent</span><span class="rubric-desc">${rubric.excellent||''}</span></div>
        <div class="rubric-row rubric-adequate"><span class="rubric-level">Adequate</span><span class="rubric-desc">${rubric.adequate||''}</span></div>
        <div class="rubric-row rubric-weak"><span class="rubric-level">Weak</span><span class="rubric-desc">${rubric.weak||''}</span></div>
      </div>
      ${(q.successCriteria||[]).length ? `
        <div style="margin-top:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin-bottom:6px">Success Criteria</div>
          <ul class="transfer-criteria">${(q.successCriteria||[]).map(c=>`<li>${c}</li>`).join('')}</ul>
        </div>` : ''}
    ` : '';

    return `<div class="card">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px">
        Question ${qIdx+1} · ${q.questionType} · Difficulty ${q.difficulty}/5
      </div>
      <div class="interaction-prompt">${q.prompt}</div>
      <textarea class="sa-textarea" id="aq-${aId}-${q.questionId}" placeholder="Write your response…" ${submitted?'disabled':''}>${ans}</textarea>
      ${rubricHTML}
    </div>`;
  }).join('');

  const linkedComps = (assess.linkedCompetencies||[]).map(cId => {
    const c = COURSE.competencies.find(x => x.competencyId === cId);
    return c ? `<span class="tag tag-green" style="margin-left:4px">${c.title}</span>` : '';
  }).join('');

  document.getElementById('screen-assess').innerHTML = `
    <div class="assess-intro">
      <div class="section-eyebrow">${assess.assessmentType}</div>
      <h2 style="font-size:26px;margin-bottom:8px">${assess.title}</h2>
      <div style="margin-bottom:16px">Competencies: ${linkedComps}</div>
      ${assess.adaptiveDifficulty ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">⚡ Adaptive difficulty is enabled for this assessment.</div>` : ''}
    </div>
    ${questionsHTML}
    ${!submitted ? `<button class="btn btn-primary" onclick="submitAssessment('${aId}')">Submit Assessment</button>` : ''}
    ${submitted ? `
      <div class="card" style="background:var(--accent-light);border-color:#b8d9c2;margin-top:8px">
        <h3 style="font-size:18px;margin-bottom:6px">Assessment Submitted ✓</h3>
        <p style="font-size:14px;color:var(--text-secondary)">Use the rubric above each question to self-evaluate your response. Your competency progress has been updated.</p>
      </div>` : ''}
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="goScreen('exp',${state.currentSectionIdx},${state.currentExpIdx})">← Back to Experience</button>
    </div>
  `;
}

// ── INTERACTION HANDLERS ──────────────────────────────────────────────────────
function submitPrediction(expId, intId) {
  const ta = document.getElementById('sa-' + intId);
  const confEl = document.getElementById('conf-' + intId);
  if (!ta || !ta.value.trim()) return;
  if (!state.interactionAnswers[expId]) state.interactionAnswers[expId] = {};
  state.interactionAnswers[expId][intId] = { answer: ta.value, confidence: confEl ? +confEl.value : null };
  state.revealedInteractions[expId] = state.revealedInteractions[expId] || new Set();
  state.revealedInteractions[expId].add(intId);
  // advance competency progress slightly
  advanceCompetency(expId, 0.15);
  renderExp();
}

function submitReflection(expId, intId) {
  const ta = document.getElementById('sa-' + intId);
  if (!state.interactionAnswers[expId]) state.interactionAnswers[expId] = {};
  state.interactionAnswers[expId][intId] = { answer: ta ? ta.value : '' };
  const saved = document.getElementById('ref-saved-' + intId);
  if (saved) saved.style.display = 'inline';
  advanceCompetency(expId, 0.1);
}

function submitRetrieval(expId, itemId) {
  const ta = document.getElementById('sa-' + itemId);
  if (!ta || !ta.value.trim()) return;
  if (!state.interactionAnswers[expId]) state.interactionAnswers[expId] = {};
  state.interactionAnswers[expId][itemId] = { answer: ta.value };
  state.revealedInteractions[expId] = state.revealedInteractions[expId] || new Set();
  state.revealedInteractions[expId].add(itemId);
  advanceCompetency(expId, 0.1);
  renderExp();
}

function submitTransfer(expId, exId) {
  const ta = document.getElementById('sa-' + exId);
  if (!ta || !ta.value.trim()) return;
  if (!state.interactionAnswers[expId]) state.interactionAnswers[expId] = {};
  state.interactionAnswers[expId][exId] = { answer: ta.value };
  state.revealedInteractions[expId] = state.revealedInteractions[expId] || new Set();
  state.revealedInteractions[expId].add(exId);
  advanceCompetency(expId, 0.2);
  renderExp();
}

function submitAssessment(aId) {
  // Capture all textarea values
  const assess = COURSE.assessments.find(a => a.assessmentId === aId);
  (assess.questions || []).forEach(q => {
    const ta = document.getElementById(`aq-${aId}-${q.questionId}`);
    if (ta) state.assessmentAnswers[aId][q.questionId] = ta.value;
  });
  state.assessmentSubmitted[aId] = true;
  state.completedAssessments.add(aId);
  // Advance competency for linked competencies
  (assess.linkedCompetencies || []).forEach(cId => {
    state.competencyProgress[cId] = Math.min(1, (state.competencyProgress[cId] || 0) + 0.3);
  });
  updateSidebar();
  renderAssess();
}

function completeExp(expId) {
  state.completedExperiences.add(expId);
  advanceCompetency(expId, 0.15);
  updateSidebar();
}

function finishSection(sIdx) {
  const sec = COURSE.sections[sIdx];
  const isLastSection = sIdx === COURSE.sections.length - 1;
  if (isLastSection) {
    goScreen('complete');
  } else {
    goScreen('section', sIdx + 1, 0);
  }
}

function advanceCompetency(expId, delta) {
  // Find which competencies this experience is linked to
  COURSE.sections.forEach(sec => {
    (sec.learningExperiences || []).forEach(exp => {
      if (exp.experienceId === expId) {
        (exp.linkedCompetencies || []).forEach(cId => {
          state.competencyProgress[cId] = Math.min(1, (state.competencyProgress[cId] || 0) + delta);
        });
      }
    });
  });
  updateSidebar();
}

// ── GLOSSARY ──────────────────────────────────────────────────────────────────
function renderGlossary() {
  const body = document.getElementById('glossary-body');
  const terms = COURSE.glossary || [];
  if (!terms.length) { body.innerHTML = '<p style="padding:14px;font-size:13px;color:var(--text-secondary)">No glossary terms.</p>'; return; }
  body.innerHTML = terms.map(g => `<dl class="glossary-term"><dt>${g.term}</dt><dd>${g.definition}</dd></dl>`).join('');
}
function toggleGlossary() { document.getElementById('glossary-drawer').classList.toggle('open'); }

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function diffColor(d) { return d === 'beginner' ? 'green' : d === 'advanced' ? 'warn' : 'gold'; }
function taxonomyColor(t) {
  const map = { remember:'gray', understand:'gray', apply:'blue', analyze:'violet', evaluate:'gold', create:'green' };
  return map[t] || 'gray';
}
function cogColor(a) {
  const map = { prediction:'blue', analysis:'violet', reflection:'gold', retrieval:'green', application:'blue', contrast:'gold' };
  return map[a] || 'gray';
}
function expTypeLabel(t) {
  const map = { 'guided-analysis':'Guided Analysis', 'worked-example':'Worked Example', 'practice':'Practice', 'exploration':'Exploration' };
  return map[t] || t;
}
function renderDiffDots(n) {
  return Array.from({length:5},(_,i)=>`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px;background:${i<n?'var(--accent)':'var(--border)'}"></span>`).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar();
renderIntro();
</script>
</body>
</html>
